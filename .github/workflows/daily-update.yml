name: Daily Portfolio Update

on:
  schedule:
    # GitHub Actions cron은 무료 티어에서 자주 지연/스킵됨.
    # → 같은 시간대에 여러 분 단위로 분산 시도 + 폭넓게 거는 다중 백업.
    # KOSPI 마감 직후 (15:30 KST = 06:30 UTC)
    - cron: '37 6 * * *'    # 15:37 KST
    - cron: '53 6 * * *'    # 15:53 KST (백업1)
    - cron: '11 7 * * *'    # 16:11 KST (백업2)
    - cron: '29 7 * * *'    # 16:29 KST (백업3)
    # 미국장 마감 후 (06:30 KST = 21:30 UTC 전날)
    - cron: '41 21 * * *'   # 06:41 KST (다음날)
    - cron: '7 22 * * *'    # 07:07 KST (백업1)
    - cron: '29 22 * * *'   # 07:29 KST (백업2)
    - cron: '47 23 * * *'   # 08:47 KST (백업3)
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

# 같은 시점에 여러 cron이 동시 firing 시 race condition으로 인한 checkout 실패 방지.
# 첫 번째만 실행되고 나머지는 cancel (이미 데이터 갱신됐으므로 OK).
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # rebase/pull 안전성: shallow checkout 대신 full history (push race 방지)
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decrypt portfolio data
        env:
          PORTFOLIO_PASSWORD: ${{ secrets.PORTFOLIO_PASSWORD }}
        run: python encrypt_data.py decrypt

      - name: Update prices (yfinance)
        run: python update_prices.py

      - name: Compute correlation-adjusted volatility
        run: python compute_corr_vol.py
        continue-on-error: true

      - name: Fetch benchmark indices (KOSPI, S&P, VIX, etc.)
        run: python fetch_benchmarks.py
        continue-on-error: true

      - name: Fetch historical valuations (S&P 500 PE/PB from multpl.com)
        run: python fetch_historical_valuations.py
        continue-on-error: true

      - name: Compute historical YTD series + sector returns
        run: python compute_historical.py
        continue-on-error: true

      - name: Fetch ETF top holdings (yfinance funds_data)
        run: python fetch_etf_holdings.py
        continue-on-error: true

      - name: Fetch underlying stocks YTD returns
        run: python fetch_underlying_returns.py
        continue-on-error: true

      - name: Fetch PER/PBR/ROE valuations
        run: python fetch_valuations.py
        continue-on-error: true

      - name: Re-encrypt portfolio data
        env:
          PORTFOLIO_PASSWORD: ${{ secrets.PORTFOLIO_PASSWORD }}
        run: python encrypt_data.py encrypt

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 평문/잡파일 commit 방지: 명시적 add
          TRACKED="portfolio-data.js prices_log.json benchmarks.js"
          git add $TRACKED

          if git diff --staged --quiet; then
            echo "변경 없음."
            exit 0
          fi

          # ── push race 대비 전략 ────────────────────────────────────
          # 자동 데이터 파일은 매번 yfinance에서 새로 생성되므로 충돌 시
          # rebase로 line-by-line 머지가 불가능. 대신 "soft reset → 재커밋"
          # 패턴 사용: origin/main 위에 우리의 fresh 데이터로 새 commit.
          # 이렇게 하면 누가 먼저 push했든 우리는 항상 그 위에 깨끗이 얹음.
          for attempt in 1 2 3 4 5; do
            git fetch origin main

            # 우리 commit과 origin이 다르면 origin 위에 우리 working tree를 재배치
            LOCAL_HEAD="$(git rev-parse HEAD)"
            REMOTE_HEAD="$(git rev-parse origin/main)"
            if [ "$LOCAL_HEAD" != "$REMOTE_HEAD" ]; then
              # 가장 최근 origin/main에 우리 데이터 다시 얹기 (충돌 없음)
              # 1) 우리 working tree에서 데이터 파일은 그대로 유지
              # 2) HEAD를 origin/main으로 soft reset (index/working tree 보존)
              # 3) 우리 데이터 파일을 다시 add + 재커밋
              echo "[attempt $attempt] 로컬 commit 재배치: origin/main 위로 soft reset"
              git reset --soft "$REMOTE_HEAD"
              git add $TRACKED
              if git diff --staged --quiet; then
                echo "데이터 변경 없음 (이미 동일). 종료."
                exit 0
              fi
              git commit -m "auto: daily update $(date -u +%Y-%m-%d)"
            fi

            if git push; then
              echo "push 성공 (attempt $attempt)"
              exit 0
            fi
            echo "push 실패 — 잠시 대기 후 재시도 ($attempt/5)"
            sleep $((attempt * 5))
          done

          echo "::error::5회 시도 후 push 실패"
          exit 1
