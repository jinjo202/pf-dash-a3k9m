<script>
  (function () {
    try {
      var u = new URL(window.location.href);
      if (u.searchParams.get('cb')) return;
      var docMs = new Date(document.lastModified).getTime();
      fetch(window.location.pathname + '?probe=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
        .then(function (r) {
          var srv = r.headers.get('Last-Modified');
          if (!srv) return;
          var srvMs = new Date(srv).getTime();
          if (isFinite(srvMs) && isFinite(docMs) && srvMs > docMs + 2000) {
            u.searchParams.set('cb', Date.now());
            window.location.replace(u.toString());
          }
        }).catch(function () {});
    } catch (e) {}
  })();
</script>
<script>
  (function () {
    try {
      var saved = localStorage.getItem('pf_theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>

<!-- 워드(.docx) 생성용 라이브러리 (클라이언트 사이드, 브리핑 → 개조식 보고서) -->
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<style>
  :root {
    --bg:#f6f7f9; --panel:#ffffff; --panel-soft:#fafbfc; --border:#e6e8eb;
    --row-alt:#fafbfc; --row-hover:#eff6ff; --text:#0f172a; --text-soft:#334155;
    --muted:#64748b; --muted-soft:#cbd5e1; --accent:#2563eb; --accent-hover:#1d4ed8;
    --accent-soft:#eff6ff; --pos:#15803d; --neg:#b91c1c; --neu:#64748b;
    --pos-soft:#dcfce7; --neg-soft:#fee2e2; --neu-soft:#f1f5f9;
    --shadow-sm:0 1px 2px 0 rgba(15,23,42,.04);
    --shadow-md:0 4px 12px -2px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
    color-scheme: light;
  }
  [data-theme="dark"] {
    --bg:#0b1020; --panel:#141a2e; --panel-soft:#1a2138; --border:#2a324a;
    --row-alt:#1a2138; --row-hover:#1e2942; --text:#e2e8f0; --text-soft:#cbd5e1;
    --muted:#94a3b8; --muted-soft:#475569; --accent:#60a5fa; --accent-hover:#3b82f6;
    --accent-soft:#1e3a8a55; --pos:#22c55e; --neg:#f87171; --neu:#94a3b8;
    --pos-soft:#14331f; --neg-soft:#3a1414; --neu-soft:#1a2138;
    --shadow-sm:0 1px 2px 0 rgba(0,0,0,.5);
    --shadow-md:0 4px 12px -2px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.4);
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html { transition: background-color 200ms, color 200ms; }
  html, body {
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:"Pretendard Variable",Pretendard,-apple-system,"Segoe UI","Noto Sans KR",sans-serif;
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  /* ── Header ── */
  header {
    background:var(--panel); border-bottom:1px solid var(--border);
    padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:12px; position:sticky; top:0; z-index:20;
  }
  header h1 { font-size:18px; margin:0; font-weight:800; letter-spacing:-.02em; }
  header .sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .header-actions { display:inline-flex; align-items:center; gap:10px; }
  .theme-toggle {
    display:inline-flex; align-items:center; gap:6px; padding:7px 12px;
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;
    box-shadow:var(--shadow-sm); transition:all .15s; user-select:none;
  }
  .theme-toggle:hover { background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
  .nav-link {
    font-size:12px; font-weight:600; color:var(--muted); text-decoration:none;
    padding:7px 10px; border-radius:6px;
  }
  .nav-link:hover { background:var(--accent-soft); color:var(--accent); }

  /* ── Layout (좌측 사이드바 + 메인 컨텐츠) ── */
  main { max-width:1400px; margin:0 auto; padding:20px 24px 64px;
         display:grid; grid-template-columns:220px 1fr; gap:24px; align-items:start; }
  .sidebar { position:sticky; top:14px; }
  .sb-section { margin-bottom:18px; }
  .sb-label {
    font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); padding:0 10px 6px; border-bottom:1px solid var(--border); margin-bottom:6px;
  }
  .sb-item {
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border-radius:8px; cursor:pointer; font-size:13px; font-weight:500;
    color:var(--text); border:1px solid transparent; user-select:none;
    transition:background .12s, color .12s, border-color .12s;
  }
  .sb-item:hover { background:var(--accent-soft); color:var(--accent); }
  .sb-item.active {
    background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600;
  }
  .sb-item.sub { padding-left:30px; font-size:12.5px; }
  .sb-icon { width:18px; text-align:center; flex-shrink:0; }
  .sb-foot {
    font-size:11px; color:var(--muted); padding:8px 10px; margin-top:8px;
    border-top:1px solid var(--border);
  }
  #view-content { min-width:0; }
  @media (max-width:900px) {
    main { grid-template-columns:1fr; }
    .sidebar { position:static; }
    .sb-section { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; }
    .sb-label { width:100%; padding:0 4px 4px; }
    .sb-item { padding:6px 12px; border-radius:16px; border:1px solid var(--border); }
    .sb-item.sub { padding-left:12px; }
    .sb-foot { width:100%; }
  }

  /* ── 주간회의자료 패널 ── */
  .wk-meta { display:flex; gap:16px; flex-wrap:wrap; align-items:baseline;
             margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .wk-meta-item { font-size:12.5px; color:var(--muted); }
  .wk-meta-item b { color:var(--text); font-size:13px; font-weight:700; margin-left:4px; }
  .wk-market-table { width:100%; border-collapse:collapse; font-size:12.5px; margin:6px 0 18px; }
  .wk-market-table th, .wk-market-table td { padding:6px 10px; text-align:right; border-bottom:1px solid var(--border); }
  .wk-market-table th { font-size:11.5px; font-weight:600; color:var(--muted); text-align:right; }
  .wk-market-table th:first-child, .wk-market-table td:first-child { text-align:left; }
  .wk-market-table td.pos { color:var(--pos); font-weight:600; }
  .wk-market-table td.neg { color:var(--neg); font-weight:600; }
  .wk-factor { margin-bottom:18px; }
  .wk-factor-h { font-size:14px; font-weight:700; color:var(--accent);
                 margin:0 0 6px; padding-bottom:4px; border-bottom:1px solid var(--accent-soft); }
  .wk-factor-line { font-size:13px; line-height:1.6; color:var(--text);
                    padding:3px 0 3px 8px; border-left:2px solid var(--accent-soft); }
  .wk-pnl, .wk-weights { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .wk-mini-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  .wk-mini-table th, .wk-mini-table td { padding:5px 8px; text-align:right; border-bottom:1px solid var(--border); }
  .wk-mini-table th:first-child, .wk-mini-table td:first-child { text-align:left; }
  .wk-mini-title { font-size:13px; font-weight:700; margin:0 0 4px; }
  .wk-note { font-size:11.5px; color:var(--muted); margin-top:8px; }
  /* 평가 배지 (긍정/중립/부정) */
  .rate-badge { display:inline-block; font-size:11px; font-weight:700; padding:2px 8px;
                border-radius:10px; margin-left:8px; vertical-align:middle; }
  .rate-pos { background:rgba(31,122,31,.14); color:#1f7a1f; }
  .rate-neu { background:rgba(122,122,122,.16); color:#6b7280; }
  .rate-neg { background:rgba(192,0,0,.12); color:#c00000; }
  .rate-kr  { background:rgba(31,122,31,.14); color:#1f7a1f; }
  .rate-us  { background:rgba(31,79,192,.14); color:#1f4fc0; }
  .rate-adj { background:rgba(31,79,192,.14); color:#1f4fc0; }
  /* 종합의견 */
  .wk-concl { margin-top:18px; padding:16px; border-radius:12px;
              background:var(--accent-soft); border:1px solid var(--border); }
  .wk-concl-title { font-size:15px; font-weight:800; margin:0 0 12px; color:var(--text); }
  .wk-concl-item { margin-bottom:12px; padding-bottom:12px; border-bottom:1px dashed var(--border); }
  .wk-concl-item:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .wk-concl-head { font-size:13.5px; font-weight:700; margin:0 0 4px; }
  .wk-concl-label { color:var(--muted); font-weight:600; }
  .wk-concl-text { font-size:12.5px; line-height:1.65; color:var(--text); margin:0; }
  /* 지역배분 */
  .wk-region { margin-top:18px; }
  .wk-region-dm { padding:10px 12px; border-radius:8px; background:var(--accent-soft);
                  border:1px solid var(--border); margin-bottom:10px; font-size:12.5px; line-height:1.6; }
  .wk-region-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  .wk-region-table th, .wk-region-table td { padding:7px 10px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
  .wk-region-table th { font-size:11.5px; font-weight:600; color:var(--muted); }
  .wk-region-table td.mom { text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .wk-region-table .rgn-name { font-weight:700; white-space:nowrap; }
  .wk-region-table .rgn-text { color:var(--text); }
  .wk-model-note { font-size:11px; color:var(--muted); margin-bottom:10px; padding:8px 10px;
                   background:var(--panel-soft); border-radius:8px; line-height:1.5; }
  .wk-model-src { opacity:.7; font-style:italic; }
  .fac-chips { display:flex; flex-wrap:wrap; gap:4px; }
  .fac-chip { font-size:10px; padding:1px 6px; border-radius:8px; white-space:nowrap;
              background:var(--neu-soft); color:var(--muted); }
  .fac-chip.fc-pos { background:rgba(31,122,31,.13); color:#1f7a1f; }
  .fac-chip.fc-neg { background:rgba(192,0,0,.11); color:#c00000; }
  .fac-chip b { font-variant-numeric:tabular-nums; }

  /* ── Layout-legacy ── */
  .section-label {
    font-size:11px; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); margin-bottom:10px;
  }
  .panel {
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    box-shadow:var(--shadow-sm); padding:18px 20px; margin-bottom:20px;
  }
  .panel-title {
    font-size:15px; font-weight:700; letter-spacing:-.01em; margin:0 0 4px;
  }
  .panel-hint { font-size:12px; color:var(--muted); margin:0 0 14px; }

  /* ── Region tabs ── */
  .region-tabs {
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px;
  }
  .rtab {
    padding:7px 14px; border-radius:20px; font-size:13px; font-weight:600;
    cursor:pointer; border:1px solid var(--border); background:var(--panel);
    color:var(--muted); transition:all .15s; user-select:none;
  }
  .rtab:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
  .rtab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ── As-of date badge ── */
  .asof-badge {
    display:inline-block; padding:6px 12px; border-radius:8px; margin-bottom:14px;
    background:var(--accent-soft); color:var(--accent); font-size:12px; font-weight:600;
    border:1px solid var(--border);
  }
  .asof-badge b { font-weight:800; }

  /* ── 시황 코멘트 ── */
  .commentary-box {
    background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent);
    border-radius:10px; padding:14px 16px; margin-bottom:20px; box-shadow:var(--shadow-sm);
  }
  .commentary-title { font-size:13px; font-weight:800; color:var(--accent); margin-bottom:8px; }
  /* 데일리 브리핑 (서술형) */
  .briefing-box {
    background:linear-gradient(180deg, var(--accent-soft), var(--panel) 60%);
    border:1px solid var(--border); border-left:3px solid var(--accent);
    border-radius:10px; padding:16px 18px; margin-bottom:20px; box-shadow:var(--shadow-sm);
  }
  .bf-head { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;
    padding-bottom:10px; border-bottom:1px dashed var(--border); }
  .bf-badge { font-size:11px; font-weight:800; color:#fff; background:var(--accent);
    padding:3px 9px; border-radius:20px; }
  .bf-title { font-size:15px; font-weight:800; color:var(--text); letter-spacing:-.01em; }
  .bf-asof { font-size:11px; color:var(--muted); margin-left:auto; font-weight:600; }
  .bf-date-sel {
    margin-left:auto; font-size:12px; font-weight:600; color:var(--text-soft);
    background:var(--panel); border:1px solid var(--border); border-radius:7px;
    padding:4px 8px; cursor:pointer; font-variant-numeric:tabular-nums;
  }
  .bf-date-sel:hover { border-color:var(--accent); }
  /* 날짜별 시황 — 캘린더 picker + 이전/다음 화살표 */
  .bf-date-nav {
    margin-left:auto; display:inline-flex; align-items:center; gap:4px;
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:2px;
  }
  .bf-date-arrow {
    font-size:11px; font-weight:700; color:var(--text-soft);
    background:transparent; border:none; border-radius:6px;
    width:24px; height:24px; padding:0; cursor:pointer; line-height:1;
    display:inline-flex; align-items:center; justify-content:center;
    transition:background .12s ease, color .12s ease;
  }
  .bf-date-arrow:hover:not(:disabled) { background:var(--bg); color:var(--text); }
  .bf-date-arrow:disabled { opacity:0.25; cursor:not-allowed; }
  .bf-date-picker {
    font-size:12px; font-weight:600; color:var(--text);
    background:transparent; border:none; border-radius:6px;
    padding:3px 6px; cursor:pointer; font-variant-numeric:tabular-nums;
    color-scheme: dark;
    min-width:120px;
  }
  .bf-date-picker:hover { background:var(--bg); }
  .bf-date-picker:focus { outline:none; background:var(--bg); }
  .bf-date-nav + .bf-word-btn { margin-left:8px; }
  .bf-date-count {
    font-size:10.5px; color:var(--muted); font-weight:600;
    padding-left:6px; padding-right:2px; font-variant-numeric:tabular-nums;
  }
  .bf-word-btn {
    font-size:12px; font-weight:700; color:#fff; background:var(--accent);
    border:1px solid var(--accent); border-radius:7px; padding:4px 10px; cursor:pointer;
    white-space:nowrap; transition:filter .12s ease;
  }
  .bf-asof + .bf-word-btn, .bf-date-sel + .bf-word-btn { margin-left:8px; }
  .bf-word-btn:hover { filter:brightness(1.08); }
  .bf-word-btn:active { filter:brightness(.95); }
  /* ── 섹터별 주요 종목 보드 ── */
  .secstock-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
  .secstock-card { border:1px solid var(--border); border-radius:12px; padding:12px 14px;
    background:var(--panel); }
  .secstock-head { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .ss-name { font-weight:800; font-size:14px; color:var(--text); }
  .ss-chip { font-size:12px; font-weight:700; padding:2px 8px; border-radius:6px; white-space:nowrap; }
  .secstock-sub { font-size:10.5px; color:var(--muted); margin:2px 0 8px; }
  .secstock-tbl { width:100%; border-collapse:collapse; font-size:12px; }
  .secstock-tbl th { font-size:9.5px; color:var(--muted); font-weight:600; text-align:right;
    padding:2px 4px 4px; border-bottom:1px solid var(--border); }
  .secstock-tbl th:first-child { text-align:left; }
  .secstock-tbl td { padding:5px 4px; border-bottom:1px solid var(--panel-soft); }
  .secstock-tbl tr:last-child td { border-bottom:none; }
  .ss-stk { font-weight:600; color:var(--text-soft); }
  .ss-mc { font-size:9.5px; color:var(--muted); margin-left:6px; font-weight:500; }
  .ss-mom { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .bf-mail-btn {
    font-size:12px; font-weight:700; color:#fff; background:#16a34a;
    border:1px solid #16a34a; border-radius:7px; padding:4px 10px; cursor:pointer;
    white-space:nowrap; transition:filter .12s ease; margin-left:8px;
    text-decoration:none; display:inline-block;
  }
  .bf-mail-btn:hover { filter:brightness(1.08); }
  .bf-mail-btn:active { filter:brightness(.95); }
  .bf-greet { margin:0 0 10px; font-size:13.5px; font-weight:700; color:var(--text-soft); }
  .bf-p { margin:0 0 11px; font-size:13.5px; line-height:1.85; color:var(--text); }
  .bf-stat {
    margin:4px 0 13px; font-size:12.5px; font-weight:700; color:var(--text-soft);
    background:var(--panel-soft); border:1px solid var(--border); border-radius:8px;
    padding:9px 12px; line-height:1.7; font-variant-numeric:tabular-nums;
  }
  .bf-note { margin:-6px 0 12px; font-size:12px; color:var(--muted); font-weight:600; }
  .commentary-line {
    margin:0 0 6px; font-size:13.5px; line-height:1.7; color:var(--text);
  }
  .commentary-line b { font-weight:800; color:var(--text-soft); }
  .commentary-foot { margin-top:12px; font-size:11px; color:var(--muted); }
  .cm-subtitle {
    font-size:12px; font-weight:800; color:var(--accent); margin:14px 0 8px;
    padding-top:12px; border-top:1px dashed var(--border);
  }
  .cm-event-list { margin:0; padding-left:18px; }
  .cm-event-list li { font-size:13px; line-height:1.6; margin-bottom:8px; color:var(--text); }
  .cm-event-list a { color:var(--text); text-decoration:none; }
  .cm-event-list a:hover { color:var(--accent); text-decoration:underline; }
  .cm-event-desc { font-size:12px; line-height:1.55; color:var(--muted); margin-top:2px; }
  .cm-scope { display:inline-block; font-size:10px; font-weight:700; padding:1px 6px; border-radius:9px; vertical-align:middle; }
  .cm-scope-g { background:rgba(79,140,255,.16); color:#5b8cff; }
  .cm-scope-r { background:rgba(120,120,120,.18); color:var(--muted); }
  .cm-mover-detail { font-size:12px; line-height:1.55; color:var(--muted); margin-top:3px; }
  .cm-src { font-size:11px; color:var(--muted); font-weight:600; }
  .cm-mover-list { display:flex; flex-direction:column; gap:10px; }
  .cm-mover {
    background:var(--panel-soft); border:1px solid var(--border); border-radius:8px; padding:10px 12px;
  }
  .cm-mover-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:5px; }
  .cm-mover-name { font-size:13.5px; font-weight:700; }
  .cm-mover-ticker { font-size:11px; color:var(--muted); font-weight:600; }
  .cm-mover-head .gf-chip { margin-left:auto; }
  .cm-mover-reason { font-size:12.5px; line-height:1.6; color:var(--text-soft); }
  .cm-mover-reason a { color:var(--text-soft); text-decoration:none; }
  .cm-mover-reason a:hover { color:var(--accent); text-decoration:underline; }
  /* 매크로 지표 카드 (오늘의 글로벌 시황) */
  .mind-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(118px,1fr)); gap:10px; margin:2px 0 14px; }
  .mind-card { background:var(--panel-soft); border:1px solid var(--border); border-top-width:3px;
    border-radius:11px; padding:10px 12px; }
  .mind-card.pos { border-top-color:var(--pos); }
  .mind-card.neg { border-top-color:var(--neg); }
  .mind-card.neu { border-top-color:var(--muted); }
  .mind-name { font-size:11px; font-weight:700; color:var(--text-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mind-val { font-size:19px; font-weight:800; letter-spacing:-.02em; margin-top:4px; color:var(--text); font-variant-numeric:tabular-nums; }
  .mind-foot { display:flex; align-items:center; gap:5px; margin-top:5px; }
  .mind-sig { font-size:10px; font-weight:800; }
  .mind-sig.pos { color:var(--pos); } .mind-sig.neg { color:var(--neg); } .mind-sig.neu { color:var(--muted); }
  .mind-asof { font-size:9.5px; color:var(--muted); margin-left:auto; font-weight:600; }
  .mind-chg { font-size:11px; font-weight:700; }
  .mind-chg.pos { color:var(--pos); } .mind-chg.neg { color:var(--neg); } .mind-chg.neu { color:var(--muted); }
  .mind-card.clickable { cursor:pointer; transition:border-color .12s, box-shadow .12s, transform .12s; }
  .mind-card.clickable:hover { border-color:var(--accent); box-shadow:var(--shadow-sm); transform:translateY(-1px); }
  .mind-card.sel { box-shadow:0 0 0 2px var(--accent) inset; }
  .mind-more { font-size:9px; opacity:.5; }
  /* 지표 과거 추이 막대그래프 패널 */
  .mind-chart-panel { margin:-6px 0 16px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px 10px; box-shadow:var(--shadow-sm); }
  .mc-head { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .mc-title { font-size:13.5px; font-weight:800; color:var(--text); }
  .mc-cur { font-size:12px; font-weight:700; color:var(--accent); }
  .mc-asof { font-size:10.5px; color:var(--muted); font-weight:600; }
  .mc-close { margin-left:auto; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer;
    padding:3px 9px; border-radius:7px; border:1px solid var(--border); }
  .mc-close:hover { background:var(--neu-soft); color:var(--text); }
  .mc-plot { position:relative; width:100%; cursor:crosshair; }
  .mc-chart { display:block; width:100%; height:170px; }
  .mc-line { fill:none; stroke:var(--accent); stroke-width:1.75; stroke-linejoin:round; stroke-linecap:round; }
  .mc-area { fill:var(--accent); opacity:.10; }
  .mc-zero { stroke:var(--muted); stroke-width:1; stroke-dasharray:3 3; opacity:.5; }
  .mc-crosshair { stroke:var(--muted); stroke-width:1; stroke-dasharray:2 2; opacity:0; }
  .mc-dot { fill:var(--panel); stroke:var(--accent); stroke-width:2; opacity:0; }
  .mc-hitzone { fill:transparent; }
  .mc-tip { position:absolute; pointer-events:none; z-index:5; background:var(--text); color:var(--panel);
    font-size:10.5px; font-weight:700; padding:3px 7px; border-radius:6px; white-space:nowrap; transform:translate(-50%,-100%); opacity:0; transition:opacity .08s; }
  .mc-axis { display:flex; justify-content:space-between; font-size:9.5px; color:var(--muted); font-weight:600; margin-top:2px; }
  .mc-note { font-size:10px; color:var(--muted); margin-top:8px; }
  .mc-empty { font-size:12px; color:var(--muted); font-style:italic; padding:22px 0; text-align:center; }
  .cm-region-idx { font-size:11px; font-weight:700; margin-left:6px; font-variant-numeric:tabular-nums; }
  .cm-region-list { display:flex; flex-direction:column; gap:8px; }
  .cm-region {
    background:var(--panel-soft); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; cursor:pointer; transition:all .15s;
  }
  .cm-region:hover { border-color:var(--accent); background:var(--accent-soft); }
  .cm-region-name { font-size:13px; font-weight:700; margin-bottom:3px; }
  .cm-region-text { font-size:12.5px; line-height:1.6; color:var(--text-soft); }

  /* ── Index summary bar ── */
  .idx-bar {
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;
  }
  .idx-card {
    flex:1 1 160px; min-width:140px; max-width:220px;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; box-shadow:var(--shadow-sm);
    display:flex; flex-direction:column; gap:3px;
  }
  .idx-card .iname { font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .idx-card .iprice { font-size:17px; font-weight:700; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .idx-card .ispark { margin-top:6px; margin-bottom:6px; }
  .idx-card .iytd { font-size:10.5px; color:var(--muted); margin-top:4px; }
  .idx-card .iytd .ytd-pos { color:var(--pos); font-weight:700; }
  .idx-card .iytd .ytd-neg { color:var(--neg); font-weight:700; }
  .idx-card .ichg-chip {
    align-self:flex-start; display:inline-block; padding:2px 7px; border-radius:7px;
    font-size:12px; font-weight:700; font-variant-numeric:tabular-nums;
  }
  .pos { color:var(--pos); }
  .neg { color:var(--neg); }
  .neu { color:var(--neu); }

  /* ── 등락 칩 (Google Finance 스타일) ── */
  .gf-chip {
    display:inline-block; padding:3px 8px; border-radius:8px;
    font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  .chip-pos { background:var(--pos-soft); color:var(--pos); }
  .chip-neg { background:var(--neg-soft); color:var(--neg); }
  .chip-neu { background:var(--neu-soft); color:var(--neu); }

  /* ── Google Finance 리스트 행 ── */
  .gf-list { display:flex; flex-direction:column; }
  .gf-row {
    display:flex; align-items:center; gap:12px; padding:10px 8px; border-radius:8px;
    border-top:1px solid var(--border);
  }
  .gf-row:first-child { border-top:none; }
  .gf-row:hover { background:var(--row-hover); }
  .gf-rank {
    width:22px; height:22px; flex-shrink:0; border-radius:50%;
    background:var(--neu-soft); color:var(--muted); font-size:10px; font-weight:700;
    text-align:center; line-height:22px;
  }
  .gf-rank.top3 { background:var(--accent-soft); color:var(--accent); }
  .gf-id { flex:1 1 auto; min-width:0; }
  .gf-name { font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gf-ticker { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gf-meta { font-size:10.5px; color:var(--muted); margin-top:2px; line-height:1.5;
             display:flex; flex-wrap:wrap; gap:4px 8px; }
  .gf-meta .mpos { color:var(--pos); font-weight:600; }
  .gf-meta .mneg { color:var(--neg); font-weight:600; }
  .gf-meta b { color:var(--text); font-weight:700; }
  .gf-spark { width:84px; flex-shrink:0; }
  @media (max-width:600px){ .gf-spark { display:none; } }
  .gf-price { width:104px; text-align:right; font-size:13.5px; font-weight:600; font-variant-numeric:tabular-nums; flex-shrink:0; }
  .gf-chg { width:92px; text-align:right; flex-shrink:0; }

  /* ── 마켓 트렌드 탭 ── */
  .trend-tabs {
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;
    border-bottom:1px solid var(--border); padding-bottom:10px;
  }
  .trend-tab {
    padding:5px 13px; border-radius:16px; border:1px solid var(--border); background:var(--panel);
    color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all .15s;
  }
  .trend-tab:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-soft); }
  .trend-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ── Sector heatmap ── */
  .sector-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap:8px; margin-bottom:20px;
  }
  .sector-cell {
    border-radius:8px; padding:10px 12px;
    display:flex; flex-direction:column; gap:2px;
    transition:transform .12s;
  }
  .sector-cell:hover { transform:translateY(-1px); }
  .sector-cell .sname { font-size:11px; font-weight:700; color:inherit; opacity:.85; }
  .sector-cell .spct { font-size:16px; font-weight:800; font-variant-numeric:tabular-nums; }
  .sector-cell .sperf { font-size:9.5px; font-weight:600; opacity:.72; margin-top:2px;
    font-variant-numeric:tabular-nums; letter-spacing:-.01em; white-space:nowrap; }
  .sector-cell .setf { font-size:10px; opacity:.6; margin-top:1px; }
  .sector-cell.clickable { cursor:pointer; }
  .sector-cell.clickable:hover { box-shadow:0 0 0 2px var(--accent) inset; }
  .sector-cell .smore { font-size:9.5px; font-weight:700; opacity:.7; margin-top:3px; }
  .sector-cell.sel { box-shadow:0 0 0 2px var(--accent) inset; }
  /* 섹터 상위종목 패널 */
  .sector-hold-panel {
    margin-top:12px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px; box-shadow:var(--shadow-sm);
  }
  .sh-title { font-size:14px; font-weight:800; margin-bottom:10px; display:flex; align-items:center; }
  .sh-note { font-size:10.5px; color:var(--muted); margin-top:8px; }
  .sh-close { margin-left:auto; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; padding:2px 8px; border-radius:6px; }
  .sh-close:hover { background:var(--neu-soft); color:var(--text); }
  .sh-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  .sh-table th, .sh-table td { padding:7px 9px; border-bottom:1px solid var(--border); }
  .sh-table th { font-size:11px; font-weight:600; color:var(--muted); text-align:left; }
  .sh-table td.mom { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .sh-table .sh-rank { color:var(--muted); width:24px; text-align:center; }
  .sh-table .sh-name { font-weight:700; }
  .sh-table .sh-mc { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .sh-table .sh-krw { color:var(--muted); font-size:11px; }
  .sh-table tbody tr:hover { background:var(--panel-soft); }
  .heat-big-pos   { background:var(--pos);  color:#fff; }
  .heat-pos       { background:#16a34a22; color:var(--pos); border:1px solid #16a34a33; }
  .heat-pos-light { background:#16a34a11; color:var(--pos); border:1px solid #16a34a22; }
  .heat-neu       { background:var(--neu-soft); color:var(--neu); border:1px solid var(--border); }
  .heat-neg-light { background:#dc262611; color:var(--neg); border:1px solid #dc262622; }
  .heat-neg       { background:#dc262622; color:var(--neg); border:1px solid #dc262633; }
  .heat-big-neg   { background:var(--neg);  color:#fff; }

  /* ── Featured stocks ── */
  .featured-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px;
  }
  .feat-card {
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:0; box-shadow:var(--shadow-sm); overflow:hidden;
    transition:transform .15s, box-shadow .15s, border-color .15s;
  }
  .feat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--accent); }
  .feat-card.dir-pos { border-top:3px solid var(--pos); }
  .feat-card.dir-neg { border-top:3px solid var(--neg); }
  .feat-card .fc-body { padding:15px 18px 6px; }
  .feat-card .fc-header {
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;
  }
  .feat-card .fc-name { font-size:15.5px; font-weight:800; letter-spacing:-.01em; line-height:1.25; }
  .feat-card .fc-ticker { font-size:11px; color:var(--muted); margin-top:3px; display:flex; gap:6px; flex-wrap:wrap; }
  .feat-card .fc-tag { background:var(--neu-soft); padding:1px 7px; border-radius:6px; font-weight:600; }
  .feat-card .fc-badge {
    font-size:12px; font-weight:800; padding:5px 10px; border-radius:10px;
    white-space:nowrap; font-variant-numeric:tabular-nums;
  }
  .badge-pos { background:var(--pos-soft); color:var(--pos); }
  .badge-neg { background:var(--neg-soft); color:var(--neg); }
  .feat-card .fc-priceline { display:flex; align-items:baseline; gap:8px; }
  .feat-card .fc-price { font-size:23px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .feat-card .fc-chg { font-size:12.5px; font-weight:600; font-variant-numeric:tabular-nums; }
  .feat-card .fc-spark { margin:8px 0 2px; }
  .feat-card .news-wrap { padding:4px 18px 16px; }
  .feat-card .news-head { font-size:10.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; color:var(--muted); margin:8px 0 7px; }
  .feat-card .news-list { display:flex; flex-direction:column; }
  /* 특징주 카드 내 뉴스 — Google Finance 스타일 구분선 리스트 */
  .news-item { padding:9px 0; border-top:1px solid var(--border); transition:opacity .12s; }
  .news-item:first-child { border-top:none; padding-top:2px; }
  .news-item:hover { opacity:.82; }
  .news-item .ntitle { font-size:12.5px; font-weight:600; line-height:1.45; color:var(--text); display:block; }
  .news-item a.ntitle { text-decoration:none; color:var(--text); }
  .news-item a.ntitle:hover { color:var(--accent); }
  .news-item .nmeta { font-size:10.5px; color:var(--muted); margin-top:4px; }
  .news-item .ntime.fresh { color:var(--pos); font-weight:700; }
  .news-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--pos);
    margin-right:5px; vertical-align:middle; }
  .no-news { font-size:12px; color:var(--muted); font-style:italic; padding:8px 18px 16px; }

  /* ── 개요 섹션 (Google Finance 스타일) ── */
  .ov-sec { margin:22px 0; }
  .ov-sec-head { display:flex; align-items:baseline; gap:9px; margin:0 0 13px; }
  .ov-sec-title { font-size:16px; font-weight:800; letter-spacing:-.015em; color:var(--text); }
  .ov-sec-sub { margin-left:auto; font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; }

  /* 주요 이벤트 — 뉴스 카드 그리드 */
  .ovn-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(290px,1fr)); gap:12px; }
  .ovn-card {
    display:flex; flex-direction:column; gap:7px;
    background:var(--panel); border:1px solid var(--border); border-radius:13px;
    padding:14px 16px; transition:border-color .15s, box-shadow .15s, transform .15s;
  }
  .ovn-card:hover { border-color:var(--accent); box-shadow:var(--shadow-sm); transform:translateY(-1px); }
  .ovn-top { display:flex; align-items:center; gap:7px; }
  .ovn-scope { font-size:9.5px; font-weight:800; letter-spacing:.03em; padding:2px 8px; border-radius:10px;
    background:rgba(79,140,255,.16); color:#5b8cff; }
  .ovn-src { font-size:11px; font-weight:700; color:var(--text-soft); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .ovn-time { margin-left:auto; font-size:10.5px; color:var(--muted); font-weight:600; white-space:nowrap; }
  .ovn-title { font-size:13.5px; font-weight:700; line-height:1.45; color:var(--text); }
  .ovn-card a.ovn-title { text-decoration:none; color:var(--text); }
  .ovn-card a.ovn-title:hover { color:var(--accent); }
  .ovn-desc { font-size:12px; line-height:1.55; color:var(--muted);
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

  /* 주요종목 등락 — Market trends 스타일 타일 */
  .ovm-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(265px,1fr)); gap:11px; }
  .ovm-tile {
    background:var(--panel); border:1px solid var(--border); border-radius:13px;
    padding:13px 15px; cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .15s;
  }
  .ovm-tile:hover { border-color:var(--accent); box-shadow:var(--shadow-sm); transform:translateY(-1px); }
  .ovm-thead { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .ovm-name { font-size:14px; font-weight:800; letter-spacing:-.01em; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ovm-tkr { font-size:10.5px; color:var(--muted); font-weight:600; flex-shrink:0; }
  .ovm-pill { margin-left:auto; flex-shrink:0; font-size:13.5px; font-weight:800; padding:3px 10px;
    border-radius:10px; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .ovm-reason { font-size:12px; line-height:1.6; color:var(--text-soft);
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .ovm-reason a { color:inherit; text-decoration:none; }
  .ovm-reason a:hover { color:var(--accent); text-decoration:underline; }
  .ovm-detail { font-size:11px; line-height:1.5; color:var(--muted); margin-top:4px; }
  @media (max-width:600px) {
    .ovn-grid, .ovm-grid { grid-template-columns:1fr; }
  }
  /* 방향 태그 (상승/하락 1위) */
  .fc-dirtag { font-weight:800; }
  .fc-dirtag.dt-pos { background:var(--pos-soft); color:var(--pos); }
  .fc-dirtag.dt-neg { background:var(--neg-soft); color:var(--neg); }

  /* 대표지수 클릭 → 히트맵 트리거 */
  .ov-idx-map { cursor:pointer; color:var(--accent); font-weight:700; display:inline-flex; align-items:center; gap:4px; }
  .ov-idx-map:hover { text-decoration:underline; }

  /* ── finviz 스타일 트리맵 ── */
  .treemap-panel {
    margin:0 0 22px; background:var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px 16px; box-shadow:var(--shadow-sm);
  }
  .tm-head { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:6px; }
  .tm-title { font-size:15px; font-weight:800; letter-spacing:-.01em; color:var(--text); }
  .tm-sub { font-size:11px; color:var(--muted); font-weight:600; }
  .tm-close { margin-left:auto; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer;
    padding:3px 9px; border-radius:7px; border:1px solid var(--border); }
  .tm-close:hover { background:var(--neu-soft); color:var(--text); }
  .tm-legend { display:flex; align-items:center; gap:3px; font-size:10px; color:var(--muted); font-weight:600; margin:2px 0 10px; }
  .tm-legend i { width:16px; height:11px; border-radius:2px; display:inline-block; }
  .tm-canvas { position:relative; width:100%; aspect-ratio:1000 / 600; min-height:320px;
    background:var(--bg); border-radius:8px; overflow:hidden; }
  .tm-sector { position:absolute; box-sizing:border-box; border:1px solid var(--bg);
    background:var(--panel-soft); overflow:hidden; }
  .tm-sector-lbl { position:absolute; left:0; right:0; top:0; height:15px; line-height:15px;
    font-size:10px; font-weight:800; color:var(--text-soft); padding:0 5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.85; pointer-events:none; }
  .tm-tile { position:absolute; box-sizing:border-box; border:1px solid var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; line-height:1.1; overflow:hidden; cursor:default; }
  .tm-tile .tm-tkr { font-weight:800; letter-spacing:-.02em; }
  .tm-tile .tm-pct { font-weight:600; opacity:.92; }
  .tm-empty { color:var(--muted); font-size:12px; font-style:italic; padding:30px 0; text-align:center; }

  /* ── 브리핑 카드 (장전/장마감후 시황) ── */
  .bfc-hero { margin:6px 0 4px; }
  .bfc-kicker { display:inline-block; font-size:11px; font-weight:800; color:var(--accent);
    background:var(--accent-soft); padding:3px 11px; border-radius:20px; margin-bottom:11px; }
  .bfc-h1 { font-size:25px; font-weight:800; line-height:1.22; letter-spacing:-.02em; margin:0 0 12px; color:var(--text); }

  .bfc-knews { display:flex; flex-direction:column; gap:13px; }

  .bfc-kn .dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; background:var(--muted); }
  .bfc-kn .dot.up { background:var(--pos); } .bfc-kn .dot.down { background:var(--neg); }
  .bfc-kn .kt { display:block; font-size:12.5px; font-weight:700; line-height:1.45; color:var(--text); text-decoration:none; }
  .bfc-kn a.kt:hover { color:var(--accent); }
  .bfc-kn .kd { font-size:11.5px; line-height:1.55; color:var(--muted); margin-top:3px; }
  .bfc-kn .ksrc { font-size:10.5px; font-weight:600; color:var(--accent); margin-top:4px; }

  .bfc-watch { display:flex; flex-direction:column; }
  .bfc-wp { display:flex; gap:11px; padding:11px 0; border-top:1px solid var(--border); }
  .bfc-wp:first-child { border-top:none; padding-top:2px; }

  @media (max-width:720px){ .bfc-snap, .bfc-two { grid-template-columns:1fr; } }

  /* ── Sparkline SVG ── */
  .sparkline { display:block; width:100%; height:40px; }

  /* ── Two-col layout ── */

<body>
<header>

  </div>

  </div>
</header>

<main id="app">
  <div class="loading">데이터를 불러오는 중입니다…</div>
</main>

<script>
/* ─────────────────────────────────────────────────────────────
   유틸리티
───────────────────────────────────────────────────────────── */
function fmt(v, d) {
  if (v == null) return '—';
  return Number(v).toFixed(d != null ? d : 2);
}
function fmtPct(v) {
  if (v == null) return '—';
  var sign = v > 0 ? '+' : '';
  return sign + fmt(v, 2) + '%';
}
function colorClass(v) {
  if (v == null) return 'neu';
  return v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
}
function heatClass(v) {
  if (v == null) return 'heat-neu';
  if (v >= 2)   return 'heat-big-pos';
  if (v >= 0.5) return 'heat-pos';
  if (v > 0)    return 'heat-pos-light';
  if (v === 0)  return 'heat-neu';
  if (v > -0.5) return 'heat-neg-light';
  if (v > -2)   return 'heat-neg';
  return 'heat-big-neg';
}
function relTime(isoStr) {
  if (!isoStr) return '';
  try {
    var d = new Date(isoStr);
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 3600)  return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  } catch(e) { return ''; }
}
// 뉴스 시각(ms). 파싱 불가/없으면 0.
function newsTimeMs(n) {
  var t = n && n.time;
  if (!t) return 0;
  var ms = Date.parse(t);
  return isNaN(ms) ? 0 : ms;
}
// 최신순 정렬 (시각 없는 항목은 뒤로)
function sortNewsDesc(arr) {
  return (arr || []).slice().sort(function(a, b){ return newsTimeMs(b) - newsTimeMs(a); });
}

/* ── Sparkline SVG (Google Finance 스타일 area chart 지원) ── */
var _sparkId = 0;
function makeSpark(data, opts) {
  var o = opts || {};
  var w = o.w || 120, h = o.h || 40;
  var cls = o.cls || 'sparkline';
  if (!data || data.length < 2) return '<svg class="' + cls + '" viewBox="0 0 ' + w + ' ' + h + '"></svg>';
  var vals = data.filter(function(v){ return v != null; });
  if (vals.length < 2) return '<svg class="' + cls + '" viewBox="0 0 ' + w + ' ' + h + '"></svg>';
  var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals);
  var rng = mx - mn || 1;
  var pad = h * 0.12;
  var pts = vals.map(function(v, i) {
    var x = (i / (vals.length - 1)) * w;
    var y = pad + (1 - (v - mn) / rng) * (h - pad * 2);
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  var isPos = vals[vals.length-1] >= vals[0];
  var stroke = isPos ? 'var(--pos)' : 'var(--neg)';
  var lastY = pad + (1 - (vals[vals.length-1] - mn) / rng) * (h - pad * 2);
  var svg = '<svg class="' + cls + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">';
  if (o.area) {
    var gid = 'spk' + (_sparkId++);
    svg += '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="' + stroke + '" stop-opacity="0.20"/>' +
      '<stop offset="100%" stop-color="' + stroke + '" stop-opacity="0"/></linearGradient></defs>';
    svg += '<polygon points="0,' + h + ' ' + pts + ' ' + w + ',' + h + '" fill="url(#' + gid + ')" stroke="none"/>';
  }
  svg += '<polyline points="' + pts + '" fill="none" stroke="' + stroke + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<circle cx="' + w.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="2.5" fill="' + stroke + '"/>' +
    '</svg>';
  return svg;
}

/* ─────────────────────────────────────────────────────────────
   테마 토글
───────────────────────────────────────────────────────────── */
(function() {
  var btn = document.getElementById('themeToggle');
  function syncBtn() {
    var t = document.documentElement.getAttribute('data-theme') || 'light';
    btn.querySelector('.icon').textContent = t === 'dark' ? '☀️' : '🌙';
    btn.querySelector('.label').textContent = t === 'dark' ? '라이트' : '다크';
  }
  syncBtn();
  btn.addEventListener('click', function() {
    var cur = document.documentElement.getAttribute('data-theme') || 'light';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('pf_theme', next); } catch(e) {}
    syncBtn();
  });
})();

/* ─────────────────────────────────────────────────────────────
   메인 렌더링
───────────────────────────────────────────────────────────── */
(function() {
  var D = window.DAILY;
  if (!D) {
    document.getElementById('app').innerHTML =
      '<div class="loading">daily-data.js를 불러올 수 없습니다. 로컬에서 fetch_daily.py를 먼저 실행해 주세요.</div>';
    return;
  }

  document.getElementById('subtitle').textContent =
    '최신 거래일 ' + D.as_of + '  •  지역별 기준일은 각 탭 참고  •  생성: ' +
    (D.generated_utc || '').replace('T', ' ').replace('Z', ' UTC');

  // 현재 선택 지역
  var currentRegion = 'overview';

  function getRegion(key) {
    return (D.regions || []).find(function(r){ return r.key === key; });
  }

  /* ── 전체 개요 글로벌 시황 ── */
  // 일간 매크로 줄글에서 지표값·일간변동 파싱 (fetch_daily가 생성한 문장)
  function parseDailyMacro(t) {
    t = t || ''; var o = {}, m;
    if ((m = t.match(/VIX\)?\s*([\d.]+)\s*\(([-+]?[\d.]+)%\)/)))        o.vix   = { v: parseFloat(m[1]), chg: parseFloat(m[2]) };
    if ((m = t.match(/10년물[^0-9]{0,12}([\d.]+)\s*%/)))                o.us10y = { v: parseFloat(m[1]) };
    if ((m = t.match(/WTI[^0-9]{0,12}([\d.]+)\s*달러\s*\(([-+]?[\d.]+)%\)/))) o.wti = { v: parseFloat(m[1]), chg: parseFloat(m[2]) };
    if ((m = t.match(/원\/달러[^0-9]{0,12}([\d,]+)\s*원\s*\(([-+]?[\d.]+)%\)/)))  o.fx  = { v: parseFloat(m[1].replace(/,/g, '')), chg: parseFloat(m[2]) };
    return o;
  }

  // 매크로 핵심 지표 카드 — 값은 일간 줄글 우선(달러 레벨·일간변동), 신호/기준일은 macro-data.js
  function renderMacroIndicators(macroStr) {
    var M = window.MACRO, I = (M && M.indicators) || {};
    var P = parseDailyMacro(macroStr);
    function chg(c) {
      return (c != null && !isNaN(c))
        ? ' <span class="mind-chg ' + colorClass(c) + '">' + (c > 0 ? '+' : '') + c.toFixed(1) + '%</span>' : '';
    }
    function card(key, label, valHtml, d) {
      var cls = (d && d.signal_cls) || 'neu';
      return '<div class="mind-card clickable ' + cls + '" onclick="showMindChart(\'' + key + '\')" ' +
        'title="클릭 시 과거 추이 막대그래프">' +
        '<div class="mind-name">' + escHtml(label) + ' <span class="mind-more">📊</span></div>' +
        '<div class="mind-val">' + valHtml + '</div>' +
        '<div class="mind-foot">' +
          (d && d.signal ? '<span class="mind-sig ' + cls + '">' + escHtml(d.signal) + '</span>' : '') +
          (d && d.as_of ? '<span class="mind-asof">' + d.as_of + '</span>' : '') +
        '</div></div>';
    }
    var out = [];
    var vix = I.vix || {};
    if (P.vix || vix.current != null)
      out.push(card('vix', 'VIX 변동성', (P.vix ? P.vix.v.toFixed(1) + chg(P.vix.chg) : String(vix.current)), vix));
    var y = I.us10y || {};
    if (P.us10y || y.current != null)
      out.push(card('us10y', '미국 10Y 금리', (P.us10y ? P.us10y.v.toFixed(2) : y.current) + '%', y));
    var oil = I.oil_yoy || {};
    if (P.wti)
      out.push(card('oil_yoy', 'WTI 유가', '$' + P.wti.v.toFixed(1) + chg(P.wti.chg), oil));
    else if (oil.current != null)
      out.push(card('oil_yoy', 'WTI 유가(YoY)', (oil.current > 0 ? '+' : '') + oil.current.toFixed(1) + '%', oil));
    var fx = I.usdkrw || {};
    if (P.fx || fx.current != null)
      out.push(card('usdkrw', 'USD/KRW', Math.round(P.fx ? P.fx.v : fx.current).toLocaleString('ko-KR') + '원' + (P.fx ? chg(P.fx.chg) : ''), fx));
    var vk = I.vkospi || {};
    if (vk.current != null)
      out.push(card('vkospi', 'VKOSPI', String(vk.current), vk));
    var fng = I.cnn_fng || {};
    if (fng.current != null)
      out.push(card('cnn_fng', 'CNN 공포·탐욕', String(fng.current), fng));
    if (!out.length) return '';
    return '<div class="mind-grid">' + out.join('') + '</div>' +
      '<div id="mindChartPanel" class="mind-chart-panel" style="display:none"></div>';
  }

  // 지표 과거 추이 막대그래프 (SVG) — macro-data.js indicators[key].history 사용
  function mindHistFmt(key, v) {
    if (key === 'usdkrw') return Math.round(v).toLocaleString('ko-KR') + '원';
    if (key === 'us10y')  return v.toFixed(2) + '%';
    if (key === 'oil_yoy') return (v > 0 ? '+' : '') + v.toFixed(1) + '%';
    return (Math.round(v * 100) / 100).toString();
  }
  // 지표별 차트 지오메트리를 showMindChart의 mousemove 핸들러에서 재사용하기 위해 보관
  var _mindChartState = null;
  function renderMindChart(key, d) {
    var name = (d && d.name) || key;
    var head = '<div class="mc-head"><span class="mc-title">' + escHtml(name) + '</span>' +
      (d && d.current != null ? '<span class="mc-cur">현재 ' + mindHistFmt(key, d.current) + '</span>' : '') +
      (d && d.as_of ? '<span class="mc-asof">' + d.as_of + '</span>' : '') +
      '<span class="mc-close" onclick="showMindChart(\'' + key + '\')">✕ 닫기</span></div>';
    var h = d && d.history;
    var vals = h && (h.values || h.vals), dates = h && h.dates;
    _mindChartState = null;
    if (!vals || !vals.length || !dates || !dates.length) {
      return head + '<div class="mc-empty">과거 시계열이 없습니다. ' +
        (d && d.manual ? '(수동 지표 — 현재값만 저장)' : '') + '</div>';
    }
    // 라인차트는 밀도가 높아도 가독성이 유지되므로 다운샘플 없이 전체 시계열 표시(장기 추이 확인 목적)
    var n = vals.length;
    var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals);
    var hasNeg = mn < 0;
    var domMin, domMax;
    if (hasNeg) { domMax = Math.max(0, mx); domMin = Math.min(0, mn); var pad = (domMax - domMin) * 0.08 || 1; domMax += pad; domMin -= pad; }
    else { var rng = (mx - mn) || Math.abs(mx) || 1; domMin = mn - rng * 0.1; domMax = mx + rng * 0.1; }
    var W = 600, H = 170, PL = 4, PR = 4, PT = 10, PB = 10;
    var iw = W - PL - PR, ih = H - PT - PB;
    var xOf = function(i){ return n > 1 ? PL + (i / (n - 1)) * iw : PL + iw / 2; };
    var yOf = function(v){ return PT + (1 - (v - domMin) / (domMax - domMin)) * ih; };
    var pts = vals.map(function(v, i){ return [xOf(i), yOf(v)]; });
    var lineD = pts.map(function(p, i){ return (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join('');
    var baseY = (PT + ih).toFixed(1);
    var areaD = 'M' + pts[0][0].toFixed(1) + ',' + baseY + 'L' + pts.map(function(p){ return p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join('L') + 'L' + pts[pts.length - 1][0].toFixed(1) + ',' + baseY + 'Z';
    var zeroLine = hasNeg ? '<line class="mc-zero" x1="' + PL + '" y1="' + yOf(0).toFixed(1) + '" x2="' + (W - PR) + '" y2="' + yOf(0).toFixed(1) + '"></line>' : '';
    var svg = '<svg class="mc-chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
      '<path class="mc-area" d="' + areaD + '"></path>' +
      zeroLine +
      '<path class="mc-line" d="' + lineD + '" vector-effect="non-scaling-stroke"></path>' +
      '<line class="mc-crosshair" x1="0" y1="' + PT + '" x2="0" y2="' + (PT + ih) + '"></line>' +
      '<circle class="mc-dot" r="4"></circle>' +
      '<rect class="mc-hitzone" x="0" y="0" width="' + W + '" height="' + H + '"></rect>' +
      '</svg>';
    var axis = '<div class="mc-axis"><span>' + dates[0] + '</span><span>' + dates[dates.length - 1] + '</span></div>';
    _mindChartState = { key: key, vals: vals, dates: dates, xOf: xOf, yOf: yOf, W: W, H: H, fmt: function(v){ return mindHistFmt(key, v); } };
    return head + '<div class="mc-plot">' + svg + '<div class="mc-tip"></div></div>' + axis +
      '<div class="mc-note">그래프 위에 커서를 올리면 날짜·수치가 표시됩니다 · 전체 ' + n + '개 시점(' + dates[0] + ' ~ ' + dates[dates.length - 1] + ')</div>';
  }
  window.showMindChart = function(key) {
    var panel = document.getElementById('mindChartPanel');
    if (!panel) return;
    var d = (window.MACRO && window.MACRO.indicators && window.MACRO.indicators[key]) || {};
    if (panel.dataset.open === key && panel.style.display !== 'none') {
      panel.style.display = 'none'; panel.dataset.open = '';
      document.querySelectorAll('.mind-card.sel').forEach(function(e){ e.classList.remove('sel'); });
      return;
    }
    panel.innerHTML = renderMindChart(key, d);
    panel.style.display = 'block'; panel.dataset.open = key;
    // 활성 카드 표시
    document.querySelectorAll('.mind-card.sel').forEach(function(e){ e.classList.remove('sel'); });
    var cards = document.querySelectorAll('.mind-card');
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].getAttribute('onclick') && cards[i].getAttribute('onclick').indexOf("'" + key + "'") >= 0) { cards[i].classList.add('sel'); break; }
    }
    // 호버: 크로스헤어 + 최근접 포인트 도트 + 툴팁(마우스무브로 가장 가까운 데이터 포인트 탐색)
    var st = _mindChartState;
    if (!st) return;
    var plot = panel.querySelector('.mc-plot');
    var svgEl = panel.querySelector('.mc-chart');
    var hit = panel.querySelector('.mc-hitzone');
    var crosshair = panel.querySelector('.mc-crosshair');
    var dot = panel.querySelector('.mc-dot');
    var tip = panel.querySelector('.mc-tip');
    if (!plot || !hit) return;
    function moveTo(clientX, clientY) {
      var r = svgEl.getBoundingClientRect();
      var svgX = (clientX - r.left) / r.width * st.W;
      var n = st.vals.length;
      var idx = 0, best = Infinity;
      for (var i = 0; i < n; i++) { var dx = Math.abs(st.xOf(i) - svgX); if (dx < best) { best = dx; idx = i; } }
      var px = st.xOf(idx), py = st.yOf(st.vals[idx]);
      crosshair.setAttribute('x1', px); crosshair.setAttribute('x2', px); crosshair.style.opacity = '1';
      dot.setAttribute('cx', px); dot.setAttribute('cy', py); dot.style.opacity = '1';
      tip.textContent = st.dates[idx] + ' · ' + st.fmt(st.vals[idx]);
      tip.style.opacity = '1';
      var pr = plot.getBoundingClientRect();
      var tipX = (px / st.W) * pr.width, tipY = (py / st.H) * pr.height;
      tip.style.left = Math.min(Math.max(tipX, 24), pr.width - 24) + 'px';
      tip.style.top = Math.max(tipY - 8, 14) + 'px';
    }
    hit.addEventListener('mousemove', function(e){ moveTo(e.clientX, e.clientY); });
    hit.addEventListener('mouseleave', function(){ crosshair.style.opacity = '0'; dot.style.opacity = '0'; tip.style.opacity = '0'; });
    // 터치 디바이스 지원
    hit.addEventListener('touchmove', function(e){ if (e.touches && e.touches[0]) { moveTo(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, { passive: false });
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  /* ── 브리핑 → 카드 본문 파싱 헬퍼 ── */
  // 인트로: '_' 로 시작하는 첫 내러티브 문단
  function bfNarrative(sel) {
    var paras = sel.paragraphs || [];
    for (var i = 0; i < paras.length; i++) {
      var t = String(paras[i] || '').trim();
      if (t.charAt(0) === '_') return t.replace(/^_\s*/, '');
    }
    // 폴백: 인사말·통계·주석 아닌 첫 문단
    for (var j = 0; j < paras.length; j++) {
      var s = String(paras[j] || '').trim();
      if (!s || /^[*※]/.test(s) || /^(안녕|감사|금일)/.test(s)) continue;
      return s.replace(/^_\s*/, '');
    }
    return '';
  }
  // 등락 방향 (텍스트 기반)
  function dirOfText(t) {
    t = t || '';
    var neg = /(하락|급락|약세|매도|부진|내림|우려|둔화|경고)/.test(t);
    var pos = /(상승|급등|강세|매수|호조|반등|개선|기대)/.test(t);
    if (neg && !pos) return 'down';
    if (pos && !neg) return 'up';
    return 'neu';
  }
  // 특정 지수명 뒤의 등락률(%)을 추출 (부호문자 △▽▼/±, 또는 하락/상승 단어로 방향 판정)
  function pctAfter(text, key) {
    var i = text.indexOf(key);
    if (i < 0) return null;
    var win = text.slice(i + key.length, i + key.length + 30);
    var m = win.match(/([△▽▼▲+\-]?)\s*([0-9]+(?:\.[0-9]+)?)\s*%/);
    if (!m) return null;
    var val = parseFloat(m[2]);
    var ctx = win.slice(0, m.index + m[0].length + 6);
    var neg = /[△▽▼\-]/.test(m[1]) || /(하락|급락|약세|부진|내림)/.test(ctx);
    var pos = /[▲+]/.test(m[1]) || /(상승|급등|강세|호조)/.test(ctx);
    if (!neg && !pos) return null;   // 방향 불명이면 버림(오탐 방지)
    return val * (neg ? -1 : 1);
  }
  // report·통계문단에서 주요 지수 등락 칩 추출
  var BF_IDX = [
    { keys: ['필라델피아 반도체', '필라델피아반도체', 'SOX'], label: '필라델피아 반도체' },
    { keys: ['나스닥'], label: '나스닥' },
    { keys: ['S&P500', 'S&P 500', 'S&P'], label: 'S&P 500' },
    { keys: ['다우'], label: '다우' },
    { keys: ['코스피'], label: '코스피' },
    { keys: ['코스닥'], label: '코스닥' },
    { keys: ['닛케이'], label: '닛케이' },
    { keys: ['상해종합', '상해'], label: '상해종합' },
    { keys: ['항셍'], label: '항셍' },
    { keys: ['Euro Stoxx50', 'Euro Stoxx', '유로스톡스'], label: 'Euro Stoxx' },
    { keys: ['DAX'], label: 'DAX' }
  ];
  function bfIdxChips(sel) {
    var texts = [];
    var rep = sel.report || {};
    (rep.sections || []).forEach(function(s) {
      (s.points || []).forEach(function(p) {
        if (p.text) texts.push(p.text);
        (p.subs || []).forEach(function(u) { texts.push(u); });
      });
    });
    (sel.paragraphs || []).forEach(function(p) {
      var t = String(p || '');
      if (t.charAt(0) === '*') texts.push(t.replace(/^\*\s*/, ''));
    });
    var chips = [], seen = {};
    BF_IDX.forEach(function(idx) {
      if (seen[idx.label]) return;
      for (var i = 0; i < texts.length; i++) {
        for (var k = 0; k < idx.keys.length; k++) {
          var v = pctAfter(texts[i], idx.keys[k]);
          if (v != null) { chips.push({ name: idx.label, pct: v }); seen[idx.label] = 1; break; }
        }
        if (seen[idx.label]) break;
      }
    });
    return chips;
  }
  // 출처 매칭용 풀: 개요 commentary의 이벤트·무버(제목·사유 + 출처·링크)
  function bfSourcePool() {
    var pool = [];
    (D.regions || []).forEach(function(r) {
      var c = r.commentary;
      if (!c || typeof c !== 'object' || Array.isArray(c)) return;
      (c.events || []).forEach(function(e) {
        if (e.title) pool.push({ text: e.title + ' ' + (e.desc || ''), source: e.source, link: e.link });
      });
      (c.movers || []).forEach(function(m) {
        if (m.name || m.reason) pool.push({ text: (m.name || '') + ' ' + (m.reason || '') + ' ' + (m.detail || ''), source: m.source, link: m.link });
      });
    });
    return pool;
  }
  // 텍스트에서 매칭 키워드 추출(고유명사·티커 위주, 일반어 제외)
  var BF_STOP = /^(하락|상승|급락|급등|강세|약세|마감|지수|증시|시장|기록|대비|전일|섹터|종목|혼조|보합|상승세|하락세|주요|영향|우려|기대|전망|예상|발표|보도|가운데|이날|당일|미국|한국|일본|중국|유럽)$/;
  function bfKwords(t) {
    var set = {};
    (String(t || '').match(/[A-Z]{2,}/g) || []).forEach(function(w) { set[w] = 1; });
    (String(t || '').match(/[가-힣]{2,}/g) || []).forEach(function(w) { if (!BF_STOP.test(w)) set[w] = 1; });
    return Object.keys(set);
  }
  function bfMatchSource(text, pool) {
    var kws = bfKwords(text);
    if (kws.length < 1 || !pool.length) return null;
    var best = null, bestScore = 0;
    pool.forEach(function(p) {
      var sc = 0;
      kws.forEach(function(k) { if (p.text.indexOf(k) >= 0) sc++; });
      if (sc > bestScore) { bestScore = sc; best = p; }
    });
    if (best && bestScore >= 2) return { source: best.source || '', link: best.link || null };
    return null;   // 고신뢰(키워드 2개+) 매칭만 — 오귀속 방지
  }
  // 핵심 뉴스: report.sections → {head, detail, dir, source, link}
  function bfKeyNews(sel, pool) {
    var rep = sel.report || {};
    pool = pool || [];
    return (rep.sections || []).slice(0, 6).map(function(s) {
      var det = [];
      (s.points || []).forEach(function(p) {
        if (p.text) det.push(p.text);
        (p.subs || []).forEach(function(u) { det.push(u); });
      });
      var head = s.head || '';
      var src = bfMatchSource(head + ' ' + det.join(' '), pool);
      return {
        head: head, detail: det.slice(0, 2).join(' · '),
        dir: dirOfText(head + ' ' + det.join(' ')),
        source: src ? src.source : '', link: src ? src.link : null
      };
    }).filter(function(n) { return n.head; });
  }
  // 관전 포인트: 수치·종목이 담긴 구체 팩트 bullet 상위 4개
  function bfWatchPoints(sel) {
    // 진짜 전망: 브리핑이 생성한 outlook(앞을 내다보는 관전 포인트) 우선 사용.
    if (sel.outlook && sel.outlook.length) {
      return sel.outlook.filter(function(t){ return t && String(t).trim(); }).slice(0, 4);
    }
    // 폴백(구 브리핑 데이터): report 에서 핵심 라인 추출.
    var rep = sel.report || {}, items = [], seen = {};
    (rep.sections || []).forEach(function(s) {
      (s.points || []).forEach(function(p) {
        [p.text].concat(p.subs || []).forEach(function(t) {
          if (!t) return;
          t = String(t).trim();
          if (!/([0-9]+(?:\.[0-9]+)?\s*%|[A-Z]{2,}|급등|급락|강세|약세)/.test(t)) return;
          var key = t.slice(0, 12);
          if (seen[key]) return; seen[key] = 1;
          items.push(t);
        });
      });
    });
    return items.slice(0, 4);
  }

  // 브리핑 카드 본문 (hero + snapshot + 핵심뉴스 + 관전포인트)
  function renderBriefingBody(sel, feed) {
    var html = '';
    var head = (sel.report && (sel.report.headline || (sel.report.sections && sel.report.sections[0] && sel.report.sections[0].head))) || sel.title || '';
    // 헤드라인 콤마 기준 2줄 분리(둘째줄 강조)
    var h1;
    var ci = head.indexOf(',');
    if (ci > 4 && ci < head.length - 3) {
      h1 = escHtml(head.slice(0, ci + 1)) + '<span class="l2">' + escHtml(head.slice(ci + 1).trim()) + '</span>';
    } else { h1 = escHtml(head); }

    html += '<div class="bfc-hero">';
    html += '<span class="bfc-kicker">' + (feed.phaseIcon || '') + ' ' + escHtml(feed.phaseLabel || '') +
      (sel.as_of ? ' · ' + sel.as_of : '') + '</span>';
    html += '<h1 class="bfc-h1">' + h1 + '</h1>';
    var intro = bfNarrative(sel);
    if (intro) html += '<p class="bfc-intro">' + escHtml(intro) + '</p>';
    html += '</div>';

    // 스냅샷: 하이라이트(최대 절대등락) + 지수 카드
    var chips = bfIdxChips(sel);
    if (chips.length >= 2) {
      var hi = chips.slice().sort(function(a, b){ return Math.abs(b.pct) - Math.abs(a.pct); })[0];
      var rest = chips.filter(function(c){ return c.name !== hi.name; }).slice(0, 4);
      html += '<div class="bfc-snap">';
      html += '<div class="bfc-hi ' + (hi.pct < 0 ? 'down' : 'up') + '">' +
        '<span class="lbl">오늘의 키 드라이버</span>' +
        '<span class="big">' + fmtPct(hi.pct) + '</span>' +
        '<span class="nm">' + escHtml(hi.name) + '</span>' +
      '</div>';
      html += '<div class="bfc-mcards">';
      rest.forEach(function(c) {
        html += '<div class="bfc-mc"><div class="mn">' + escHtml(c.name) + '</div>' +
          '<div class="mv ' + colorClass(c.pct) + '">' + fmtPct(c.pct) + '</div></div>';
      });
      html += '</div></div>';
    }

    // 두 컬럼: 핵심 뉴스 · 관전 포인트
    var news = bfKeyNews(sel, bfSourcePool()), watch = bfWatchPoints(sel);
    if (news.length || watch.length) {
      html += '<div class="bfc-two">';
      html += '<div><div class="bfc-seclbl">📰 핵심 뉴스</div><div class="bfc-knews">';
      news.slice(0, 5).forEach(function(n) {
        var kt = n.link
          ? '<a class="kt" href="' + n.link + '" target="_blank" rel="noopener">' + escHtml(n.head) + '</a>'
          : '<div class="kt">' + escHtml(n.head) + '</div>';
        var src = n.source
          ? (n.link
              ? '<div class="ksrc"><a href="' + n.link + '" target="_blank" rel="noopener">' + escHtml(n.source) + ' ↗</a></div>'
              : '<div class="ksrc">' + escHtml(n.source) + '</div>')
          : '';
        html += '<div class="bfc-kn"><span class="dot ' + n.dir + '"></span><div>' +
          kt +
          (n.detail ? '<div class="kd">' + escHtml(n.detail) + '</div>' : '') +
          src +
        '</div></div>';
      });
      html += '</div></div>';
      html += '<div><div class="bfc-seclbl">📊 오늘의 관전 포인트</div><div class="bfc-watch">';
      if (watch.length) {
        watch.forEach(function(w, i) {
          html += '<div class="bfc-wp"><span class="num">' + ('0' + (i + 1)).slice(-2) + '</span>' +
            '<span class="wt">' + escHtml(w) + '</span></div>';
        });
      } else {
        html += '<div class="bfc-wp"><span class="wt" style="color:var(--muted)">세부 지표 데이터가 없습니다.</span></div>';
      }
      html += '</div></div></div>';
    }
    return html;
  }

  function renderBriefingFeed(feed) {
    var list = getBriefings(feed);
    if (!list.length) return '';
    var sel = null;
    if (feed.selected) {
      for (var i = 0; i < list.length; i++) { if (list[i].as_of === feed.selected) { sel = list[i]; break; } }
    }
    if (!sel) sel = list[0];
    feed.selected = sel.as_of;

    // 사용 가능 날짜 셋 (Set 으로 빠른 lookup)
    var availSet = {};
    list.forEach(function(b) { if (b.as_of) availSet[b.as_of] = true; });
    var idx = -1;
    for (var ii = 0; ii < list.length; ii++) { if (list[ii].as_of === sel.as_of) { idx = ii; break; } }
    // list 는 newest-first 정렬. 이전(과거) = idx+1, 다음(최신) = idx-1
    var prevAvail = (idx >= 0 && idx + 1 < list.length) ? list[idx + 1].as_of : '';
    var nextAvail = (idx > 0) ? list[idx - 1].as_of : '';
    var minDate = list[list.length - 1].as_of || '';
    var maxDate = list[0].as_of || '';

    var html = '<div class="briefing-box" id="' + feed.boxId + '">';
    html += '<div class="bf-head">' +
      '<span class="bf-badge">' + feed.badge + '</span>';
    // 날짜별 시황: 캘린더 picker + 이전/다음 화살표 (1건뿐이어도 picker 노출, 화살표만 disabled)
    html += '<div class="bf-date-nav">';
    html += '<button type="button" class="bf-date-arrow" title="이전 브리핑"' +
      (prevAvail ? ' onclick="' + feed.selectFn + '(\'' + prevAvail + '\')"' : ' disabled') +
      '>◀</button>';
    html += '<input type="date" class="bf-date-picker"' +
      ' min="' + minDate + '" max="' + maxDate + '"' +
      ' value="' + sel.as_of + '"' +
      ' onchange="' + feed.selectFn + '(this.value)"' +
      ' title="날짜를 클릭해 해당일 시황 보기">';
    html += '<button type="button" class="bf-date-arrow" title="다음 브리핑"' +
      (nextAvail ? ' onclick="' + feed.selectFn + '(\'' + nextAvail + '\')"' : ' disabled') +
      '>▶</button>';
    if (list.length > 1) {
      html += '<span class="bf-date-count">' + (idx + 1) + '/' + list.length + '</span>';
    }
    html += '</div>';
    html += '<button type="button" class="bf-word-btn" onclick="exportBriefingWord(\'' + feed.key + '\')">' +
      '📄 ' + feed.wordLabel + ' Word</button>';
    html += '<button type="button" class="bf-mail-btn" onclick="emailBriefing(\'' + feed.key + '\')"' +
      ' title="메일 앱에서 수신자·제목·본문이 채워진 채로 열립니다 (폰에서도 가능)">' +
      '✉️ 이메일 보내기</button>';
    html += '</div>';

    // 카드형 본문 (hero + 지수 스냅샷 + 핵심뉴스 + 관전포인트)
    html += renderBriefingBody(sel, feed);
    var total = list.length;
    html += '<div class="commentary-foot">' + feed.foot +
      (total > 1 ? ' · 총 ' + total + '건 아카이브' : '') + '</div>';
    html += '</div>';
    return html;
  }

  // 두 브리핑 박스를 최신 생성시각 순으로 정렬해 렌더
  function renderBriefing() {
    var feeds = [BRIEFING_FEEDS.us, BRIEFING_FEEDS.asia].filter(function(f) {
      return getBriefings(f).length > 0;
    });
    feeds.sort(function(a, b) {
      return (feedLatestUtc(b) || '').localeCompare(feedLatestUtc(a) || '');
    });
    return feeds.map(function(f) { return renderBriefingFeed(f); }).join('');
  }

  function makeBriefingSelector(feed) {
    return function(date) {
      if (!date) return;
      var list = getBriefings(feed);
      if (!list.length) return;
      // 정확히 일치하는 날짜가 있으면 그대로. 없으면 가장 가까운 날짜로 snap.
      var exact = null;
      for (var i = 0; i < list.length; i++) { if (list[i].as_of === date) { exact = list[i]; break; } }
      if (exact) {
        feed.selected = date;
      } else {
        var tgtMs = Date.parse(date);
        var closest = list[0].as_of;
        var minDiff = Math.abs(Date.parse(closest) - tgtMs);
        for (var j = 1; j < list.length; j++) {
          var diff = Math.abs(Date.parse(list[j].as_of) - tgtMs);
          if (diff < minDiff) { minDiff = diff; closest = list[j].as_of; }
        }
        feed.selected = closest;
      }
      var box = document.getElementById(feed.boxId);
      if (box) box.outerHTML = renderBriefingFeed(feed);
    };
  }
  window.selectBriefingUs = makeBriefingSelector(BRIEFING_FEEDS.us);
  window.selectBriefingAsia = makeBriefingSelector(BRIEFING_FEEDS.asia);
  window.selectBriefing = window.selectBriefingUs; // backward-compat

  /* ── 이메일 보내기: 현재 선택된 브리핑을 메일 앱(mailto)으로 ──
     repo가 public이라 페이지에 토큰을 박지 않고, 메일 앱을 수신자·제목·본문이
     채워진 채 띄움. 폰에서 열면 PC가 꺼져 있어도 보내기 가능. */
  function emailBriefing(feedKey) {
    var feed = BRIEFING_FEEDS[feedKey];
    if (!feed) return;
    var list = getBriefings(feed);
    if (!list.length) { alert('보낼 브리핑이 없습니다.'); return; }
    var sel = null;
    for (var i = 0; i < list.length; i++) { if (list[i].as_of === feed.selected) { sel = list[i]; break; } }
    if (!sel) sel = list[0];

    var md = '';
    var m = /(\d{4})-(\d{2})-(\d{2})/.exec(sel.as_of || '');
    if (m) md = parseInt(m[2], 10) + '/' + parseInt(m[3], 10);
    var subject = (feed.mailSubject || '시황') + (md ? '(' + md + ')' : '');

    var lines = [];
    (sel.paragraphs || []).forEach(function(p) {
      var t = (p == null ? '' : String(p)).trim();
      if (!t) return;
      if (t.indexOf('_ ') === 0) t = t.slice(2);  // bold 마커 제거
      lines.push(t);
    });
    var body = lines.join('\n');

    var to = (feed.mailTo || []).join(',');
    var url = 'mailto:' + encodeURIComponent(to).replace(/%2C/g, ',') +
      '?subject=' + encodeURIComponent(subject) +
      '&body=' + encodeURIComponent(body);
    window.location.href = url;
  }
  window.emailBriefing = emailBriefing;

  /* ── 브리핑 → 공공기관 개조식 보고서(.docx) 생성 ──
     번호체계 "1. → □ → - → ·" / 바탕체 15pt / 줄간격 1.3 / 여백 2cm.
     DXA(=twip) 단위 들여쓰기·pt 단위 단락간격을 정확히 적용. */
  function reportFromBriefing(b) {
    // 데이터에 구조화된 report가 있으면 그대로 사용
    if (b && b.report && b.report.sections && b.report.sections.length) {
      return { headline: b.report.headline || b.title || '', sections: b.report.sections };
    }
    // 없으면 paragraphs로부터 폴백 변환 (□=일반문단, -=지수라인, ·=종목주석)
    var headline = (b && b.title) || '';
    var sections = [];
    var cur = null;
    (b && b.paragraphs || []).forEach(function(p) {
      var t = (p == null ? '' : String(p)).trim();
      if (!t) return;
      if (t === '안녕하십니까' || t === '감사합니다.' || t === '감사합니다' ||
          t === '금일 아시아 증시 시황 보고 드립니다.') return;
      if (t.charAt(0) === '*') {
        cur = { head: '주요 지수 동향', points: [{ text: t.replace(/^\*\s*/, ''), subs: [] }] };
        sections.push(cur);
      } else if (t.charAt(0) === '※') {
        var txt = t.replace(/^※\s*/, '');
        if (cur && cur.points && cur.points.length) {
          cur.points[cur.points.length - 1].subs = cur.points[cur.points.length - 1].subs || [];
          cur.points[cur.points.length - 1].subs.push(txt);
        } else { cur = { head: txt, points: [] }; sections.push(cur); }
      } else {
        cur = { head: t, points: [] };
        sections.push(cur);
      }
    });
    return { headline: headline, sections: sections };
  }

  function generateBriefingDocx(b, feed) {
    var d = window.docx;
    if (!d || !d.Document) {
      alert('Word 생성 모듈을 아직 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.');
      return;
    }
    var FONT = { ascii: '바탕체', eastAsia: '바탕체', hAnsi: '바탕체' };
    var LINE = 312, RULE = d.LineRuleType.AUTO;   // 1.3줄 = 240*1.3
    var rep = reportFromBriefing(b);
    var children = [];

    // 헤드라인: 22pt(=44) 굵게 밑줄, 가운데
    children.push(new d.Paragraph({
      alignment: d.AlignmentType.CENTER,
      spacing: { after: 360, line: LINE, lineRule: RULE },
      children: [ new d.TextRun({
        text: rep.headline || (b.title || feed.defaultTitle),
        bold: true, underline: { type: d.UnderlineType.SINGLE }, font: FONT, size: 44
      }) ]
    }));
    // 기준일 (오른쪽, 12pt)
    if (b.as_of) {
      children.push(new d.Paragraph({
        alignment: d.AlignmentType.RIGHT,
        spacing: { after: 240, line: LINE, lineRule: RULE },
        children: [ new d.TextRun({ text: '기준일 ' + b.as_of, font: FONT, size: 24 }) ]
      }));
    }

    (rep.sections || []).forEach(function(sec) {
      // □ 단락: 굵게, 단락앞/뒤 12pt, 들여쓰기 0 / 둘째줄 450
      children.push(new d.Paragraph({
        spacing: { before: 240, after: 240, line: LINE, lineRule: RULE },
        indent: { left: 450, hanging: 450 },
        children: [ new d.TextRun({ text: '□ ' + sec.head, bold: true, font: FONT, size: 30 }) ]
      }));
      (sec.points || []).forEach(function(pt) {
        // - 단락: 단락앞/뒤 6pt, 들여쓰기 300 / 둘째줄 600, 단어 안끊김
        children.push(new d.Paragraph({
          spacing: { before: 120, after: 120, line: LINE, lineRule: RULE },
          indent: { left: 600, hanging: 300 },
          wordWrap: true,
          children: [ new d.TextRun({ text: '- ' + pt.text, font: FONT, size: 30 }) ]
        }));
        (pt.subs || []).forEach(function(s) {
          // · 단락: 단락앞/뒤 3pt, 들여쓰기 450 / 둘째줄 750, 단어 안끊김
          children.push(new d.Paragraph({
            spacing: { before: 60, after: 60, line: LINE, lineRule: RULE },
            indent: { left: 750, hanging: 300 },
            wordWrap: true,
            children: [ new d.TextRun({ text: '· ' + s, font: FONT, size: 30 }) ]
          }));
        });
      });
    });

    var doc = new d.Document({
      styles: { default: { document: {
        run: { font: FONT, size: 30 },
        paragraph: { spacing: { line: LINE, lineRule: RULE } }
      } } },
      sections: [{
        properties: { page: { margin: { top: 1134, right: 1134, bottom: 1134, left: 1134 } } }, // 2cm
        children: children
      }]
    });

    d.Packer.toBlob(doc).then(function(blob) {
      var fname = (feed.key || 'briefing') + '-briefing-' + (b.as_of || 'latest') + '.docx';
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click();
      setTimeout(function() { URL.revokeObjectURL(url); a.remove(); }, 1500);
    }).catch(function(e) { alert('Word 생성 실패: ' + e); });
  }

  window.exportBriefingWord = function(feedKey) {
    var feed = BRIEFING_FEEDS[feedKey];
    if (!feed) return;
    var list = getBriefings(feed);
    if (!list.length) return;
    var sel = null;
    if (feed.selected) {
      for (var i = 0; i < list.length; i++) { if (list[i].as_of === feed.selected) { sel = list[i]; break; } }
    }
    if (!sel) sel = list[0];
    generateBriefingDocx(sel, feed);
  };

  /* ── 전체 개요 카드 ── */
  // 뉴스 표기: daily-data.js 가 fetch 단계에서 한글로 번역되어 들어오므로 그대로 표시.
  // (영문 원문이 남아 있으면 끝에 표기) — 번역은 데이터 계층(fetch_daily.py)에서 수행.
  function transNews(title) {
    if (!title) return '';
    if (typeof title === 'object') return title.ko || title.title || '';
    return title;
  }

  // 종목명 표기: 한글명(영문 티커). 이름에 티커가 이미 있거나 동일하면 티커 생략.
  function stockLabel(name, ticker) {
    name = (name || '').trim();
    if (!ticker) return name || '';
    if (!name) return ticker;
    if (name === ticker || name.toUpperCase().indexOf(ticker.toUpperCase()) >= 0) return name;
    return name + '(' + ticker + ')';
  }

  function renderOverview() {

    // (시황 브리핑은 좌측 메뉴 '일간 시황'으로 이동 — 개요에서는 생략)

    }

    // 시장을 움직인 주요 이벤트 (뉴스 카드)
    html += renderOverviewEvents();

    // 오늘의 주요종목 등락 (Market trends 타일)
    html += renderOverviewMovers();

    // 오늘의 특징주 (지역별 상승 1위 + 하락 1위 — 단조로움 방지)
    var featCards = [];
    (D.regions || []).forEach(function(r) {
      var fs = (r.featured || []).filter(function(f) { return f.chgPct != null; });
      if (!fs.length) return;

      var up = fs.filter(function(f){ return f.chgPct > 0; }).sort(function(a,b){ return b.chgPct - a.chgPct; })[0];
      var down = fs.filter(function(f){ return f.chgPct < 0; }).sort(function(a,b){ return a.chgPct - b.chgPct; })[0];
      if (up)   featCards.push(renderFeatCard(up, label, '📈 상승 1위'));
      if (down) featCards.push(renderFeatCard(down, label, '📉 하락 1위'));

      html += '<div class="ov-sec">';
      html += '<div class="ov-sec-head">' +
        '<span class="ov-sec-title">⚡ 오늘의 특징주</span>' +
        '<span class="ov-sec-sub">지역별 상승·하락 1위 · 가격·차트·뉴스</span>' +
      '</div>';
      html += '<div class="featured-grid">' + featCards.join('') + '</div>';
      html += '</div>';
    }

    return html;

  /* ── 시황 코멘트 (구조화) ── */
  function renderCommentary(r) {
    var c = r && r.commentary;
    if (!c) return '';
    // 구버전(배열) 호환
    if (Array.isArray(c)) {

    // 주요 이벤트 (지수 레벨 뉴스)
    if (c.events && c.events.length) {

      html += '<ul class="cm-event-list">';
      c.events.forEach(function(e) {
        var src = e.source ? ' <span class="cm-src">· ' + escHtml(e.source) + '</span>' : '';
        var badge = (e.scope === 'global')
          ? '<span class="cm-scope cm-scope-g">글로벌</span> '
          : '<span class="cm-scope cm-scope-r">지역</span> ';
        var title = escHtml(e.title);
        var head = e.link ? '<a href="' + e.link + '" target="_blank" rel="noopener">' + title + '</a>' : title;
        var desc = e.desc ? '<div class="cm-event-desc">' + escHtml(e.desc) + '</div>' : '';
        html += '<li>' + badge + head + src + desc + '</li>';
      });

    }

    // 종목별 등락 사유
    if (c.movers && c.movers.length) {

      html += '<div class="cm-mover-list">';

    html += '<div class="commentary-foot">※ 지수·섹터·종목 등락 수치와 실제 뉴스 헤드라인에 기반한 자동 생성 요약 (투자 판단의 근거가 아님)</div>';
    html += '</div>';
    return html;
