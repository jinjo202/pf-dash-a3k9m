<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI 헤지펀드 · 투자위원회</title>
<script>
  (function () {
    try {
      var saved = localStorage.getItem('pf_theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<style>
  :root { --bg:#f6f7f9; --panel:#ffffff; --panel-soft:#fafbfc; --border:#e6e8eb; --row-hover:#eff6ff;
    --text:#0f172a; --text-soft:#334155; --muted:#64748b; --accent:#2563eb; --accent-soft:#eff6ff;
    --pos:#15803d; --neg:#b91c1c; --neu:#64748b; --shadow-sm:0 1px 2px 0 rgba(15,23,42,.04); color-scheme:light; }
  [data-theme="dark"] { --bg:#0b1020; --panel:#141a2e; --panel-soft:#1a2138; --border:#2a324a; --row-hover:#1e2942;
    --text:#e2e8f0; --text-soft:#cbd5e1; --muted:#94a3b8; --accent:#60a5fa; --accent-soft:#1e3a8a55;
    --pos:#22c55e; --neg:#f87171; --neu:#94a3b8; --shadow-sm:0 1px 2px 0 rgba(0,0,0,.5); color-scheme:dark; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif; font-size:14px; line-height:1.55; }
  header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
    padding:14px 24px; background:var(--panel); border-bottom:1px solid var(--border); }
  header h1 { font-size:19px; margin:0; font-weight:700; }
  header .sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .header-actions { display:flex; align-items:center; gap:2px; flex-wrap:wrap; }
  .nav-link { color:var(--muted); text-decoration:none; font-size:13px; font-weight:600; padding:7px 10px; border-radius:6px; white-space:nowrap; }
  .nav-link:hover { background:var(--accent-soft); color:var(--accent); }
  .nav-link.active { background:var(--accent); color:#fff; }
  .theme-toggle { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px;
    padding:6px 10px; cursor:pointer; font-size:12px; font-weight:600; }
  main { max-width:1160px; margin:0 auto; padding:22px 24px 60px; }
  .disclaimer { font-size:12px; color:var(--muted); background:var(--panel-soft); border:1px solid var(--border);
    border-left:3px solid #eab308; border-radius:10px; padding:10px 14px; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px 20px; margin-bottom:18px; }
  .card h2 { font-size:15px; margin:0 0 4px; font-weight:700; }
  .card .cap { font-size:12px; color:var(--muted); margin-bottom:14px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media(max-width:820px){ .grid2{grid-template-columns:1fr;} }
  .viewtoggle { display:flex; gap:6px; margin-bottom:16px; }
  .vt { background:var(--panel); border:1px solid var(--border); color:var(--text-soft); border-radius:10px;
    font:inherit; font-weight:700; font-size:13px; padding:9px 16px; cursor:pointer; }
  .vt.active { background:var(--accent); color:#fff; border-color:transparent; }
  .secov { margin-bottom:16px; }
  .secov h2 { font-size:16px; margin:0 0 2px; }
  .secov .hl { font-size:13px; color:var(--accent); font-weight:600; margin-bottom:10px; }
  .secstats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:14px; }
  .secstats .s { background:var(--panel-soft); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .secstats .s .k { font-size:11px; color:var(--muted); } .secstats .s .v { font-size:19px; font-weight:700; margin-top:2px; }
  .ovsec { margin:10px 0; } .ovsec .t { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:3px; }
  .ovsec p { margin:4px 0; font-size:13px; color:var(--text-soft); line-height:1.65; }
  .ovsec ul { margin:4px 0 4px 18px; font-size:13px; color:var(--text-soft); } .ovsec li { margin:2px 0; }
  .miniticks { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
  .miniticks .mt { font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; cursor:pointer;
    background:var(--panel-soft); border:1px solid var(--border); color:var(--text-soft); }
  .miniticks .mt:hover { border-color:var(--accent); color:var(--accent); }
  .miniticks .mt.block { opacity:.55; }
  .searchbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .searchbar input { flex:1; min-width:220px; max-width:420px; background:var(--panel); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font:inherit; padding:10px 14px; }
  .searchbar input:focus { outline:2px solid var(--accent); outline-offset:-1px; }
  .searchbar button { background:var(--accent); color:#fff; border:none; border-radius:10px; font:inherit; font-weight:700; padding:10px 18px; cursor:pointer; }
  .secgroup { margin-bottom:10px; }
  .seclabel { font-size:11px; font-weight:700; color:var(--muted); margin:0 0 5px 2px; letter-spacing:.02em; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { background:var(--panel-soft); border:1px solid var(--border); border-radius:999px; font-size:12px; font-weight:600;
    padding:5px 12px; cursor:pointer; color:var(--text-soft); }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .chip.active { background:var(--accent); color:#fff; border-color:transparent; }
  .chip .g { font-size:10px; opacity:.7; }
  .hero { display:flex; flex-wrap:wrap; align-items:center; gap:20px; }
  .hero .px { font-size:40px; font-weight:800; letter-spacing:-.02em; line-height:1; }
  .badge { font-size:12px; font-weight:700; padding:3px 12px; border-radius:999px; }
  .badge.APPROVE { background:#dcfce7; color:#166534; } [data-theme="dark"] .badge.APPROVE{ background:#14331f; color:#4ade80; }
  .badge.BLOCK { background:#fee2e2; color:#991b1b; } [data-theme="dark"] .badge.BLOCK{ background:#3a1414; color:#fca5a5; }
  .badge.hold { background:#fef9c3; color:#854d0e; } [data-theme="dark"] .badge.hold{ background:#3f3b12; color:#fde68a; }
  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .tile { background:var(--panel-soft); border:1px solid var(--border); border-radius:11px; padding:12px 14px; }
  .tile .k { font-size:12px; color:var(--muted); } .tile .v { font-size:21px; font-weight:700; margin-top:2px; }
  .tile .s { font-size:12px; color:var(--text-soft); margin-top:1px; }
  .v.up{color:var(--pos);} .v.down{color:var(--neg);}
  a.tile.dl { display:block; text-decoration:none; color:inherit; }
  a.tile.dl:hover { border-color:var(--accent); } a.tile.dl .k { color:var(--accent); font-weight:600; }
  .pipe { display:flex; flex-wrap:wrap; gap:6px; }
  .step { display:flex; align-items:center; gap:6px; font-size:12px; padding:5px 10px; border-radius:8px;
    background:var(--panel-soft); border:1px solid var(--border); color:var(--muted); }
  .step .dot { width:8px; height:8px; border-radius:50%; }
  .step.done { color:var(--text); } .step.done .dot { background:var(--pos); }
  .step.stop { color:var(--neg); } .step.stop .dot { background:var(--neg); }
  .step.wait .dot { background:#eab308; } .step.pending .dot { background:var(--muted); opacity:.4; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { padding:7px 8px; border-bottom:1px solid var(--border); text-align:right; }
  th:first-child,td:first-child { text-align:left; }
  th { color:var(--muted); font-weight:600; font-size:12px; } td.k { color:var(--text); font-weight:600; }
  .note { font-size:12px; color:var(--muted); margin-top:10px; }
  .rbody { font-size:13px; color:var(--text-soft); line-height:1.7; }
  .rbody b { color:var(--text); }
  svg text { fill:var(--muted); font-size:11px; }
  .empty { text-align:center; color:var(--muted); padding:40px 20px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🧠 AI 헤지펀드 · 투자위원회</h1>
    <div class="sub">멀티 에이전트 리서치 · 토론 · 백테스트 · 리스크 · 페이퍼 트레이딩 — 교육용</div>
  </div>
  <div class="header-actions">
    <a class="nav-link" href="daily.html">📊 데일리</a>
    <a class="nav-link" href="portfolio.html">← 포트폴리오</a>
    <a class="nav-link" href="fm.html">🏦 펀드매니저</a>
    <a class="nav-link" href="sectors.html">🔬 섹터분석</a>
    <a class="nav-link" href="stock.html">📈 종목분석agent</a>
    <a class="nav-link active" href="aihedgefund.html">🧠 AI헤지펀드</a>
    <button class="theme-toggle" id="themeToggle">🌙 다크</button>
  </div>
</header>

<main>
  <div class="disclaimer">교육용 시스템입니다. 투자 자문이 아니며, 실거래·출금은 코드 레벨에서 영구 비활성화되어 있습니다. 시뮬레이션·모델 산출값은 실제 수익을 보장하지 않습니다.</div>

  <div class="viewtoggle">
    <button id="tabTicker" class="vt active">🔍 종목별</button>
    <button id="tabSector" class="vt">📋 섹터별 개요</button>
  </div>

  <div id="tickerView">
    <div class="searchbar">
      <input id="q" list="symbols" placeholder="종목명 또는 티커 검색 — 예: 엔비디아, AAPL, 테슬라, 삼성전자">
      <datalist id="symbols"></datalist>
      <button id="go">검색</button>
    </div>
    <div id="chips"></div>
    <div id="content"></div>
  </div>

  <div id="sectorView" style="display:none"></div>
</main>

<script>
const $ = id => document.getElementById(id);
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const fmt$ = v => "$" + Math.round(v).toLocaleString("en-US");
const pctS = v => (v>0?"+":"") + v.toFixed(2) + "%";
let INDEX = {tickers:[]};

// theme
$("themeToggle").onclick = () => { const c=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',c); try{localStorage.setItem('pf_theme',c);}catch(e){}
  $("themeToggle").textContent = c==='dark'?'☀️ 라이트':'🌙 다크'; if(window._render) window._render(); };
$("themeToggle").textContent = document.documentElement.getAttribute('data-theme')==='dark'?'☀️ 라이트':'🌙 다크';

async function jget(p){ const r=await fetch(p); if(!r.ok) throw new Error(p+" "+r.status); return r.json(); }

async function init(){
  try { INDEX = await jget("aihedgefund/data/index.json"); }
  catch(e){ $("content").innerHTML = `<div class="card empty">데이터 인덱스를 불러오지 못했습니다.</div>`; return; }
  // datalist + chips (섹터별 그룹화)
  $("symbols").innerHTML = INDEX.tickers.map(t=>`<option value="${t.ticker}">${(t.names||[]).join(" · ")}</option>`).join("");
  const order = SECTOR_ORDER.concat(["기타"]);
  const groups = {};
  INDEX.tickers.forEach(t=>{ const s=t.sector||"기타"; (groups[s]=groups[s]||[]).push(t); });
  const secs = order.filter(s=>groups[s]).concat(Object.keys(groups).filter(s=>!order.includes(s)));
  $("chips").innerHTML = secs.map(s=>{
    const chips = groups[s].map(t=>{ const nm=(t.names&&t.names[0])?t.names[0]:t.ticker;
      return `<span class="chip" data-t="${t.ticker}">${nm} <span class="g">${t.ticker}</span></span>`; }).join("");
    return `<div class="secgroup"><div class="seclabel">${s} · ${groups[s].length}종목</div><div class="chips">${chips}</div></div>`;
  }).join("");
  $("chips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>load(c.dataset.t));
  const first = INDEX.tickers.find(t=>t.ticker==="NVDA") || INDEX.tickers[0];
  if(first) load(first.ticker);
}

$("go").onclick = search;
$("q").addEventListener("keydown", e=>{ if(e.key==="Enter") search(); });
function resolve(q){ q=q.trim(); if(!q) return null; const ql=q.toLowerCase();
  for(const t of INDEX.tickers){ if(t.ticker.toLowerCase()===ql) return t.ticker;
    if((t.names||[]).some(n=>n.toLowerCase()===ql)) return t.ticker; }
  for(const t of INDEX.tickers){ if((t.names||[]).some(n=>n.toLowerCase().includes(ql))||t.ticker.toLowerCase().includes(ql)) return t.ticker; }
  return q.toUpperCase();
}
function search(){ const tk=resolve($("q").value); if(!tk) return;
  if(INDEX.tickers.some(t=>t.ticker===tk)) load(tk);
  else $("content").innerHTML = `<div class="card empty"><b>${tk}</b> 는 아직 분석되지 않았습니다.<br><br>
    이 시스템은 정적 페이지라 브라우저에서 직접 실행할 수는 없습니다. 로컬에서<br>
    <code>python scripts/build_ticker.py ${tk}</code> 를 실행하면 위원회가 돌아가고, 재배포하면 여기에 나타납니다.</div>`;
}

let CUR = null;
async function load(tk){
  $("chips").querySelectorAll(".chip").forEach(c=>c.classList.toggle("active",c.dataset.t===tk));
  let d; try { d = await jget(`aihedgefund/data/${tk}.json`); } catch(e){ search(); return; }
  CUR = d; render();
}
window._render = () => { if(CUR) render(); };

function render(){
  const d = CUR, m = d.metrics, gate = d.risk_gate.decision, nm = (d.names&&d.names[0])?d.names[0]:d.ticker;
  const cov = d.has_coverage;
  let h = "";

  // hero
  h += `<div class="card"><div class="hero">
    <div><div style="font-size:13px;color:var(--muted)">${nm} · ${d.ticker}</div>
      <div class="px">${fmt$(d.last_close)}</div>
      <div style="margin-top:8px"><span class="badge ${gate}">리스크 게이트 ${gate}</span>
      ${cov?`<span class="badge hold" style="margin-left:6px">커버리지: 중립(HOLD) $208</span>`:``}</div></div>
    <div style="font-size:13px;color:var(--text-soft);max-width:520px">
      전략 <b>${d.strategy}</b> · 데이터 ${d.rows}봉(기준일 ${d.as_of}).
      ${gate==="APPROVE"?"리스크 게이트 통과 → 페이퍼 트레이딩 실행됨.":"리스크 게이트 <b>차단</b> — 거래 표본/수익성 기준 미달로 페이퍼 미실행(나쁜 전략을 걸러낸 정상 동작)."}
    </div></div></div>`;

  // pipeline
  const rejected = gate!=="APPROVE";
  const P = [["데이터 수집",1],["데이터 검증",d.data_ok?1:0],["백테스트",1],["백테스트 리뷰",1],
    ["리스크 게이트 "+(gate==="APPROVE"?"✓":"✕"), gate==="APPROVE"?1:2],
    ["페이퍼 트레이드", gate==="APPROVE"?1:0],["성과 리뷰", gate==="APPROVE"?1:0],["인간 승인",3]];
  h += `<div class="card"><h2>정량 파이프라인</h2>
    <div class="cap">데이터 → 검증 → 백테스트 → 리스크 게이트 → 페이퍼 트레이딩. ${cov?"리서치·토론·밸류에이션 등 에이전트 단계는 아래 커버리지 참조.":"에이전트 리서치·토론·밸류에이션(정식 커버리지)은 현재 NVDA에서 제공됩니다."}</div>
    <div class="pipe">${P.map(([l,s])=>`<span class="step ${s===1?'done':s===2?'stop':s===3?'wait':'pending'}"><span class="dot"></span>${l}</span>`).join("")}</div></div>`;

  // backtest tiles + equity
  h += `<div class="grid2">
    <div class="card"><h2>백테스트 (5년) · 벤치마크 대비</h2><div class="cap">${d.strategy}</div>
      <div class="tiles">
        <div class="tile"><div class="k">전략 총수익</div><div class="v ${m.full.total_return_pct>=0?'up':'down'}">${pctS(m.full.total_return_pct)}</div><div class="s">연 ${m.full.annualized_return_pct}%</div></div>
        <div class="tile"><div class="k">벤치마크(매수보유)</div><div class="v ${m.benchmark.total_return_pct>=0?'up':'down'}">${pctS(m.benchmark.total_return_pct)}</div><div class="s">MDD ${m.benchmark.max_drawdown_pct}%</div></div>
        <div class="tile"><div class="k">샤프 · 최대낙폭</div><div class="v">${m.full.sharpe_ratio}</div><div class="s">MDD ${m.full.max_drawdown_pct}%</div></div>
        <div class="tile"><div class="k">거래·승률</div><div class="v">${m.full.num_trades}회</div><div class="s">승률 ${m.full.win_rate_pct}% · PF ${m.full.profit_factor}</div></div>
      </div></div>
    <div class="card"><h2>인샘플 · OOS · 벤치마크</h2><div class="cap">백테스트를 읽는 세 가지 기준</div>
      <table><tr><th>지표</th><th>전체</th><th>인샘플</th><th>OOS</th><th>벤치마크</th></tr>
      ${row("총수익률 %","total_return_pct",m)}${row("샤프","sharpe_ratio",m)}${row("최대낙폭 %","max_drawdown_pct",m)}${row("거래 수","num_trades",m)}</table>
      <div class="rbody note"><b>인샘플</b>=전략을 맞춘 과거구간(잘 나오는 게 당연) · <b>OOS</b>=못 본 최근 12개월(진짜 시험) · <b>벤치마크</b>=그냥 매수 후 보유했을 때. OOS가 무너지면 과최적화 신호입니다.</div>
    </div></div>`;

  // paper equity
  if(d.paper && d.equity_curve){
    h += `<div class="card"><h2>페이퍼 트레이딩 (모의) — 자산 곡선</h2>
      <div class="cap">가상자본 ${fmt$(d.paper.initial_capital)} · ${d.paper.start}~${d.paper.end} · 킬 스위치 ${d.paper.kill_switch?"발동":"미발동"}</div>
      <svg id="eq" width="100%" viewBox="0 0 960 220" preserveAspectRatio="none" style="max-height:220px"></svg>
      <div class="tiles" style="margin-top:12px">
        <div class="tile"><div class="k">페이퍼 수익률</div><div class="v ${d.paper.return_pct>=0?'up':'down'}">${pctS(d.paper.return_pct)}</div><div class="s">${fmt$(d.paper.final_equity)}</div></div>
        <div class="tile"><div class="k">킬 스위치</div><div class="v ${d.paper.kill_switch?'down':'up'}">${d.paper.kill_switch?"발동":"미발동"}</div><div class="s">손실 한도</div></div>
      </div></div>`;
  }

  // coverage (NVDA only)
  if(cov){
    h += `<div class="card"><h2>정식 커버리지 — 리포트·모델·목표가</h2>
      <div class="cap">equity-research 5단계 산출 · 목표주가 $208 중립(HOLD) · DCF $157 vs Comps $271</div>
      <div class="tiles">
        <a class="tile dl" href="aihedgefund/NVIDIA_Coverage_Report_KR_2026-07-17.docx" download><div class="k">📄 최종 리포트 (한글)</div><div class="v" style="font-size:15px">DOCX</div><div class="s">28차트·16표</div></a>

function row(label,key,m){
  const cell = v => (v===null||v===undefined)?"—":v;
  const os = m.out_of_sample ? m.out_of_sample[key] : null;
  const col = (key==="total_return_pct" && os!==null && os<0) ? ' style="color:var(--neg)"' : '';
  return `<tr><td class="k">${label}</td><td>${cell(m.full[key])}</td><td>${cell(m.in_sample?m.in_sample[key]:null)}</td><td${col}>${cell(os)}</td><td>${cell(m.benchmark[key])}</td></tr>`;
}

function drawEq(EQ, cap){
  const svg=$("eq"); if(!svg) return; const W=960,H=220,L=60,R=16,T=14,B=28;
  const vals=EQ.map(d=>d[1]), lo=Math.min(...vals), hi=Math.max(...vals), pad=(hi-lo)*.15||1;
  const xs=i=>L+i*(W-L-R)/(EQ.length-1), ys=v=>T+(H-T-B)*(1-(v-lo+pad)/(hi-lo+2*pad));
  let g="";
  for(let k=0;k<=3;k++){const v=lo-pad+(hi-lo+2*pad)*k/3,y=ys(v);g+=`<line x1="${L}" x2="${W-R}" y1="${y}" y2="${y}" stroke="${css('--border')}"/><text x="${L-6}" y="${y+3}" text-anchor="end">${(v/1000).toFixed(0)}k</text>`;}
  g+=`<line x1="${L}" x2="${W-R}" y1="${ys(cap)}" y2="${ys(cap)}" stroke="${css('--muted')}" stroke-dasharray="3 3"/>`;
  g+=`<path d="${EQ.map((d,i)=>`${i?'L':'M'}${xs(i).toFixed(1)},${ys(d[1]).toFixed(1)}`).join('')}" fill="none" stroke="#76B900" stroke-width="2"/>`;
  [0,Math.floor(EQ.length/2),EQ.length-1].forEach(i=>{g+=`<text x="${xs(i)}" y="${H-8}" text-anchor="${i===0?'start':i===EQ.length-1?'end':'middle'}">${EQ[i][0]}</text>`;});
  svg.innerHTML=g;
}

// ---- 섹터별 개요 뷰 ----
const KEYMAP = {"반도체":"semiconductor","소프트웨어":"software","에너지":"energy","금융":"financial",
  "바이오·헬스케어":"biohealth","소비재":"consumer","산업재":"industrials","유틸리티":"utilities",
  "광통신·네트워크장비":"optical","신재생에너지":"renewable"};
const SECTOR_ORDER = ["반도체","소프트웨어","산업재","에너지","신재생에너지","광통신·네트워크장비","유틸리티","금융","바이오·헬스케어","소비재"];
let SECMETA = {};
async function loadSectorMeta(){
  const order = SECTOR_ORDER;
  await Promise.all(order.map(async s=>{ try{ SECMETA[s] = await jget(`aihedgefund/data/../sectors/${KEYMAP[s]}.json`);}catch(e){} }));
}
$("tabTicker").onclick = ()=>switchView("ticker");
$("tabSector").onclick = ()=>switchView("sector");
function switchView(v){
  const isT = v==="ticker";
  $("tabTicker").classList.toggle("active",isT); $("tabSector").classList.toggle("active",!isT);
  $("tickerView").style.display = isT?"":"none"; $("sectorView").style.display = isT?"none":"";
  if(!isT) renderSectorView();
}
function renderSectorView(){
  let h = "";
  for(const s of SECTOR_ORDER){
    const ts = INDEX.tickers.filter(t=>(t.sector||"기타")===s);
    if(!ts.length) continue;
    const appr = ts.filter(t=>t.gate==="APPROVE").length;
    const avg = ts.reduce((a,t)=>a+t.total_return_pct,0)/ts.length;
    const sorted = [...ts].sort((a,b)=>b.total_return_pct-a.total_return_pct);
    const best = sorted[0], worst = sorted[sorted.length-1];
    const nm = t => (t.names&&t.names[0])?t.names[0]:t.ticker;
    const m = SECMETA[s];
    const ov = m ? `
      <div class="ovsec"><div class="t">산업 개요</div>${(m.summary||[]).map(p=>`<p>${p}</p>`).join("")}</div>
      <div class="ovsec"><div class="t">성장 동력</div><ul>${(m.drivers||[]).map(d=>`<li>${d}</li>`).join("")}</ul></div>
      <div class="ovsec"><div class="t">경쟁 구도</div><p>${m.landscape||""}</p></div>
      <div class="ovsec"><div class="t">밸류에이션</div><p>${m.valuation||""}</p></div>
      <div class="ovsec"><div class="t">리스크</div><ul>${(m.risks||[]).map(r=>`<li>${r}</li>`).join("")}</ul></div>
      <div class="ovsec"><div class="t">12개월 전망</div><p>${m.outlook||""}</p></div>` : `<p style="color:var(--muted);font-size:13px">섹터 개요 로딩 중…</p>`;
    const chips = ts.map(t=>`<span class="mt ${t.gate==='APPROVE'?'':'block'}" data-t="${t.ticker}">${nm(t)} ${t.total_return_pct>=0?'+':''}${t.total_return_pct}%</span>`).join("");
    h += `<div class="card secov">
      <h2>${s} <span style="font-size:13px;color:var(--muted);font-weight:400">· ${ts.length}종목</span></h2>
      <div class="hl">${m?m.headline:""}</div>
      <div class="secstats">
        <div class="s"><div class="k">게이트 통과율</div><div class="v">${Math.round(appr/ts.length*100)}%</div></div>
        <div class="s"><div class="k">평균 5년 총수익</div><div class="v ${avg>=0?'':''}" style="color:${avg>=0?'var(--pos)':'var(--neg)'}">${avg>=0?'+':''}${avg.toFixed(1)}%</div></div>
        <div class="s"><div class="k">최고 (5년)</div><div class="v" style="color:var(--pos);font-size:15px">${nm(best)} +${best.total_return_pct}%</div></div>
        <div class="s"><div class="k">최저 (5년)</div><div class="v" style="color:var(--neg);font-size:15px">${nm(worst)} ${worst.total_return_pct}%</div></div>
      </div>
      ${ov}
      <div class="ovsec"><div class="t">구성 종목 (클릭 → 종목 상세)</div><div class="miniticks">${chips}</div></div>
    </div>`;
  }
  h += `<div class="card" style="font-size:12px;color:var(--muted)">섹터 개요는 교육용 리서치이며 투자 자문이 아닙니다. 수익률은 SMA 5/20 전략의 5년 백테스트 결과입니다.</div>`;
  $("sectorView").innerHTML = h;
  $("sectorView").querySelectorAll(".mt").forEach(c=>c.onclick=()=>{ switchView("ticker"); load(c.dataset.t); window.scrollTo(0,0); });
}

loadSectorMeta();
init();
</script>
