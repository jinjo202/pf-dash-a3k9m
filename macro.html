<!-- 자동 캐시 무력화: GitHub Pages가 이 HTML을 캐시(최대 10분)할 수 있어,
     로드 직후 서버의 진짜 Last-Modified와 비교해 더 최신이면 1회 강제 새로고침 -->
<script>
  (function () {
    try {
      var u = new URL(window.location.href);
      if (u.searchParams.get('cb')) return;  // 이미 강제 새로고침된 상태면 중복 방지
      var docMs = new Date(document.lastModified).getTime();
      fetch(window.location.pathname + '?probe=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
        .then(function (r) {
          var srv = r.headers.get('Last-Modified');
          if (!srv) return;
          var srvMs = new Date(srv).getTime();
          if (isFinite(srvMs) && isFinite(docMs) && srvMs > docMs + 2000) {
            u.searchParams.set('cb', Date.now());
            window.location.replace(u.toString());
          }
        }).catch(function () {});
    } catch (e) {}
  })();
</script>
<script>
  (function () {
    try {
      var saved = localStorage.getItem('pf_theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>

  .ai-stat .l { font-size:11px; color:var(--muted); font-weight:600; }
  .ai-stat .v { font-size:24px; font-weight:850; letter-spacing:-.02em; margin:3px 0; }
  .ai-stat .s { font-size:11px; color:var(--text-soft); }
  .ai-verdict { font-size:12.5px; border-radius:8px; padding:10px 13px; margin-bottom:14px; font-weight:600; }
  .ai-verdict.warn { background:var(--warn-bg); color:var(--warn-fg); border:1px solid var(--warn-bd); }
  .ai-chart { height:240px; margin:6px 0 4px; }
  .lab-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:6px; }
  @media (max-width:680px){ .lab-grid{ grid-template-columns:1fr; } }
  .lab-card { border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
  .lab-card .ln { font-size:14px; font-weight:800; }
  .lab-card .lc { height:130px; margin:6px 0; }
  .lab-card .lp { font-size:11px; color:var(--text-soft); line-height:1.5; }
  .lab-card .lsrc { font-size:10px; color:var(--muted); margin-top:4px; }
  .fin-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:6px; }
  @media (max-width:680px){ .fin-grid{ grid-template-columns:1fr; } }
  .fin-box { border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .fin-t { font-size:12px; font-weight:700; margin-bottom:4px; }
  .fin-c { height:170px; }

  /* ===== earnings ===== */
  .ctry-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; margin-bottom:18px; }
  .ctry-card { border:1px solid var(--border); border-radius:10px; padding:12px 13px; background:var(--panel); }
  .ctry-card .top { display:flex; justify-content:space-between; align-items:center; }
  .ctry-card .cn { font-size:14px; font-weight:800; }
  .ctry-card .err { font-size:20px; font-weight:850; letter-spacing:-.02em; margin:6px 0 2px; }
  .ctry-card .g { font-size:11px; color:var(--muted); }
  .ctry-card .g b { color:var(--text-soft); font-weight:700; }
  .ctry-card { cursor:pointer; transition:border-color .12s, box-shadow .12s; }
  .ctry-card:hover { border-color:var(--accent); box-shadow:var(--shadow-md); }
  .ctry-card.sel { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
  .ctry-card .click-hint { font-size:9.5px; color:var(--accent); margin-top:5px; font-weight:600; }
  .ctry-card .spark { height:34px; margin-top:6px; }
  .ctry-detail { border:1px solid var(--border); border-radius:11px; padding:16px 18px; margin-bottom:18px; background:var(--panel-soft); }
  .ctry-detail .dh { font-size:14px; font-weight:800; margin-bottom:2px; }
  .ctry-detail .du { font-size:11px; color:var(--muted); margin-bottom:12px; }
  .ann-note { font-size:11.5px; color:var(--warn-fg, #92400e); background:var(--warn-bg, #fef3c7); border:1px solid var(--warn-bd, #fde68a);
    border-radius:8px; padding:8px 11px; margin-bottom:10px; line-height:1.5; }
  .eps-chart { height:230px; margin-bottom:6px; }
  .rev-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  @media (max-width:560px){ .rev-grid{ grid-template-columns:1fr; } }
  .rev-box { border:1px solid var(--border); border-radius:9px; padding:10px 12px; background:var(--panel); }
  .rev-box .ry { font-size:12px; font-weight:700; margin-bottom:4px; }
  .rev-box .rl { font-size:11.5px; color:var(--text-soft); display:flex; gap:12px; flex-wrap:wrap; }
  .rev-box .rl b { font-weight:700; }
  .sub-label { font-size:12.5px; font-weight:700; margin:14px 0 8px; color:var(--text-soft); }
  .sector-row { display:grid; grid-template-columns:minmax(180px,1fr) 2.2fr; gap:14px; border:1px solid var(--border);
    border-left-width:3px; border-radius:9px; padding:10px 13px; margin-bottom:8px; background:var(--panel); }
  @media (max-width:680px){ .sector-row{ grid-template-columns:1fr; gap:6px; } }
  .sector-row.pos { border-left-color:var(--pos); } .sector-row.neg { border-left-color:var(--neg); } .sector-row.neu { border-left-color:var(--neu); }
  .sec-name { font-size:13px; font-weight:700; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .sec-metrics { font-size:11px; color:var(--muted); margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; }
  .sec-metrics b { color:var(--text-soft); }
  .sec-issue { font-size:12px; color:var(--text-soft); line-height:1.5; }
  .sec-ind { font-size:10.5px; color:var(--muted); margin-top:3px; }
  .sec-ind b { color:var(--text-soft); font-weight:600; }
  .mom-tag { font-size:10px; font-weight:700; padding:1px 6px; border-radius:20px; }
  .mom-tag.pos { background:var(--pos-soft); color:var(--pos); }
  .mom-tag.neg { background:var(--neg-soft); color:var(--neg); }
  .mom-tag.neu { background:var(--neu-soft); color:var(--neu); }
  .sector-row.clickable { cursor:pointer; }
  .sector-row.clickable:hover { background:var(--row-hover); }
  .sec-toggle { font-size:10px; color:var(--accent); font-weight:700; margin-top:4px; }
  .holdings { border:1px solid var(--border); border-top:none; border-radius:0 0 9px 9px; margin:-8px 0 8px; padding:4px 8px 8px; background:var(--panel-soft); overflow-x:auto; }
  .holdings table { font-size:11.5px; }
  .holdings th, .holdings td { padding:5px 7px; white-space:nowrap; }
  .holdings td.nm { text-align:left; font-weight:600; white-space:normal; min-width:120px; }
  .holdings td.note { text-align:left; color:var(--muted); white-space:normal; min-width:160px; font-size:11px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>매크로 레짐 모니터</h1>
    <div class="sub" id="subtitle">데이터 로딩 중…</div>
  </div>
  <div class="header-actions">
    <a class="nav-link" href="portfolio.html">← 포트폴리오</a>
    <a class="nav-link" href="daily.html">📊 데일리</a>
    <button class="theme-toggle" id="themeToggle"><span class="icon">🌙</span><span class="label">다크</span></button>
  </div>
</header>

<main id="app">
  <div class="loading">데이터를 불러오는 중입니다…</div>
</main>

<div class="modal-overlay" id="indModal">
  <div class="modal-box">
    <div class="mh">
      <div><div class="mt" id="mTitle"></div><div class="mmeta" id="mMeta"></div></div>
      <button class="mclose" id="mClose" aria-label="닫기">×</button>
    </div>
    <div class="modal-chart"><canvas id="mChart"></canvas></div>
    <div class="mdesc" id="mDesc"></div>
    <div class="msrc" id="mSrc"></div>
  </div>
</div>

<script>
/* ───── theme toggle ───── */
(function () {
  var btn = document.getElementById('themeToggle');
  function sync() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    btn.querySelector('.icon').textContent = dark ? '☀️' : '🌙';
    btn.querySelector('.label').textContent = dark ? '라이트' : '다크';
  }
  btn.addEventListener('click', function () {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    var next = dark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('pf_theme', next); } catch (e) {}
    sync(); rerenderCharts();
  });
  sync();
})();

function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
function fmtNum(x, d) { return (x === null || x === undefined) ? '–' : Number(x).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function signClass(s) { return s > 0 ? 'pos-t' : (s < 0 ? 'neg-t' : ''); }
function pctCell(x) { if (x === null || x === undefined) return '<td>–</td>'; return '<td class="' + signClass(x) + '">' + (x > 0 ? '+' : '') + x.toFixed(1) + '%</td>'; }
function retSpan(x) { if (x === null || x === undefined) return '–'; return '<b class="' + signClass(x) + '">' + (x > 0 ? '+' : '') + x.toFixed(1) + '%</b>'; }

var CHARTS = [];
var CUR_M = null;        // 클릭 핸들러용 데이터 참조
var DETAIL_CHART = null; // 국가 EPS 상세 차트
var MODAL_CHART = null;  // 지표 히스토리 모달 차트
var TM_CHART = null, TM_SEL = 0; // 타임머신 주가차트 + 선택 인덱스
function rerenderCharts() { CHARTS.forEach(function (c) { try { c.update(); } catch (e) {} }); if (DETAIL_CHART) try { DETAIL_CHART.update(); } catch (e) {} }

var PILLAR_ORDER = ['macro', 'valuation', 'flows', 'sentiment', 'earnings'];

function sparkline(canvas, hist, score) {
  if (!hist || !hist.values || hist.values.length < 2) return;
  var color = score > 0.05 ? cssVar('--pos') : (score < -0.05 ? cssVar('--neg') : cssVar('--neu'));
  var ctx = canvas.getContext('2d');
  var c = new Chart(ctx, {
    type: 'line',
    data: { labels: hist.dates, datasets: [{ data: hist.values, borderColor: color, borderWidth: 1.4, pointRadius: 0, tension: .15,
      fill: true, backgroundColor: (function () { var g = ctx.createLinearGradient(0, 0, 0, 42); g.addColorStop(0, color + '33'); g.addColorStop(1, color + '00'); return g; })() }] },
    options: { responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: true, displayColors: false,
        callbacks: { title: function (i) { return i[0].label.slice(0, 7); }, label: function (i) { return fmtNum(i.raw, 2); } } } },
      scales: { x: { display: false }, y: { display: false } } }
  });
  CHARTS.push(c);
}

function bigChart(canvas, idx) {
  var color = cssVar('--accent');
  var ctx = canvas.getContext('2d');
  var c = new Chart(ctx, {
    type: 'line',
    data: { labels: idx.dates, datasets: [{ data: idx.values, borderColor: color, borderWidth: 1.6, pointRadius: 0, tension: .12,
      fill: true, backgroundColor: (function () { var g = ctx.createLinearGradient(0, 0, 0, 180); g.addColorStop(0, color + '2e'); g.addColorStop(1, color + '00'); return g; })() }] },
    options: { responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { displayColors: false, callbacks: { title: function (i) { return i[0].label.slice(0, 7); }, label: function (i) { return fmtNum(i.raw, 0); } } } },
      scales: { x: { type: 'category', ticks: { maxTicksLimit: 6, font: { size: 9 }, color: cssVar('--muted'), callback: function (v) { var l = this.getLabelForValue(v); return l ? l.slice(0, 4) : ''; } }, grid: { display: false } },
        y: { ticks: { font: { size: 9 }, color: cssVar('--muted'), maxTicksLimit: 5 }, grid: { color: cssVar('--border') } } } }
  });
  CHARTS.push(c);
}

function badgeCls(cls) { return cls === 'pos' ? 'pos' : (cls === 'neg' ? 'neg' : 'neu'); }

function sgn(x, d, suf) { if (x === null || x === undefined) return '–'; return (x > 0 ? '+' : '') + Number(x).toFixed(d) + (suf || ''); }
function momBadge(m) { if (!m) return ''; var c = m === '가속' ? 'pos' : (m === '둔화' ? 'neg' : 'neu'); return ' <span class="mom-tag ' + c + '">' + m + '</span>'; }
function fmtCap(v, cc) { if (!v) return '–'; if (cc === 'KR') return Math.round(v / 1e12) + '조'; if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T'; return '$' + Math.round(v / 1e9) + 'B'; }
function retTd(x) { if (x === null || x === undefined) return '<td>–</td>'; return '<td class="' + signClass(x) + '">' + (x > 0 ? '+' : '') + x.toFixed(1) + '%</td>'; }
function holdingsTable(holds, cc) {
  var body = holds.map(function (h) {
    var r = h.rets || {};
    return '<tr><td class="nm">' + h.name + '</td>' +
      '<td>' + fmtCap(h.mktcap, cc) + '</td>' +
      '<td>' + (h.fwdpe != null ? h.fwdpe + '배' : '–') + '</td>' +
      '<td>' + (h.pbr != null ? h.pbr : '–') + '</td>' +
      retTd(r.ytd) + retTd(r.m3) + retTd(r.m1) + retTd(r.w1) +
      '<td class="note">' + (h.note || '') + '</td></tr>';
  }).join('');
  return '<table><thead><tr><th class="nm">종목</th><th>시총</th><th>Fwd PER</th><th>PBR</th>' +
    '<th>YTD</th><th>3개월</th><th>1개월</th><th>1주</th><th class="note">코멘트</th></tr></thead><tbody>' + body + '</tbody></table>';
}
var COUNTRY_ORDER = ['US', 'KR', 'EU', 'JP', 'CN'];

function renderEarnings(M) {
  var E = M.earnings;
  var html = '<div class="panel"><h2>5. 기업이익 — 국가별 Forward EPS · 이익수정비율(ERR)</h2>' +
    '<p class="hint">' + M.commentary.earnings + '</p>';

  /* 국가 카드 (클릭 → 연도별 EPS 상세) */
  html += '<div class="ctry-grid">';
  COUNTRY_ORDER.forEach(function (cc) {
    var c = E.countries[cc]; if (!c) return;
    var col = c.err > 0.1 ? cssVar('--pos') : (c.err < -0.1 ? cssVar('--neg') : cssVar('--neu'));
    html += '<div class="ctry-card" data-cc="' + cc + '"><div class="top"><span class="cn">' + c.name + '</span>' +
      '<span class="badge ' + badgeCls(c.err_cls) + '">' + c.err_label + '</span></div>' +
      '<div class="err" style="color:' + col + '">ERR ' + sgn(c.err, 2) + '</div>' +
      '<div class="g">올해성장 <b>' + sgn(c.growth_cy, 0, '%') + '</b> · 내년 <b>' + sgn(c.growth_ny, 0, '%') + '</b> · ' + (c.n || 0) + '종목</div>' +
      '<div class="g">EPS수정 1M <b class="' + signClass(c.rev30) + '">' + sgn(c.rev30, 1, '%') + '</b> · 7D ' + sgn(c.rev7, 1, '%') + ' · 3M ' + sgn(c.rev90, 1, '%') + momBadge(c.momentum) + '</div>' +
      (c.trend ? '<div class="spark"><canvas id="ctrend_' + cc + '"></canvas></div>' : '') +
      (c.annual ? '<div class="click-hint">▸ 클릭: 연도별 EPS(2020~2027E)</div>' : '') +
      '</div>';
  });
  html += '</div>';
  html += '<div class="ctry-detail" id="ctryDetail"></div>';

  /* 섹터 리스트 (미국 / 한국) */
  [['US', '미국 섹터별'], ['KR', '한국 섹터별']].forEach(function (pair) {
    var arr = (E.sectors[pair[0]] || []).slice().sort(function (a, b) { return (b.err || -9) - (a.err || -9); });
    if (!arr.length) return;
    html += '<div class="sub-label">' + pair[1] + ' (ERR 높은 순 · 행 클릭 → 상위 종목)</div>';
    arr.forEach(function (s, si) {
      var bid = pair[0] + '_' + si;
      var hasH = s.holdings && s.holdings.length;
      html += '<div class="sector-block">' +
        '<div class="sector-row ' + (hasH ? 'clickable ' : '') + badgeCls(s.err_cls) + '"' + (hasH ? ' data-hold="' + bid + '"' : '') + '>' +
        '<div class="sec-left"><div class="sec-name">' + s.name +
        '<span class="badge ' + badgeCls(s.err_cls) + '">' + s.err_label + '</span></div>' +
        '<div class="sec-metrics"><span>ERR <b>' + sgn(s.err, 2) + '</b></span>' +
        '<span>EPS수정 1M <b class="' + signClass(s.rev30) + '">' + sgn(s.rev30, 1, '%') + '</b> · 7D ' + sgn(s.rev7, 1, '%') + ' · 3M ' + sgn(s.rev90, 1, '%') + '</span>' +
        (s.momentum ? '<span>' + momBadge(s.momentum) + '</span>' : '') +
        '<span>올해성장 <b>' + sgn(s.growth_cy, 0, '%') + '</b></span></div>' +
        (hasH ? '<div class="sec-toggle">▸ 상위 ' + s.holdings.length + '종목 보기</div>' : '') + '</div>' +
        '<div class="sec-right"><div class="sec-issue">' + (s.issue || '') + '</div>' +
        (s.indicators ? '<div class="sec-ind"><b>주요지표</b> ' + s.indicators + '</div>' : '') +
        '</div></div>' +
        (hasH ? '<div class="holdings" id="hold_' + bid + '" style="display:none">' + holdingsTable(s.holdings, pair[0]) + '</div>' : '') +
        '</div>';
    });
  });

  html += '<p class="disclaimer">ERR(Earnings Revision Ratio) = 바스켓 종목의 최근 30일 상향−하향 추정 / 전체. +면 상향 우세. ' +
    'EPS수정 1M/7D/3M = 올해 컨센서스 EPS의 최근 30/7/90일 변화율(중간값). 모멘텀(가속/유지/둔화)은 최근 7일 수정 페이스를 30일 추세와 비교. ' +
    'EPS성장은 올해/내년 YoY 컨센서스. 섹터 이슈/지표는 ' + E.issues_as_of + ' 기준 정성 코멘트입니다.</p>';
  html += '</div>';
  return html;
}

function epsBarChart(canvas, annual) {
  var accent = cssVar('--accent'), muted = cssVar('--muted');
  var isUsd = annual.unit.indexOf('$') >= 0;
  var labels = annual.years.map(function (r) { return r.y + (r.est ? 'E' : ''); });
  var data = annual.years.map(function (r) { return r.eps; });
  var bg = annual.years.map(function (r) { return r.est ? accent + '4d' : accent; });
  var labelPlugin = {
    id: 'epsLabels',
    afterDatasetsDraw: function (chart) {
      var ctx = chart.ctx, meta = chart.getDatasetMeta(0);
      ctx.save(); ctx.textAlign = 'center';
      meta.data.forEach(function (bar, i) {
        var r = annual.years[i];
        ctx.font = '600 9.5px Pretendard, sans-serif'; ctx.fillStyle = cssVar('--text-soft');
        ctx.fillText(isUsd ? r.eps.toFixed(2) : Math.round(r.eps), bar.x, bar.y - 4);
        if (r.yoy !== null && r.yoy !== undefined) {
          ctx.font = '700 8.5px Pretendard, sans-serif';
          ctx.fillStyle = r.yoy > 0 ? cssVar('--pos') : (r.yoy < 0 ? cssVar('--neg') : muted);
          ctx.fillText((r.yoy > 0 ? '+' : '') + r.yoy + '%', bar.x, bar.y - 15);
        }
      });
      ctx.restore();
    }
  };
  if (DETAIL_CHART) { try { DETAIL_CHART.destroy(); } catch (e) {} }
  DETAIL_CHART = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: data, backgroundColor: bg, borderColor: accent, borderWidth: 1, borderRadius: 3, maxBarThickness: 54 }] },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      layout: { padding: { top: 24 } },
      plugins: { legend: { display: false }, tooltip: { displayColors: false,
        callbacks: { label: function (i) { return (isUsd ? '$' : '') + i.raw + (annual.years[i.dataIndex].est ? ' (E)' : ''); } } } },
      scales: { x: { grid: { display: false }, ticks: { font: { size: 10 }, color: cssVar('--muted') } },
        y: { beginAtZero: true, grid: { color: cssVar('--border') }, ticks: { font: { size: 9 }, color: cssVar('--muted'), maxTicksLimit: 6 } } }
    },
    plugins: [labelPlugin]
  });
}

function revBox(title, growth, r1, r3) {
  return '<div class="rev-box"><div class="ry">' + title + '</div>' +
    '<div class="rl"><span>YoY 성장 <b>' + sgn(growth, 0, '%') + '</b></span>' +
    '<span>1개월 전 대비 <b class="' + signClass(r1) + '">' + sgn(r1, 1, '%') + '</b></span>' +
    '<span>3개월 전 대비 <b class="' + signClass(r3) + '">' + sgn(r3, 1, '%') + '</b></span></div></div>';
}

function showCountryDetail(cc) {
  if (!CUR_M) return;
  var c = CUR_M.earnings.countries[cc]; if (!c || !c.annual) return;
  var ann = c.annual, el = document.getElementById('ctryDetail');
  var cy = ann.actual_through + 1, ny = ann.actual_through + 2;
  el.innerHTML = '<div class="dh">' + c.name + ' 연도별 EPS · 2020~2027(E)</div>' +
    '<div class="du">단위: ' + ann.unit + ' · ' + ann.source + ' · 실적=진한 막대, E=추정(연한 막대) · 막대 위 숫자=EPS, 그 위=전년비 YoY</div>' +
    (ann.note ? '<div class="ann-note">📌 ' + ann.note + '</div>' : '') +
    '<div class="eps-chart"><canvas id="epsChartCanvas"></canvas></div>' +
    '<div class="rev-grid">' +
      revBox('올해(' + cy + 'E) 컨센서스 변화', c.growth_cy, c.rev30, c.rev90) +
      revBox('내년(' + ny + 'E) 컨센서스 변화', c.growth_ny, c.rev30_ny, c.rev90_ny) +
    '</div>';
  epsBarChart(document.getElementById('epsChartCanvas'), ann);
  document.querySelectorAll('.ctry-card').forEach(function (card) {
    card.classList.toggle('sel', card.getAttribute('data-cc') === cc);
  });
}

function renderAI(M) {
  var ai = M.ai;
  function stat(l, v, s) { return '<div class="ai-stat"><div class="l">' + l + '</div><div class="v">' + v + '</div><div class="s">' + s + '</div></div>'; }
  var lastRnd = ai.rnd_gdp.length ? ai.rnd_gdp[ai.rnd_gdp.length - 1].pct : null;
  var ny = ai.last_actual_year + 1;
  var html = '<div class="panel"><h2>6. AI — 빅테크 CAPEX · 버블 점검 · AI 랩</h2>' +
    '<p class="hint">AI가 시장 최대 이슈. 하이퍼스케일러 설비투자 추이, GDP 대비 투자(버블 점검), 주요 AI 랩 매출·수익성 추정. (기준 ' + ai.as_of + ', 추정치 편집 가능)</p>';
  html += '<div class="ai-stats">' +
    stat('빅테크 CAPEX 합계(' + ai.last_actual_year + ')', '$' + ai.total_capex_last + 'B', '4사 합산 · ' + ny + 'E $' + ai.total_capex_e + 'B') +
    stat('CAPEX / 美 GDP', (ai.capex_gdp_pct != null ? ai.capex_gdp_pct + '%' : '–'), (ai.capex_gdp_pct_e != null ? ny + 'E ' + ai.capex_gdp_pct_e + '% · ' : '') + '닷컴/통신버블 ~1%') +
    stat('R&D / 美 GDP', (lastRnd != null ? lastRnd + '%' : '–'), '사상 최고권 · 완만 상승') +
    '</div>';
  html += '<div class="ai-verdict warn">📊 버블 점검: 빅테크 CAPEX/GDP ~' + ai.capex_gdp_pct + '%로 과거 통신·닷컴 버블 정점(~1%)에 근접/상회. 다만 적자·부채가 아닌 <b>현금흐름·이익으로 자금조달</b>되는 투자라 성격이 다름. 핵심 점검 포인트는 <b>투자 회수(AI 매출)</b> — 아래 AI 랩 매출 추이가 그 가늠자.</div>';
  html += '<div class="section-label">버블 점검 시계열 — GDP 대비 투자 비중 (%)</div>' +
    '<div class="fin-grid">' +
    '<div class="fin-box"><div class="fin-t">빅4 CAPEX / 美 GDP (%, 2026~점선)</div><div class="fin-c"><canvas id="aiCapexGdp"></canvas></div></div>' +
    '<div class="fin-box"><div class="fin-t">美 R&D / GDP (%)</div><div class="fin-c"><canvas id="aiRndGdp"></canvas></div></div></div>';
  html += '<div class="section-label">하이퍼스케일러 연간 CAPEX ($B · 누적 막대, 2026~2027E) — 숫자=4사 합계</div>' +
    '<div class="ai-chart"><canvas id="aiCapexChart"></canvas></div>';
  // capex/매출 강도 — 클라우드 사이클 비교
  if (ai.capex_intensity && ai.capex_intensity.length) {
    html += '<div class="section-label" style="margin-top:14px">CAPEX / 매출 강도 (%) — 과거 클라우드 사이클 대비</div>' +
      '<div class="ai-chart" style="height:170px"><canvas id="aiIntensityChart"></canvas></div>' +
      (ai.cloud_note ? '<div class="ai-verdict warn">☁️ ' + ai.cloud_note + '</div>' : '');
  }
  // 빅4 재무 (매출/영업이익/FCF/시총)
  if (ai.financials && ai.financials.length) {
    html += '<div class="section-label" style="margin-top:14px">빅4 연도별 재무 ($B · 2026~2027E, 시총은 연말 실적)</div>' +
      '<div class="fin-grid">' +
      ['rev:매출', 'opinc:영업이익', 'fcf:잉여현금흐름(FCF)', 'mktcap:시가총액'].map(function (m) {

        return '<div class="fin-box"><div class="fin-t">' + nm + '</div><div class="fin-c"><canvas id="aifin_' + k + '"></canvas></div></div>';
      }).join('') + '</div>';
  }
  html += '<div class="section-label" style="margin-top:14px">AI 랩 매출·수익성 추정 (언론 기준 · 변동 큼)</div><div class="lab-grid">';
  ai.labs.forEach(function (lab, i) {
    html += '<div class="lab-card"><div class="ln">' + lab.name + '</div>' +
      '<div class="lc"><canvas id="aiLab_' + i + '"></canvas></div>' +
      '<div class="lp">💰 ' + lab.profit_note + '</div>' +
      '<div class="lsrc">출처: ' + lab.source + '</div></div>';
  });
  html += '</div>';
  html += '<p class="disclaimer">CAPEX 2026=컨센서스(GS Exhibit 15)·2027 추정, 시총 2025=현재(GOOGL $4.7T·AMZN $2.9T·META $1.6T·MSFT $3.0T). AI 랩 매출/수익성은 언론 추정. ' +
    (ai.capex_source ? '출처: ' + ai.capex_source + ' · ' : '') + 'fetch_macro.py의 AI_CAPEX/AI_FINANCIALS/AI_LABS에서 갱신. capex/GDP·R&D/GDP의 GDP는 FRED 실측.</p>';
  return html + '</div>';
}

var AI_PALETTE = ['#2563eb', '#16a34a', '#ea580c', '#7c3aed'];
function aiCapexChart(canvas, ai) {
  var labels = ai.capex.total.map(function (p) { return p.y + (p.est ? 'E' : ''); });
  var totals = ai.capex.total.map(function (p) { return p.capex; });
  var ds = ai.capex.companies.map(function (c, i) {
    return { label: c.name, data: c.years.map(function (p) { return p.capex; }), backgroundColor: AI_PALETTE[i % 4], stack: 's', borderWidth: 0 };
  });
  var totalPlugin = { id: 'capexTotal', afterDatasetsDraw: function (ch) {
    var ctx = ch.ctx, meta = ch.getDatasetMeta(ch.data.datasets.length - 1);
    ctx.save(); ctx.textAlign = 'center'; ctx.font = '700 9.5px Pretendard, sans-serif'; ctx.fillStyle = cssVar('--text-soft');
    meta.data.forEach(function (bar, i) { ctx.fillText('$' + totals[i] + 'B', bar.x, bar.y - 4); }); ctx.restore();
  } };
  var c = new Chart(canvas.getContext('2d'), {
    type: 'bar', data: { labels: labels, datasets: ds },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false, layout: { padding: { top: 18 } },
      plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 10 }, color: cssVar('--muted'), boxWidth: 10, padding: 8 } },
        tooltip: { callbacks: { label: function (i) { return i.dataset.label + ': $' + i.raw + 'B'; } } } },
      scales: { x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 }, color: cssVar('--muted') } },
        y: { stacked: true, beginAtZero: true, grid: { color: cssVar('--border') }, ticks: { font: { size: 9 }, color: cssVar('--muted'), callback: function (v) { return '$' + v + 'B'; } } } }
    }, plugins: [totalPlugin]
  });
  CHARTS.push(c);
}

function aiIntensityChart(canvas, intensity) {
  var labels = intensity.map(function (p) { return p.y + (p.est ? 'E' : ''); });
  var actualIdx = intensity.findIndex(function (p) { return p.est; }) - 1;
  if (actualIdx < 0) actualIdx = intensity.length - 1;
  var lblPlugin = { id: 'intLbl', afterDatasetsDraw: function (ch) {
    var ctx = ch.ctx, meta = ch.getDatasetMeta(0); ctx.save(); ctx.textAlign = 'center';
    ctx.font = '700 9px Pretendard, sans-serif'; ctx.fillStyle = cssVar('--accent');
    meta.data.forEach(function (pt, i) { ctx.fillText(intensity[i].pct + '%', pt.x, pt.y - 7); }); ctx.restore();
  } };
  var c = new Chart(canvas.getContext('2d'), {
    type: 'line', data: { labels: labels, datasets: [{ data: intensity.map(function (p) { return p.pct; }), borderColor: cssVar('--accent'), backgroundColor: cssVar('--accent') + '22', fill: true, borderWidth: 2, pointRadius: 2, tension: .2,
      segment: { borderDash: function (ctx) { return ctx.p1DataIndex > actualIdx ? [5, 4] : undefined; } } }] },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false, layout: { padding: { top: 16 } },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (i) { return 'CAPEX/매출 ' + i.raw + '%'; } } } },
      scales: { x: { grid: { display: false }, ticks: { font: { size: 10 }, color: cssVar('--muted') } },
        y: { beginAtZero: true, grid: { color: cssVar('--border') }, ticks: { font: { size: 9 }, color: cssVar('--muted'), callback: function (v) { return v + '%'; } } } }
    }, plugins: [lblPlugin]
  });
  CHARTS.push(c);
}

function scCell(v) {
  if (v === null || v === undefined) return '<span class="sc-cell" style="background:var(--neu-soft);color:var(--neu)">–</span>';
  var bg, fg;
  if (v >= 6) { bg = cssVar('--pos-soft'); fg = cssVar('--pos'); }
  else if (v > -6) { bg = cssVar('--neu-soft'); fg = cssVar('--neu'); }
  else { bg = cssVar('--neg-soft'); fg = cssVar('--neg'); }
  return '<span class="sc-cell" style="background:' + bg + ';color:' + fg + '">' + (v > 0 ? '+' : '') + v + '</span>';
}

var UPD_TYPE = { release: ['발표', 'rel'], revision: ['수정', 'rev'], cycle: ['국면', 'cyc'], regime: ['레짐', 'reg'], flows: ['수급', 'flw'] };
function renderUpdates(M) {
  var log = M.update_log; if (!log || !log.length) return '';
  var recent = log.slice().reverse().slice(0, 18);
  var rows = recent.map(function (e) {
    var t = UPD_TYPE[e.type] || ['', 'rel'];
    return '<div class="upd-row"><span class="upd-badge ' + t[1] + '">' + t[0] + '</span>' +
      '<span class="upd-date">' + e.date.slice(5) + '</span>' +
      '<span class="upd-title">' + e.title + '</span>' +
      '<span class="upd-detail">' + e.detail + '</span></div>';
  }).join('');
  var todayN = (M.updates_today || []).length;
  return '<div class="panel" id="updPanel"><h2>📢 데이터 업데이트 알림' + (todayN ? ' <span class="upd-count">오늘 ' + todayN + '건</span>' : '') + '</h2>' +
    '<p class="hint">cron이 하루 8회 최신 데이터를 수집·반영합니다. 새 경제지표 발표·레짐/경기국면 변경·한국 수급 갱신을 기록합니다(일별 시장지표는 제외).</p>' +
    '<div class="upd-list">' + rows + '</div></div>';
}
function tryNotifyUpdates(M) {
  try {
    var ut = M.updates_today || []; if (!ut.length || !('Notification' in window)) return;
    var key = M.as_of + '|' + ut.length;
    if (localStorage.getItem('macro_upd_seen') === key) return;
    localStorage.setItem('macro_upd_seen', key);
    function fire() { try { new Notification('📢 매크로 데이터 업데이트 ' + ut.length + '건', { body: ut.map(function (e) { return e.title + ': ' + e.detail; }).slice(0, 4).join('\n') }); } catch (e) {} }
    if (Notification.permission === 'granted') fire();
    else if (Notification.permission !== 'denied') Notification.requestPermission().then(function (p) { if (p === 'granted') fire(); });
  } catch (e) {}
}

var MF_DIR = { pos: ['호재', 'pos'], neg: ['악재', 'neg'], neu: ['중립', 'neu'], watch: ['관전·변수', 'watch'] };

      '<div class="mf-impact">' + e.impact + '</div></div>';
  }).join('');
  var th = (m.themes || []).map(function (e) {
    return '<div class="mf-item ' + (e.dir || 'watch') + '"><div class="mf-top"><span class="mf-title">' + e.title + '</span>' + badge(e.dir) + '</div>' +

    '<div><div class="sub-label">🔍 진행 이슈·테마 전망</div>' + th + '</div></div></div>';
}

function renderCountryPref(M) {
  if (!M.country_pref) return '';
  var order = ['US', 'KR', 'EU', 'JP', 'CN'];
  var rows = order.map(function (cc) {
    var p = M.country_pref[cc]; if (!p) return '';
    var co = p.components, note = [];
    if (p.pe) note.push('PER ' + p.pe + '(적정~' + p.fair_pe + ')');
    if (p.fx_chg !== null && p.fx_chg !== undefined) note.push('통화 3M ' + (p.fx_chg > 0 ? '+' : '') + p.fx_chg + '%');
    if (p.cli !== null && p.cli !== undefined) note.push('CLI ' + p.cli);

      '<td class="sc">' + scCell(co.val) + '</td><td class="sc">' + scCell(co.earn) + '</td>' +
      '<td class="sc">' + scCell(co.fx) + '</td><td class="sc">' + scCell(co.mon) + '</td><td class="sc">' + scCell(co.cycle) + '</td>' +
      '<td class="sc">' + scCell(p.horizon.m1) + '</td><td class="sc">' + scCell(p.horizon.m3) + '</td><td class="sc">' + scCell(p.horizon.m12) + '</td>' +
      '<td class="pref-note">' + note.join(' · ') + '</td></tr>';

    '<p class="disclaimer">밸류=PER 적정대비, 이익=ERR·수정모멘텀, 환율=3개월 통화강세, 통화=정책방향(완화+), 경기=CLI 수준·모멘텀. 통화정책 방향·유·일·중 PER은 편집 가능 시드.</p></div>';

function tmDrawChart(M) {

  var pillarNames = { macro: '1. 매크로', valuation: '2. 밸류에이션', flows: '3. 수급·유동성', sentiment: '4. 센티먼트', earnings: '5. 기업이익' };
  PILLAR_ORDER.forEach(function (p) {
    if (p === 'earnings') return; // 전용 패널에서 상세 렌더
    var keys = Object.keys(M.indicators).filter(function (k) { return M.indicators[k].pillar === p; });
    if (!keys.length) return;
    html += '<div class="panel"><h2>' + pillarNames[p] + '</h2>' +
      '<p class="hint">' + M.commentary[p] + '</p><div class="ind-grid">';
    keys.forEach(function (k) {
      var d = M.indicators[k];
      var metaParts = [];
      if (d.z !== null && d.z !== undefined) metaParts.push('z ' + (d.z > 0 ? '+' : '') + d.z);
      if (d.pct !== null && d.pct !== undefined) metaParts.push('상위/하위 ' + d.pct + '%');
      metaParts.push('as of ' + d.as_of);
      var clk = d.history ? ' clickable' : '';
      var fwd = d.kind === 'forward';
      html += '<div class="ind-card' + clk + (fwd ? ' forward' : '') + '"' + (d.history ? ' data-ind="' + k + '"' : '') + '><div class="top"><span class="nm">' + (fwd ? '<span class="fwd-tag">🔮 전망</span> ' : '') + d.name + (d.history ? ' <span style="color:var(--accent);font-size:10px">📈</span>' : '') + '</span>' +
        '<span class="badge ' + badgeCls(d.signal_cls) + '">' + d.signal + '</span></div>' +
        '<div class="val tnum">' + fmtNum(d.current, (d.current === null ? 0 : Math.abs(d.current) >= 100 ? 0 : Number.isInteger(d.current) ? 0 : Math.abs(d.current) < 2 ? 2 : 1)) +
        '<span class="u">' + (d.unit || '') + '</span></div>' +
        '<div class="meta tnum">' + metaParts.join(' · ') + '</div>' +
        (d.history ? '<div class="spark"><canvas id="spk_' + k + '"></canvas></div>' : '') +
        '<div class="desc">' + d.desc + '</div>' +
        (d.source && d.source.url ? '<a class="src-link" href="' + d.source.url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ 원본: ' + d.source.name + '</a>' : '') +
        '</div>';
    });
    html += '</div></div>';
  });

  /* ── Earnings (5번째 축) ── */
  if (M.earnings) html += renderEarnings(M);

  /* ── AI (6) ── */
  if (M.ai) html += renderAI(M);

  /* ── Index charts ── */
  if (M.indices && (M.indices.spx || M.indices.kospi)) {
    html += '<div class="panel"><h2>장기 지수 추이</h2><p class="hint">월말 종가, 약 25년</p><div class="idx-grid">';
    ['spx', 'kospi'].forEach(function (key) {
      var idx = M.indices[key]; if (!idx) return;
      html += '<div class="idx-box"><div class="h"><span class="t">' + idx.name + '</span>' +
        '<span class="v tnum">' + fmtNum(idx.current, 0) + '</span></div>' +
        '<div class="idx-chart"><canvas id="idx_' + key + '"></canvas></div></div>';
    });
    html += '</div></div>';
  }

  /* ── Analogs ── */
  var a = M.analogs;
  if (a && a.neighbors && a.neighbors.length) {
    html += '<div class="panel"><h2>과거 유사 국면 비교</h2>' +
      '<p class="hint">현재 매크로·시장 상태를 ' + a.features.length + '개 지표 벡터로 표준화해, 2000년 이후 ' +
      a.n_months + '개월 중 가장 가까웠던 시점을 찾았습니다. 각 시점 <b>이후</b> S&P500·KOSPI 수익률입니다.<br>' +
      '<b>📏 거리(distance)</b>: 모든 지표를 표준화해 계산한 다차원 거리. <b>0에 가까울수록(작을수록) 현재와 더 유사</b>합니다. (아래 표는 거리 작은 순 정렬)</p>';
    html += '<table><thead><tr><th>유사 시점</th><th>거리↓유사</th>' +
      '<th>S&P +1M</th><th>+3M</th><th>+6M</th><th>+12M</th>' +
      '<th>KOSPI +3M</th><th>+12M</th></tr></thead><tbody>';
    a.neighbors.forEach(function (nb) {
      html += '<tr><td>' + nb.date.slice(0, 7) + '</td><td class="tnum">' + nb.distance + '</td>' +
        pctCell(nb.spx_fwd.m1) + pctCell(nb.spx_fwd.m3) + pctCell(nb.spx_fwd.m6) + pctCell(nb.spx_fwd.m12) +
        pctCell(nb.kospi_fwd.m3) + pctCell(nb.kospi_fwd.m12) + '</tr>';
    });
    var s = a.summary;
    html += '<tr class="summary"><td>중간값 (base rate)</td><td>–</td>' +
      pctCell(s.spx.m1) + pctCell(s.spx.m3) + pctCell(s.spx.m6) + pctCell(s.spx.m12) +
      pctCell(s.kospi.m3) + pctCell(s.kospi.m12) + '</tr>';
    html += '</tbody></table>';
    html += '<div class="sub-label" style="margin-top:14px">유사국면 해설 — 어떤 점에서 유사한지 · 당시 주가·금리</div>';
    html += '<div class="analog-grid">';
    a.neighbors.forEach(function (nb) {
      var v = nb.vals || {}, vb = [];
      if (v.cpi !== null && v.cpi !== undefined) vb.push('인플레 ' + v.cpi + '%');
      if (v.vix !== null && v.vix !== undefined) vb.push('VIX ' + v.vix);
      if (v.curve !== null && v.curve !== undefined) vb.push('장단기차 ' + v.curve + '%p');
      if (v.us10y !== null && v.us10y !== undefined) vb.push('美10Y ' + v.us10y + '%' + (v.us10y_chg3 !== null && v.us10y_chg3 !== undefined ? '(' + (v.us10y_chg3 > 0 ? '+' : '') + v.us10y_chg3 + '%p·3M)' : ''));
      if (v.cli !== null && v.cli !== undefined) vb.push('경기선행 ' + v.cli);
      if (v.mom !== null && v.mom !== undefined) vb.push('주가12M ' + (v.mom > 0 ? '+' : '') + v.mom + '%');
      html += '<div class="analog-card">' +
        '<div class="ac-h"><span class="ac-date">' + nb.date.slice(0, 7) + '</span><span class="ac-dist">유사도 거리 ' + nb.distance + '</span></div>' +
        '<div class="ac-ctx">📍 ' + (nb.context || '') + '</div>' +
        (nb.similar ? '<div class="ac-sim">🔗 <b>유사점</b>: ' + nb.similar.join('·') + (nb.divergent && nb.divergent.length ? ' <span style="color:var(--muted)">(차이: ' + nb.divergent.join('·') + ')</span>' : '') + '</div>' : '') +
        '<div class="ac-vals">당시 지표: ' + vb.join(' · ') + '</div>' +
        '<div class="ac-fwd">📈 이후 주가 → S&P ' + retSpan(nb.spx_fwd.m3) + '(3M)·' + retSpan(nb.spx_fwd.m12) + '(12M) / KOSPI ' + retSpan(nb.kospi_fwd.m12) + '(12M)</div>' +
        '</div>';
    });
    html += '</div>';
    html += '<p class="disclaimer">유사도는 유클리드 거리(z-표준화, ' + a.features.length + '개 지표) 기준. "유사점"은 현재와 표준화 차이가 가장 작은 지표 3개. 표본이 적어 개별 사례(특히 위기 직전)는 참고용입니다.</p>';
    html += '</div>';
  }

  app.innerHTML = html;

  /* draw charts after DOM */
  Object.keys(M.indicators).forEach(function (k) {
    var d = M.indicators[k];
    var cv = document.getElementById('spk_' + k);
    if (cv && d.history) sparkline(cv, d.history, d.score);
  });
  // 지표 카드 클릭 → 히스토리 모달
  document.querySelectorAll('.ind-card.clickable').forEach(function (card) {
    card.addEventListener('click', function () { showIndicatorModal(card.getAttribute('data-ind')); });
  });
  // 새 업데이트 데스크톱 알림 (권한 있으면)
  tryNotifyUpdates(M);
  // 타임머신 슬라이더 + 주가차트
  if (M.regime_history && M.regime_history.length) {
    var sl = document.getElementById('tmSlider');
    tmDrawChart(M);
    updateTimeMachine(M.regime_history.length - 1);
    if (sl) {
      sl.addEventListener('input', function () { updateTimeMachine(parseInt(sl.value, 10)); });
      var rst = document.getElementById('tmReset');
      if (rst) rst.addEventListener('click', function () { sl.value = M.regime_history.length - 1; updateTimeMachine(M.regime_history.length - 1); });
    }
  }
  if (M.indices) ['spx', 'kospi'].forEach(function (key) {
    var cv = document.getElementById('idx_' + key);
    if (cv && M.indices[key]) bigChart(cv, M.indices[key]);
  });
  if (M.earnings) COUNTRY_ORDER.forEach(function (cc) {
    var c = M.earnings.countries[cc];
    var cv = document.getElementById('ctrend_' + cc);
    if (cv && c && c.trend) sparkline(cv, { dates: ['90일전', '60일전', '30일전', '7일전', '현재'], values: c.trend }, (c.rev90 || 0) / 5);
  });
  // 국가 카드 클릭 → 연도별 EPS 상세
  if (M.earnings) {
    document.querySelectorAll('.ctry-card').forEach(function (card) {
      card.addEventListener('click', function () { showCountryDetail(card.getAttribute('data-cc')); });
    });
    var firstCC = COUNTRY_ORDER.find(function (cc) {
      return M.earnings.countries[cc] && M.earnings.countries[cc].annual;
    });
    if (firstCC) showCountryDetail(firstCC);
    // 섹터 행 클릭 → 상위 종목 표 토글
    document.querySelectorAll('.sector-row.clickable').forEach(function (row) {
      row.addEventListener('click', function () {
        var el = document.getElementById('hold_' + row.getAttribute('data-hold'));
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
      });
    });
  }
  // 한국 수급 시계열 차트
  if (M.kr_flows_ts) {
    var ky = document.getElementById('krYtd'); if (ky && M.kr_flows_ts.ytd_cum) krMultiLine(ky, M.kr_flows_ts.ytd_cum);
    var km = document.getElementById('krMonth'); if (km && M.kr_flows_ts.month_daily) krMonthBars(km, M.kr_flows_ts.month_daily);
    var kd = document.getElementById('krDeposit'); if (kd && M.kr_flows_ts.deposit) depositLine(kd, M.kr_flows_ts.deposit);
  }
  // 신용잔고: 클릭 시 지수·신용잔고 추이 토글
  if (M.kr_credit) {
    var cstat = document.getElementById('krCreditStat');
    var creditDrawn = false;
    if (cstat) cstat.addEventListener('click', function () {
      var det = document.getElementById('krCreditDetail'); if (!det) return;
      var show = det.style.display === 'none';
      det.style.display = show ? 'block' : 'none';
      if (show && !creditDrawn) {
        var cr = M.kr_credit;
        var k = document.getElementById('krCreditKospi'); if (k) krCreditChart(k, cr.dates, cr.kospi_idx, cr.total_credit, 'KOSPI');
        var q = document.getElementById('krCreditKosdaq'); if (q) krCreditChart(q, cr.dates, cr.kosdaq_idx, cr.total_credit, 'KOSDAQ');
        creditDrawn = true;
      }
    });
  }
  // AI 섹션 차트
  if (M.ai) {
    var cc = document.getElementById('aiCapexChart'); if (cc) aiCapexChart(cc, M.ai);
    var cg = document.getElementById('aiCapexGdp'); if (cg && M.ai.capex_gdp_series) pctLineChart(cg, M.ai.capex_gdp_series, '%');
    var rg = document.getElementById('aiRndGdp'); if (rg && M.ai.rnd_gdp) pctLineChart(rg, M.ai.rnd_gdp, '%');
    var ic = document.getElementById('aiIntensityChart'); if (ic && M.ai.capex_intensity) aiIntensityChart(ic, M.ai.capex_intensity);
    if (M.ai.financials) ['rev', 'opinc', 'fcf', 'mktcap'].forEach(function (k) {
      var el = document.getElementById('aifin_' + k); if (el) aiGroupedBars(el, M.ai.financials, k);
    });
    M.ai.labs.forEach(function (lab, i) { var lc = document.getElementById('aiLab_' + i); if (lc) labRevChart(lc, lab); });
  }
}

function doRender(M) {
  try { render(M); }
  catch (e) { document.getElementById('app').innerHTML = '<div class="loading">렌더 오류: ' + e.message + '</div>'; console.error(e); }
}
// kr_flows.json을 직접 읽어 macro-data.js보다 신선하면 한국 수급을 덮어씀
// (무거운 fetch_macro가 늦어도 한국 수급은 항상 최신 — fetch_kr_flows는 매일 안정 갱신)
function loadFreshKrFlows(M, done) {
  if (!M || !M.kr_flows_ts) { done(M); return; }
  var v = Math.floor(Date.now() / 60000);
  fetch('kr_flows.json?v=' + v, { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (kr) {
      try {
        var liveDate = (M.kr_flows_ts.latest || {}).date;
        if (kr && kr.latest && kr.latest.date && (!liveDate || kr.latest.date > liveDate)) {
          var dep = M.kr_flows_ts.deposit, depSrc = M.kr_flows_ts.deposit_source, src = M.kr_flows_ts.source, srcUrl = M.kr_flows_ts.source_url;
          M.kr_flows_ts = Object.assign({}, M.kr_flows_ts, kr, { deposit: dep, deposit_source: depSrc, source: src, source_url: srcUrl });
          if (M.indicators.kr_flows && kr.mtd) M.indicators.kr_flows.current = kr.mtd.foreign;
          console.log('KR flows refreshed from kr_flows.json:', kr.latest.date);
        }
      } catch (e) {}
    })
    .catch(function () {})
    .finally(function () { done(M); });
}
window.addEventListener('DOMContentLoaded', function () {
  // 모달 닫기 핸들러 (1회 등록)
  document.getElementById('mClose').addEventListener('click', closeIndModal);
  document.getElementById('indModal').addEventListener('click', function (e) { if (e.target === this) closeIndModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeIndModal(); });
  if (window.MACRO) loadFreshKrFlows(window.MACRO, doRender);
  else document.getElementById('app').innerHTML = '<div class="loading">macro-data.js를 불러오지 못했습니다. fetch_macro.py를 먼저 실행하세요.</div>';
});
</script>
</body>
</html>
