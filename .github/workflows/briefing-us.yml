name: US Market Briefing

on:
  schedule:
    # 미국장 마감(20:00 UTC) 후 실행. 브리핑이 자체 fetch_daily로 최신 종가를 받으므로
    # daily-update 완료 전이어도 무방. 무료 cron 지연 대비 백업 2회 + 멱등성 가드.
    # 07:40 KST = 22:40 UTC(전일).
    - cron: '40 22 * * 1-5'  # 07:40 KST (화~토, 주력)
    - cron: '0 23 * * 1-5'   # 08:00 KST (백업1)
    - cron: '40 23 * * 1-5'  # 08:40 KST (백업2)
  workflow_dispatch:
    inputs:
      send_as_of:
        description: "기존 브리핑 이메일만 재발송할 날짜(YYYY-MM-DD). 비우면 평소대로 생성·발송."
        required: false
        default: ""
  repository_dispatch:
    types: [briefing-us-trigger]

permissions:
  contents: write

concurrency:
  group: briefing-us
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install anthropic python-docx
          npm install -g @anthropic-ai/claude-code

      - name: Refresh market data (not committed)
        run: |
          python fetch_daily.py || true
          python fetch_benchmarks.py || true

      # 지연된 백업 런들이 몰려도 중복 생성·발송하지 않도록, 생성 직전 origin 최신 아카이브로 동기화.
      - name: Sync briefing archive from origin
        run: |
          git fetch origin main || true
          git checkout origin/main -- briefings-archive.js briefing-data.js briefings 2>/dev/null || true

      - name: Generate briefing (Claude Code, 구독 차감)
        id: gen
        env:
          # 구독(Max) 차감 — claude -p CLI 경유. API 키 없이 작동.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python briefing/generate_briefing.py us --skip-if-exists

      # 발송을 커밋보다 먼저 — 아카이브 커밋 경합이 이메일 발송을 막거나 지연시키지 않도록.
      - name: Send email (SMTP)
        if: steps.gen.outputs.status == 'generated'
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python briefing/send_email_us.py briefings-archive.js ${{ steps.gen.outputs.as_of }}

      # 아카이브 커밋은 best-effort — 실패해도 잡을 실패시키지 않는다(이메일은 이미 발송됨).
      - name: Commit & push briefing files (best-effort)
        if: steps.gen.outputs.status == 'generated'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- daily-data.js benchmarks.js 2>/dev/null || true
          git add briefings-archive.js briefing-data.js briefings
          if git diff --staged --quiet; then
            echo "변경 없음."; exit 0
          fi
          git commit -m "briefing: ${{ steps.gen.outputs.as_of }} 미국장 마감 시황 브리핑"
          for attempt in 1 2 3; do
            git fetch origin main || true
            if git rebase origin/main && git push; then
              echo "push 성공 (attempt $attempt)"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            # 다른 런이 이미 오늘치를 커밋했으면 우리 커밋은 불필요 — 정상 종료.
            if git cat-file -p origin/main:briefings-archive.js 2>/dev/null \
                 | grep -q "\"as_of\": \"${{ steps.gen.outputs.as_of }}\""; then
              echo "origin 에 이미 ${{ steps.gen.outputs.as_of }} 존재 — 커밋 생략"; exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::warning::아카이브 push 실패 — 이메일은 발송 완료, 아카이브는 다음 런에서 반영"; exit 0

      - name: Re-send existing briefing email (manual)
        if: ${{ github.event.inputs.send_as_of != '' }}
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python briefing/send_email_us.py briefings-archive.js ${{ github.event.inputs.send_as_of }}
