name: Daily Portfolio Update

on:
  schedule:
    # GitHub Actions cron은 무료 티어에서 자주 지연/스킵됨.
    # → 같은 시간대에 여러 분 단위로 분산 시도 + 폭넓게 거는 다중 백업.
    # KOSPI 마감 직후 (15:30 KST = 06:30 UTC)
    - cron: '37 6 * * *'    # 15:37 KST
    - cron: '53 6 * * *'    # 15:53 KST (백업1)
    - cron: '11 7 * * *'    # 16:11 KST (백업2)
    - cron: '29 7 * * *'    # 16:29 KST (백업3)
    # 미국장 마감 후 (06:30 KST = 21:30 UTC 전날)
    - cron: '41 21 * * *'   # 06:41 KST (다음날)
    - cron: '7 22 * * *'    # 07:07 KST (백업1)
    - cron: '29 22 * * *'   # 07:29 KST (백업2)
    - cron: '47 23 * * *'   # 08:47 KST (백업3)
  workflow_dispatch:  # 수동 실행 가능
  # 외부 cron 서비스(cron-job.org 등)가 깨울 수 있는 webhook 트리거.
  # GitHub 무료 스케줄러가 자주 skip하므로, 외부에서 아래 API를 POST하면 확실히 실행:
  #   curl -X POST -H "Authorization: Bearer <PAT>" \
  #     -H "Accept: application/vnd.github+json" \
  #     https://api.github.com/repos/jinjo202/pf-dash-a3k9m/dispatches \
  #     -d '{"event_type":"daily-trigger"}'
  repository_dispatch:
    types: [daily-trigger]

permissions:
  contents: write

# 같은 시점에 여러 cron이 동시 firing 시 race condition으로 인한 checkout 실패 방지.
# 첫 번째만 실행되고 나머지는 cancel (이미 데이터 갱신됐으므로 OK).
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # rebase/pull 안전성: shallow checkout 대신 full history (push race 방지)
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decrypt portfolio data
        env:
          PORTFOLIO_PASSWORD: ${{ secrets.PORTFOLIO_PASSWORD }}
        run: python encrypt_data.py decrypt

      - name: Update prices (yfinance)
        run: python update_prices.py

      - name: Compute correlation-adjusted volatility
        run: python compute_corr_vol.py
        continue-on-error: true

      - name: Fetch benchmark indices (KOSPI, S&P, VIX, etc.)
        run: python fetch_benchmarks.py
        continue-on-error: true

      - name: Fetch Korea investor flows (Naver → kr_flows.json)
        run: python fetch_kr_flows.py
        continue-on-error: true

      - name: Fetch Korea deposit/credit (Naver → kr_deposit.json)
        run: python fetch_kr_deposit.py
        continue-on-error: true

      - name: Fetch macro regime data (FRED + yfinance → macro-data.js)
        run: python fetch_macro.py
        continue-on-error: true

      - name: Fetch historical valuations (S&P 500 PE/PB from multpl.com)
        run: python fetch_historical_valuations.py
        continue-on-error: true

      - name: Fetch sector news (Google News RSS → holding-news.js)
        run: python fetch_sector_news.py
        continue-on-error: true

      - name: Fetch ETF constituent news (Google News RSS → constituent-news.js)
        run: python fetch_constituent_news.py
        continue-on-error: true

      - name: Compute historical YTD series + sector returns
        run: python compute_historical.py
        continue-on-error: true

      - name: Fetch ETF top holdings (yfinance funds_data)
        run: python fetch_etf_holdings.py
        continue-on-error: true

      - name: Fetch underlying stocks YTD returns
        run: python fetch_underlying_returns.py
        continue-on-error: true

      - name: Fetch PER/PBR/ROE valuations
        run: python fetch_valuations.py
        continue-on-error: true

      - name: Fetch daily market data (indices / sectors / movers / news)
        run: python fetch_daily.py
        continue-on-error: true

      - name: Country allocation model + backtest (country-model.js)
        run: python weekly/country_backtest.py
        continue-on-error: true

      - name: Fetch sector/stock returns (yfinance → sector-returns.js)
        run: python fetch_sector_returns.py
        continue-on-error: true

      - name: Fetch sector 시총·Fwd PER (yfinance → sector-quotes.js, 하루 1회)
        run: python fetch_sector_quotes.py
        continue-on-error: true

      - name: Fetch dividend screening metrics (yfinance → dividends-quotes.js, 하루 1회)
        run: python fetch_dividends.py
        continue-on-error: true

      - name: Fetch dividend stock news (Google News RSS → dividends-news.js, 하루 1회)
        run: python fetch_dividends_news.py
        continue-on-error: true

      - name: Re-encrypt portfolio data
        env:
          PORTFOLIO_PASSWORD: ${{ secrets.PORTFOLIO_PASSWORD }}
        run: python encrypt_data.py encrypt

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # cron이 건드려야 할 파일은 데이터 3종뿐. portfolio.html 등 소스 파일은
          # 절대 cron이 commit하면 안 됨 (과거: soft-reset 패턴이 옛 working tree의
          # portfolio.html을 그대로 커밋해 사용자 변경을 되돌리는 버그 발생).
          TRACKED="portfolio-data.js prices_log.json benchmarks.js macro-data.js kr_flows.json kr_deposit.json daily-data.js holding-news.js constituent-news.js country-model.js country-model-state.json sector-returns.js sector-quotes.js dividends-quotes.js dividends-news.js"

          # 생성된 데이터 파일을 임시 백업 (origin 정렬 시 보존)
          TMP="$(mktemp -d)"
          for f in $TRACKED; do [ -f "$f" ] && cp "$f" "$TMP/$(echo "$f" | tr '/' '_')"; done
          restore_data() {
            for f in $TRACKED; do
              b="$TMP/$(echo "$f" | tr '/' '_')"
              [ -f "$b" ] && cp "$b" "$f"
            done
          }

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            # 항상 origin/main에 정확히 정렬 (최신 portfolio.html 등 소스 보존)
            git reset --hard origin/main
            # 생성한 데이터 파일만 다시 덮어쓰기
            restore_data
            git add $TRACKED

            if git diff --staged --quiet; then
              echo "데이터 변경 없음. 종료."
              exit 0
            fi
            git commit -m "auto: daily update $(date -u +%Y-%m-%d)"

            if git push; then
              echo "push 성공 (attempt $attempt)"
              exit 0
            fi
            echo "push 실패 — 잠시 대기 후 재시도 ($attempt/5)"
            sleep $((attempt * 5))
          done

          echo "::error::5회 시도 후 push 실패"
          exit 1
