  /* ── 섹터 히트맵 ── */
  var _sectorHold = {};
  var _sectorHoldSynthetic = {};
  // 지역 자체 종목 유니버스(r.stocks)를 섹터별로 그룹핑 — 미국 SPDR ETF 구성종목이 없는
  // 지역(유럽·중국·일본·한국)의 대체 데이터 소스. 이미 로드된 실데이터만 재사용(가공 없음).
  function sectorHoldingsFromStocks(sectorName, stocks) {
    if (!stocks || !stocks.length) return null;
    var list = stocks.filter(function(x){ return x.sector === sectorName; });
    if (!list.length) return null;
    list = list.slice().sort(function(a, b){ return (b.mktcap || 0) - (a.mktcap || 0); }).slice(0, 10);
    return list.map(function(x){
      return { name: x.name, ticker: x.ticker, mktcap: x.mktcap, daily: x.chgPct, mtd: x.mtdPct, ytd: x.ytdPct };
    });
  }
  function renderSectorHeatmap(sectors, fallbackStocks) {
    var html = '<div class="sector-grid">';
    sectors.forEach(function(s) {
      var cls = heatClass(s.chgPct);
      var native = s.holdings && s.holdings.length;
      var holds = native ? s.holdings : sectorHoldingsFromStocks(s.name, fallbackStocks);
      var synthetic = !native && !!holds;
      var has = !!(holds && holds.length);
      if (has) { _sectorHold[s.name] = holds; _sectorHoldSynthetic[s.name] = synthetic; }
      var perfBits = [];
      if (s.mtdPct != null) perfBits.push('MTD ' + (s.mtdPct>0?'+':'') + fmt(s.mtdPct,1) + '%');
      if (s.ytdPct != null) perfBits.push('YTD ' + (s.ytdPct>0?'+':'') + fmt(s.ytdPct,1) + '%');
      html += '<div class="sector-cell ' + cls + (has ? ' clickable' : '') + '" data-sector="' + escHtml(s.name) + '"' +
        (has ? ' onclick="showSectorHoldings(this.dataset.sector)"' : '') + '>' +
        '<div class="sname">' + s.name + '</div>' +
        '<div class="spct">' + fmtPct(s.chgPct) + '</div>' +
        (perfBits.length ? '<div class="sperf">' + perfBits.join(' · ') + '</div>' : '') +
        (s.etf ? '<div class="setf">' + s.etf + '</div>' : '') +
        (has ? '<div class="smore">' + (native ? '상위10 ▾' : '구성종목 ▾') + '</div>' : '') +
        '</div>';
    });
    html += '</div>';
    html += '<div id="sectorHoldPanel" class="sector-hold-panel" style="display:none"></div>';
    return html;
  }

  // 시총 포맷 (USD) + 원화 환산
  function fmtMktcapUsd(usd) {
    if (usd == null) return '—';
    if (usd >= 1e12) return '$' + (usd/1e12).toFixed(2) + 'T';
    if (usd >= 1e9)  return '$' + (usd/1e9).toFixed(1) + 'B';
    if (usd >= 1e6)  return '$' + (usd/1e6).toFixed(0) + 'M';
    return '$' + usd.toFixed(0);
  }
  // 티커 접미사로 시총 원통화 판별 — yfinance는 거래소 통화 그대로 mktcap을 반환하므로
  // (예: .KS→원화, .T→엔화, .HK→홍콩달러) 무조건 $ 표기하면 수십~수천배 오차가 생김.
  var TICKER_CCY = [
    { re: /\.(KS|KQ)$/i, sym: '₩', ccy: 'KRW', group: 'ea' },
    { re: /\.T$/i,       sym: '¥', ccy: 'JPY', group: 'ea' },
    { re: /\.(SS|SZ)$/i, sym: '¥', ccy: 'CNY', group: 'ea' },
    { re: /\.HK$/i,      sym: 'HK$', ccy: 'HKD', group: 'wide' },
    { re: /\.(DE|PA|AS|MC|BR|MI)$/i, sym: '€', ccy: 'EUR', group: 'wide' },
    { re: /\.SW$/i,      sym: 'Fr', ccy: 'CHF', group: 'wide' },
    { re: /\.L$/i,       sym: '£', ccy: 'GBP', group: 'wide' },
    { re: /\.CO$/i,      sym: 'kr', ccy: 'DKK', group: 'wide' },
    { re: /\.OL$/i,      sym: 'kr', ccy: 'NOK', group: 'wide' },
  ];
  function tickerCcy(ticker) {
    if (!ticker) return null;
    for (var i = 0; i < TICKER_CCY.length; i++) if (TICKER_CCY[i].re.test(ticker)) return TICKER_CCY[i];
    return null;
  }
  // 동아시아(원/엔/위안) 조·억 표기
  function fmtMktcapEA(v, sym) {
    if (v >= 1e12) return sym + (v / 1e12).toFixed(1) + '조';
    if (v >= 1e8)  return sym + Math.round(v / 1e8).toLocaleString('ko-KR') + '억';
    return sym + Math.round(v).toLocaleString('ko-KR');
  }
  // 그 외 통화 T/B/M 표기(달러 포맷과 동일 스케일, 기호만 교체)
  function fmtMktcapWide(v, sym) {
    if (v >= 1e12) return sym + (v / 1e12).toFixed(2) + 'T';
    if (v >= 1e9)  return sym + (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6)  return sym + (v / 1e6).toFixed(0) + 'M';
    return sym + v.toFixed(0);
  }
  // 종목 시총 표기: 티커로 원통화 판별 → 원화환산(₩) 우선 표기 + 현지통화 병기.
  // 환율: USD는 D.krw, 그 외(JPY/CNY/EUR/GBP/CHF/HKD/DKK/NOK)는 D.fx[통화].
  // 원화(KRW) 종목은 이미 원화라 그대로. 환율 데이터가 없으면 현지통화만 표기(정직).
  // plain=true: HTML을 못 쓰는 컨텍스트(title 속성 등)용 — 태그 없는 순수 텍스트 반환
  function fmtMktcapByTicker(v, ticker, plain) {
    if (v == null) return '—';
    var c = tickerCcy(ticker);
    var ccy = c ? c.ccy : 'USD';
    var localStr = !c ? fmtMktcapUsd(v)
      : (c.group === 'ea' ? fmtMktcapEA(v, c.sym) : fmtMktcapWide(v, c.sym));
    if (ccy === 'KRW') return localStr;                 // 이미 원화
    var rate = ccy === 'USD' ? ((D && D.krw) || 0)
      : ((D && D.fx && D.fx[ccy]) || 0);
    if (!rate) return localStr;                          // 환율 없으면 현지통화만
    var krwStr = fmtMktcapEA(v * rate, '₩');
    return krwStr + (plain ? ' (' + localStr + ')' : ' <span class="sh-krw">(' + localStr + ')</span>');
  }
  function renderSectorHoldings(name, holds, synthetic) {
    if (!holds || !holds.length) return '<div class="empty-note">' + escHtml(name) + ' 상위 종목 데이터 없음</div>';
    var rows = holds.map(function(h, i) {
      return '<tr>' +
        '<td class="sh-rank">' + (i+1) + '</td>' +
        '<td class="sh-name">' + escHtml(stockLabel(h.name, h.ticker)) + '</td>' +
        '<td class="sh-mc">' + fmtMktcapByTicker(h.mktcap, h.ticker) + '</td>' +
        '<td class="mom ' + colorClass(h.daily) + '">' + fmtPct(h.daily) + '</td>' +
        '<td class="mom ' + colorClass(h.mtd) + '">' + fmtPct(h.mtd) + '</td>' +
        '<td class="mom ' + colorClass(h.ytd) + '">' + fmtPct(h.ytd) + '</td>' +
      '</tr>';
    }).join('');
    var titleWord = synthetic ? '구성' : '상위';
    var note = synthetic
      ? '<div class="sh-note">※ 섹터 ETF 구성종목이 아닌, 이 지역 커버 유니버스 내 해당 섹터 종목(시총순)입니다 — 시장 전체 상위 종목과 다를 수 있습니다.</div>'
      : '';
    return '<div class="sh-title">📊 ' + escHtml(name) + ' ' + titleWord + ' ' + holds.length + '종목' +
      ' <span class="sh-close" onclick="showSectorHoldings(\'' + escHtml(name).replace(/'/g,'') + '\')">✕ 닫기</span></div>' +
      '<table class="sh-table"><thead><tr>' +
      '<th></th><th>종목</th><th style="text-align:right">시총 (원화환산)</th>' +
      '<th style="text-align:right">일간</th><th style="text-align:right">MTD</th><th style="text-align:right">YTD</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' + note;
  }
  window.showSectorHoldings = function(name) {
    var panel = document.getElementById('sectorHoldPanel');
    if (!panel) return;
    document.querySelectorAll('.sector-cell.sel').forEach(function(e){ e.classList.remove('sel'); });
    if (panel.dataset.open === name && panel.style.display !== 'none') {
      panel.style.display = 'none'; panel.dataset.open = ''; return;
    }
    panel.innerHTML = renderSectorHoldings(name, _sectorHold[name], _sectorHoldSynthetic[name]);
    panel.style.display = 'block'; panel.dataset.open = name;
    var cell = document.querySelector('.sector-cell[data-sector="' + name + '"]');
    if (cell) cell.classList.add('sel');
    panel.scrollIntoView({behavior:'smooth', block:'nearest'});
  };

  /* ── finviz 스타일 트리맵 (대표지수 클릭 시) ── */
  // 제곱화 트리맵(squarified): items[{value}] → 각 항목에 {x,y,w,h} 부여 (Bruls et al.)
  function squarify(items, x, y, w, h) {
    var nodes = items.filter(function(d){ return d.value > 0; })
                     .sort(function(a, b){ return b.value - a.value; });
    var total = nodes.reduce(function(s, d){ return s + d.value; }, 0);
    if (!total || w <= 0 || h <= 0) return [];
    nodes.forEach(function(d){ d._area = d.value / total * (w * h); });
    var out = [], rect = { x: x, y: y, w: w, h: h }, row = [], i = 0;
    function side() { return Math.min(rect.w, rect.h); }
    function worst(r, len) {
      var s = r.reduce(function(a, n){ return a + n._area; }, 0);
      var mx = Math.max.apply(null, r.map(function(n){ return n._area; }));
      var mn = Math.min.apply(null, r.map(function(n){ return n._area; }));
      return Math.max(len * len * mx / (s * s), s * s / (len * len * mn));
    }
    function place(r) {
      var s = r.reduce(function(a, n){ return a + n._area; }, 0);
      if (rect.w >= rect.h) {
        var colW = s / rect.h, cy = rect.y;
        r.forEach(function(n){ var rh = n._area / colW; out.push({ x: rect.x, y: cy, w: colW, h: rh, d: n }); cy += rh; });
        rect.x += colW; rect.w -= colW;
      } else {
        var rowH = s / rect.w, cx = rect.x;
        r.forEach(function(n){ var rw = n._area / rowH; out.push({ x: cx, y: rect.y, w: rw, h: rowH, d: n }); cx += rw; });
        rect.y += rowH; rect.h -= rowH;
      }
    }
    while (i < nodes.length) {
      var c = nodes[i], len = side();
      if (row.length === 0 || worst(row, len) >= worst(row.concat([c]), len)) { row.push(c); i++; }
      else { place(row); row = []; }
    }
    if (row.length) place(row);
    return out;
  }

  function renderTreemap(r) {
    var stocks = (r.stocks || []).filter(function(s){ return s.mktcap > 0 && s.chgPct != null; });
    if (stocks.length < 2) return '<div class="tm-empty">구성종목 데이터가 부족합니다.</div>';

    // 섹터별 그룹 (시총 합으로 묶음)
    var bySec = {};
    stocks.forEach(function(s){
      var k = s.sector || '기타';
      (bySec[k] = bySec[k] || []).push(s);
    });
    var sectors = Object.keys(bySec).map(function(k){
      return { name: k, value: bySec[k].reduce(function(a, s){ return a + s.mktcap; }, 0), stocks: bySec[k] };
    });

    var W = 1000, H = 600;            // 가상 좌표계 (퍼센트로 환산)
    var APPROX_PX = 960;              // 폰트 크기 추정용 캔버스 폭(데스크톱 근사)
    var pct = function(v, tot){ return (v / tot * 100).toFixed(3) + '%'; };
    var secRects = squarify(sectors, 0, 0, W, H);
    var LBL = 16;                     // 섹터 라벨 높이(가상)

    var html = '';
    secRects.forEach(function(sr){
      var sec = sr.d;
      // 섹터 블록 배경 + 라벨
      html += '<div class="tm-sector" style="left:' + pct(sr.x, W) + ';top:' + pct(sr.y, H) +
        ';width:' + pct(sr.w, W) + ';height:' + pct(sr.h, H) + '">';
      if (sr.h > LBL * 1.6) html += '<div class="tm-sector-lbl">' + escHtml(sec.name) + '</div>';
      html += '</div>';

      // 섹터 내부 종목 타일 (라벨 높이만큼 위 여백)
      var pad = 2, top = (sr.h > LBL * 1.6) ? LBL : 0;
      var ix = sr.x + pad, iy = sr.y + top + pad, iw = sr.w - pad * 2, ih = sr.h - top - pad * 2;
      if (iw <= 0 || ih <= 0) return;
      var tiles = squarify(sec.stocks.map(function(s){ return { value: s.mktcap, s: s }; }), ix, iy, iw, ih);
      tiles.forEach(function(t){
        var s = t.d.s;
        var wpx = t.w / W * APPROX_PX, hpx = t.h / H * (APPROX_PX * H / W);
        var fs = Math.floor(Math.min(wpx / 4.2, hpx / 2.4));
        var label = '';
        if (fs >= 7) {
          // 깔끔한 영문 심볼(예: NVDA)은 티커, 코드형(005930.KS·9984.T)이면 종목명 표시
          var nm = (/^[A-Z]{1,6}$/.test(s.ticker || '')) ? s.ticker : (s.name || s.ticker || '');
          var tf = Math.max(8, Math.min(20, fs));
          label = '<span class="tm-tkr" style="font-size:' + tf + 'px">' + escHtml(nm) + '</span>';
          if (hpx > 30) label += '<span class="tm-pct" style="font-size:' + Math.max(8, Math.min(14, tf - 2)) + 'px">' + fmtPct(s.chgPct) + '</span>';
        }
        var tip = (s.name || s.ticker) + (s.ticker ? ' (' + s.ticker + ')' : '') + ' · ' + fmtPct(s.chgPct) +
          ' · 시총 ' + fmtMktcapByTicker(s.mktcap, s.ticker, true);
        html += '<div class="tm-tile ' + heatClass(s.chgPct) + '" title="' + escHtml(tip) + '" style="left:' +
          pct(t.x, W) + ';top:' + pct(t.y, H) + ';width:' + pct(t.w, W) + ';height:' + pct(t.h, H) + '">' +
          label + '</div>';
      });
    });
    return html;
  }

  window.showTreemap = function(rkey) {
    var panel = document.getElementById('treemapPanel');
    if (!panel) return;
    var r = getRegion(rkey);
    if (!r) return;
    if (panel.dataset.open === rkey && panel.style.display !== 'none') {
      panel.style.display = 'none'; panel.dataset.open = ''; return;
    }
    var main = r.indices && r.indices[0];
    var head = '<div class="tm-head">' +
      '<span class="tm-title">🗺 ' + (r.flag || '') + ' ' + escHtml(r.name) +
        (main ? ' · ' + escHtml(main.name) : '') + ' 구성종목 히트맵</span>' +
      '<span class="tm-sub">' + (r.as_of ? r.as_of + ' 기준' : '') + '</span>' +
      '<span class="tm-close" onclick="showTreemap(\'' + rkey + '\')">✕ 닫기</span>' +
    '</div>' +
    '<div class="tm-legend">하락' +
      '<i class="heat-big-neg"></i><i class="heat-neg"></i><i class="heat-neg-light"></i>' +

      '<i class="heat-pos-light"></i><i class="heat-pos"></i><i class="heat-big-pos"></i>상승' +

    panel.style.display = 'block'; panel.dataset.open = rkey;
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  /* ── 지수 카드 바 (Google Finance 스타일) ── */
  function chipClass(v) {
    if (v == null) return 'chip-neu';
    return v > 0 ? 'chip-pos' : v < 0 ? 'chip-neg' : 'chip-neu';
  }
  function arrowFor(v) {
    if (v == null || v === 0) return '';
    return v > 0 ? '▲ ' : '▼ ';
  }
  // MTD·YTD 수익률 한 줄 (지수·섹터 공용). 값 없으면 해당 항목 생략.
  function perfPct(v) {
    return '<span class="' + (v >= 0 ? 'ytd-pos' : 'ytd-neg') + '">' +
      (v > 0 ? '+' : '') + fmt(v, 1) + '%</span>';
  }
  function perfRow(mtd, ytd) {
    var bits = [];
    if (mtd != null) bits.push('월초 ' + perfPct(mtd));
    if (ytd != null) bits.push('연초 ' + perfPct(ytd));
    if (!bits.length) return '';
    return '<div class="iytd">' + bits.join(' · ') + '</div>';
  }
  function renderIndexBar(indices) {
    var html = '<div class="idx-bar">';
    indices.forEach(function(idx) {
      var priceStr = idx.currency === '' ? fmt(idx.price, 2) : idx.price ? idx.price.toLocaleString('ko-KR', {maximumFractionDigits:2}) : '—';
      html += '<div class="idx-card">' +
        '<div class="iname">' + idx.name + '</div>' +
        '<div class="iprice tnum">' + priceStr + (idx.currency ? ' <span style="font-size:10px;color:var(--muted)">' + idx.currency + '</span>' : '') + '</div>' +
        '<div class="ispark">' + makeSpark(idx.spark, {w:160, h:34, cls:'spark-wide', area:true}) + '</div>' +
        '<div class="ichg-chip ' + chipClass(idx.chgPct) + '">' + arrowFor(idx.chgPct) + fmtPct(idx.chgPct) +
          (idx.chg ? ' (' + (idx.chg>0?'+':'') + fmt(idx.chg,2) + ')' : '') + '</div>' +
        perfRow(idx.mtdPct, idx.ytdPct) +
        '</div>';
    });
    html += '</div>';
    return html;
  }

  /* ── Google Finance 리스트 행 ── */
  function renderGFRow(s, i) {
    var priceStr = s.price != null ? s.price.toLocaleString('ko-KR', {maximumFractionDigits:2}) : '—';
    var rankCls = i < 3 ? 'gf-rank top3' : 'gf-rank';
    var meta = [];
    if (s.sector) meta.push(escHtml(s.sector));
    if (s.mktcap) meta.push('시총 <b>' + fmtMktcapByTicker(s.mktcap, s.ticker) + '</b>');
    if (s.fwdPER != null) meta.push('Fwd PER <b>' + s.fwdPER + '</b>');
    if (s.ytdPct != null) meta.push('<span class="' + (s.ytdPct>=0?'mpos':'mneg') + '">YTD ' + (s.ytdPct>0?'+':'') + fmt(s.ytdPct,1) + '%</span>');
    if (s.mtdPct != null) meta.push('<span class="' + (s.mtdPct>=0?'mpos':'mneg') + '">MTD ' + (s.mtdPct>0?'+':'') + fmt(s.mtdPct,1) + '%</span>');
    return '<div class="gf-row">' +
      '<div class="' + rankCls + '">' + (i + 1) + '</div>' +
      '<div class="gf-id">' +
        '<div class="gf-name">' + escHtml(stockLabel(s.name, s.ticker)) + '</div>' +
        '<div class="gf-meta">' + meta.join('<span style="opacity:.4">·</span>') + '</div>' +
      '</div>' +
      '<div class="gf-spark">' + makeSpark(s.spark || [], {w:84, h:26, cls:'sparkline-sm', area:true}) + '</div>' +
      '<div class="gf-price tnum">' + priceStr + '</div>' +
      '<div class="gf-chg"><span class="gf-chip ' + chipClass(s.chgPct) + '">' + arrowFor(s.chgPct) + fmtPct(s.chgPct) + '</span></div>' +
    '</div>';
  }

  /* ── 마켓 트렌드 리스트 (정렬 모드별) ── */
  function renderTrendList(stocks, mode) {
    var arr = (stocks || []).slice();
    if (mode === 'gain')        arr.sort(function(a,b){ return (b.chgPct||0) - (a.chgPct||0); });
    else if (mode === 'lose')   arr.sort(function(a,b){ return (a.chgPct||0) - (b.chgPct||0); });
    else if (mode === 'active') arr.sort(function(a,b){ return Math.abs(b.chgPct||0) - Math.abs(a.chgPct||0); });
    else arr.sort(function(a,b){   // 시총순: 실제 시총(USD) 내림차순, 없으면 rank
      var ma = a.mktcap || 0, mb = b.mktcap || 0;
      if (ma || mb) return mb - ma;
      return (a.rank||999) - (b.rank||999);
    });
    if (mode === 'gain' || mode === 'lose' || mode === 'active') arr = arr.slice(0, 12);
    if (!arr.length) return '<div class="empty-note">종목 데이터 없음</div>';
    return arr.map(renderGFRow).join('');
  }

  /* ── 마켓 트렌드 패널 (탭 + 리스트) ── */
  function renderTrendPanel(rkey, r) {
    var tabs = [['rank','시총순'],['gain','상승'],['lose','하락'],['active','활발']];
    var html = '<div class="panel">';
    html += '<div class="panel-title">📈 마켓 트렌드</div>';
    html += '<div class="panel-hint">대표 종목 일간 등락 · 탭으로 상승/하락/거래활발 종목 정렬</div>';
    html += '<div class="trend-tabs" id="trendTabs_' + rkey + '">';
    tabs.forEach(function(t, i) {
      html += '<button class="trend-tab' + (i === 0 ? ' active' : '') + '" data-mode="' + t[0] + '" ' +
        'onclick="switchTrend(\'' + rkey + '\',\'' + t[0] + '\')">' + t[1] + '</button>';
    });
    html += '</div>';
    html += '<div class="gf-list" id="trendList_' + rkey + '">' + renderTrendList(r.stocks, 'rank') + '</div>';
    html += '</div>';
    return html;
  }

  /* ── 특징주 카드 ── */
  function renderFeatCard(feat, regionLabel, dirTag) {
    var cc = colorClass(feat.chgPct);
    var dir = (feat.chgPct || 0) >= 0 ? 'dir-pos' : 'dir-neg';
    var badgeCls = feat.chgPct >= 0 ? 'badge-pos' : 'badge-neg';
    var tags = [];
    if (dirTag) tags.push('<span class="fc-tag fc-dirtag ' + (feat.chgPct >= 0 ? 'dt-pos' : 'dt-neg') + '">' + escHtml(dirTag) + '</span>');
    if (regionLabel) tags.push('<span class="fc-tag">' + escHtml(regionLabel) + '</span>');
    if (feat.sector) tags.push('<span class="fc-tag">' + escHtml(feat.sector) + '</span>');
    var html = '<div class="feat-card ' + dir + '">' +
      '<div class="fc-body">' +
        '<div class="fc-header">' +
          '<div>' +
            '<div class="fc-name">' + escHtml(stockLabel(feat.name, feat.ticker)) + '</div>' +
            '<div class="fc-ticker">' + tags.join('') + '</div>' +
          '</div>' +
          '<span class="fc-badge ' + badgeCls + '">' + arrowFor(feat.chgPct) + fmtPct(feat.chgPct) + '</span>' +
        '</div>' +
        '<div class="fc-priceline">' +
          '<span class="fc-price ' + cc + '">' + (feat.price ? feat.price.toLocaleString('ko-KR', {maximumFractionDigits:2}) : '—') + '</span>' +
          '<span class="fc-chg ' + cc + '">' + (feat.chg != null ? (feat.chg>0?'+':'') + fmt(feat.chg,2) + ' 전일대비' : '') + '</span>' +
        '</div>' +
        '<div class="fc-spark">' + makeSpark(feat.spark, {w:280, h:46, cls:'sparkline', area:true}) + '</div>' +
      '</div>';

    // 뉴스: 최신순 정렬 + 오래된(3일 초과) 뉴스 제외 — 등락과 무관한 옛 기사 노출 방지
    var FRESH_MS = 3 * 24 * 3600 * 1000;
    var now = Date.now();
    var sorted = sortNewsDesc(feat.news);
    var fresh = sorted.filter(function(n){ var ms = newsTimeMs(n); return ms > 0 && (now - ms) <= FRESH_MS; });
    html += '<div class="news-wrap">';
    if (fresh.length) {
      html += '<div class="news-head">📰 관련 뉴스</div><div class="news-list">';
      fresh.slice(0, 3).forEach(function(n) {
        var ms = newsTimeMs(n);
        var t = relTime(n.time);
        var isNew = ms > 0 && (now - ms) < 24 * 3600 * 1000;   // 24시간 내 = 신선
        html += '<div class="news-item">';
        var title = escHtml(transNews(n.title));
        if (n.link) html += '<a class="ntitle" href="' + n.link + '" target="_blank" rel="noopener">' + title + '</a>';
        else html += '<span class="ntitle">' + title + '</span>';
        html += '<div class="nmeta">' + (isNew ? '<span class="news-dot" aria-hidden="true"></span>' : '') +
          escHtml(n.publisher || '') +
          (t ? ' · <span class="ntime' + (isNew ? ' fresh' : '') + '">' + t + '</span>' : '') + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else {
      // 신선한 뉴스가 없으면 옛 기사를 띄우지 않고 가장 최근 기사 시점만 안내
      var newestMs = sorted.length ? newsTimeMs(sorted[0]) : 0;
      var ago = newestMs ? relTime(sorted[0].time) : '';
      html += '<div class="no-news">최근 3일 내 관련 뉴스가 없습니다.' +
        (ago ? ' <span style="opacity:.8">(가장 최근: ' + ago + ')</span>' : '') + '</div>';
    }
    html += '</div></div>';
    return html;
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 지역별 뷰 ── */
  function renderRegion(rkey) {
    var r = getRegion(rkey);
    if (!r) return '<div class="empty-note">데이터 없음</div>';
    var html = '';

    // 기준일 배지
    html += renderAsOfBadge(r);

    // 시황 코멘트
    html += renderCommentary(r);

    // 지수 요약
    html += '<div class="section-label">주요 지수</div>';
    html += renderIndexBar(r.indices || []);

    // 마켓 트렌드 (탭 리스트) + GICS 섹터 — two-col on wide screens
    html += '<div class="two-col">';
    html += renderTrendPanel(rkey, r);

    if (r.sectors && r.sectors.length) {
      html += '<div class="panel" style="margin:0">';
      html += '<div class="panel-title">🗂 GICS 섹터 움직임</div>';
      if (rkey === 'us') {
        html += '<div class="panel-hint">SPDR 섹터 ETF 종가 기준 일간·월초(MTD)·연초(YTD) 등락</div>';
      } else {
        html += '<div class="panel-hint">유니버스 구성 종목의 GICS 섹터 평균 일간·월초(MTD)·연초(YTD) 등락</div>';
      }
      html += renderSectorHeatmap(r.sectors, r.stocks);
      html += '</div>';
    }
    html += '</div>'; // .two-col

    // 오늘의 특징주 & 관련 뉴스
    html += '<div class="section-label" style="margin-bottom:10px">⚡ 오늘의 특징주 & 관련 뉴스</div>';
    if (r.featured && r.featured.length) {
      html += '<div class="featured-grid">';
      r.featured.forEach(function(feat) {
        html += renderFeatCard(feat, null);
      });
      html += '</div>';
    } else {
      html += '<div class="empty-note">데이터 없음</div>';
    }

    // 섹터별 주요 종목 (각 GICS 섹터의 대표 종목 일간·MTD·YTD)
    html += renderSectorStockBoard(r.sectors);

    return html;
  }

  /* ── 섹터별 주요 종목 보드 ── */
  function renderSectorStockBoard(sectors) {
    var arr = (sectors || []).filter(function(s){ return s.holdings && s.holdings.length; });
    if (!arr.length) return '';
    // 오늘 등락이 큰 섹터 먼저
    arr = arr.slice().sort(function(a, b){ return Math.abs(b.chgPct || 0) - Math.abs(a.chgPct || 0); });
    var html = '<div class="section-label" style="margin:24px 0 4px">🏭 섹터별 주요 종목</div>';
    html += '<div class="panel-hint" style="margin-bottom:12px">GICS 섹터별 대표 종목의 일간·월초(MTD)·연초(YTD) 등락 · 섹터 등락 큰 순</div>';
    html += '<div class="secstock-grid">';
    arr.forEach(function(s) {
      var top = (s.holdings || []).slice(0, 6);
      html += '<div class="secstock-card">';
      html += '<div class="secstock-head">' +
        '<span class="ss-name">' + escHtml(s.name) + '</span>' +
        '<span class="ss-chip ' + chipClass(s.chgPct) + '">' + arrowFor(s.chgPct) + fmtPct(s.chgPct) + '</span>' +
        '</div>';
      var perf = [];
      if (s.mtdPct != null) perf.push('MTD ' + (s.mtdPct > 0 ? '+' : '') + fmt(s.mtdPct, 1) + '%');
      if (s.ytdPct != null) perf.push('YTD ' + (s.ytdPct > 0 ? '+' : '') + fmt(s.ytdPct, 1) + '%');
      if (s.etf) perf.push(s.etf);
      if (perf.length) html += '<div class="secstock-sub">' + perf.join(' · ') + '</div>';
      html += '<table class="secstock-tbl"><thead><tr>' +
        '<th>종목</th><th>일간</th><th>MTD</th><th>YTD</th></tr></thead><tbody>';
      top.forEach(function(h) {
        html += '<tr>' +
          '<td class="ss-stk">' + escHtml(stockLabel(h.name, h.ticker)) +
            (h.mktcap ? '<span class="ss-mc">' + fmtMktcapUsd(h.mktcap) + '</span>' : '') + '</td>' +
          '<td class="ss-mom ' + colorClass(h.daily) + '">' + fmtPct(h.daily) + '</td>' +
          '<td class="ss-mom ' + colorClass(h.mtd) + '">' + fmtPct(h.mtd) + '</td>' +
          '<td class="ss-mom ' + colorClass(h.ytd) + '">' + fmtPct(h.ytd) + '</td>' +
        '</tr>';
      });
      html += '</tbody></table></div>';
    });
    html += '</div>';
    return html;
  }

  /* ── (호환용) 탭 전환 — 좌측 메뉴로 대체됨 ── */
  window.switchRegion = function(key) { window.switchView('region:' + key); };

  window.switchTrend = function(rkey, mode) {
    var r = getRegion(rkey);
    if (!r || !r.stocks) return;
    document.getElementById('trendList_' + rkey).innerHTML = renderTrendList(r.stocks, mode);
    document.querySelectorAll('#trendTabs_' + rkey + ' .trend-tab').forEach(function(b) {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
  };

  /* ── 단일 브리핑 렌더 (글로벌/아시아 분리 보기) ── */
  function renderBriefingOnly(feedKey) {
    var feed = BRIEFING_FEEDS[feedKey];
    if (!feed) return '<div class="loading">알 수 없는 브리핑입니다.</div>';
    var html = renderBriefingFeed(feed);
    if (!html) {
      var name = feedKey === 'us' ? '글로벌' : '아시아';
      return '<div class="panel"><div class="panel-title">' + name + ' 시황 브리핑</div>' +
             '<div class="panel-hint">아직 게시된 ' + name + ' 시황이 없습니다.</div></div>';
    }
    return html;
  }

  /* ── 주간회의자료 렌더 ── */
  // 주간회의 탭에 함께 게시할 일일 브리핑(아침 일일금융시장동향 + 아시아시황)
  function renderWeeklyBriefings() {
    var out = '';
    if (getBriefings(BRIEFING_FEEDS.us).length)   out += renderBriefingFeed(BRIEFING_FEEDS.us);
    if (getBriefings(BRIEFING_FEEDS.asia).length) out += renderBriefingFeed(BRIEFING_FEEDS.asia);
    if (!out) return '';
    return '<div class="section-label" style="margin-top:24px">🗞 일일 시황 브리핑</div>' +
      '<div class="panel-hint" style="margin-bottom:14px">주간 회의용으로 <b>아침 일일금융시장동향</b>(미국장 마감)과 ' +
      '<b>아시아시황</b>(아시아장 마감)을 함께 게시합니다. 각 카드에서 날짜 이동·Word 저장·이메일 발송이 가능합니다.</div>' +
      out;
  }

  function renderWeekly() {
    var W = window.WEEKLY;
    if (!W) {
      return '<div class="panel"><div class="panel-title">📋 주간회의자료</div>' +
             '<div class="panel-hint">weekly-data.js가 아직 생성되지 않았습니다. ' +
             '<code>python weekly/weekly_report.py</code> 를 한 번 실행해 주세요.</div></div>' +
             renderWeeklyBriefings();
    }
    var html = '<div class="panel">';
    html += '<div class="panel-title">📋 ' + escHtml(W.title || '주간회의자료') + '</div>';
    html += '<div class="wk-meta">';
    html += '<div class="wk-meta-item">회의 <b>' + W.meeting + '</b> (' + (W.meeting_weekday || '') + ')</div>';
    html += '<div class="wk-meta-item">데이터 기준 <b>' + W.target + '</b></div>';
    html += '<div class="wk-meta-item">파일 <b>' + escHtml(W.xlsx_folder + '/' + W.xlsx_name) + '</b></div>';
    html += '</div>';

    // 시장변동표
    if (W.market && W.market.length) {
      html += '<div class="section-label">□ 주간 주식시장 변동</div>';
      html += '<table class="wk-market-table"><thead><tr>' +
              '<th>지수</th><th>현재가</th><th>전일대비</th><th>MTD</th><th>YTD</th>' +
              '</tr></thead><tbody>';
      W.market.forEach(function(m) {
        html += '<tr>' +
          '<td>' + escHtml(m.name) + '</td>' +
          '<td>' + (m.current != null ? Number(m.current).toLocaleString(undefined,{maximumFractionDigits:2}) : '—') + '</td>' +
          '<td class="' + colorClass(m.daily) + '">' + fmtPct(m.daily) + '</td>' +
          '<td class="' + colorClass(m.mtd) + '">' + fmtPct(m.mtd) + '</td>' +
          '<td class="' + colorClass(m.ytd) + '">' + fmtPct(m.ytd) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table>';
    }

    // 주요 Factor 점검 (섹션별 긍정/중립/부정 배지)
    var RT = W.ratings || {};
    function rateBadge(rt) {
      if (!rt) return '';
      var cls;
      if (rt.indexOf('긍정') >= 0 || rt.indexOf('한국') >= 0 ||
          rt.indexOf('비중확대') >= 0 || rt.indexOf('EM') >= 0 || rt === '선호') cls = 'rate-pos';
      else if (rt.indexOf('부정') >= 0 || rt.indexOf('축소') >= 0) cls = 'rate-neg';
      else if (rt.indexOf('미국') >= 0 || rt === '조정' || rt.indexOf('DM') >= 0) cls = 'rate-us';
      else cls = 'rate-neu';
      return '<span class="rate-badge ' + cls + '">' + escHtml(rt) + '</span>';
    }
    if (W.factor) {
      html += '<div class="section-label">□ 주요 Factor 점검</div>';
      ['기업이익','경제지표','수급','주요 이벤트','센티먼트','주요 보고서'].forEach(function(key) {
        var lines = W.factor[key];
        if (!lines || !lines.length) return;
        html += '<div class="wk-factor">';
        html += '<h4 class="wk-factor-h">' + key + rateBadge(RT[key]) + '</h4>';
        lines.forEach(function(ln) {
          html += '<div class="wk-factor-line">' + escHtml(ln) + '</div>';
        });
        html += '</div>';
      });
    }

    // 지역배분 — 멀티팩터 국가선호 모델
    if (W.regional && W.regional.countries && W.regional.countries.length) {
      var RG = W.regional;
      var isModel = RG.model;
      html += '<div class="section-label">□ 지역배분 ' +
              (isModel ? '— 멀티팩터 국가선호 모델' : '(DM/EM · 국가 선호)') + '</div>';
      html += '<div class="wk-region">';
      if (isModel) {
        html += '<div class="wk-model-note">5팩터 횡단면 z-score 가중합 · ' +
                'Value 25% · Momentum 25% · Earnings 20% · Macro 20% · Currency 10% ' +
                '<span class="wk-model-src">(Asness·Moskowitz·Pedersen 2013, Keimling 2016, Zaremba 외 2022)</span></div>';
      }
      if (RG.dm_em && RG.dm_em.text) {
        html += '<div class="wk-region-dm"><b>DM vs EM</b> ' + rateBadge(RG.dm_em.pref) +
                '<br>' + escHtml(RG.dm_em.text) + '</div>';
      }
      var facList = [['value','밸류'],['momentum','모멘텀'],['earnings','이익'],['macro','매크로'],['currency','통화']];
      function facChips(f) {
        if (!f) return '';
        return '<div class="fac-chips">' + facList.map(function(o){
          var z = f[o[0]]; if (z == null) z = 0;
          var cls = z >= 0.3 ? 'fc-pos' : z <= -0.3 ? 'fc-neg' : 'fc-neu';
          return '<span class="fac-chip ' + cls + '" title="' + o[1] + ' z=' + z.toFixed(1) + '">' +
                 o[1] + ' <b>' + (z>0?'+':'') + z.toFixed(1) + '</b></span>';
        }).join('') + '</div>';
      }
      html += '<table class="wk-region-table"><thead><tr>' +
              '<th>국가</th><th>선호</th>' + (isModel ? '<th style="text-align:right">종합</th><th>팩터 z-score</th>' :
              '<th style="text-align:right">YTD</th><th style="text-align:right">MTD</th>') +
              '<th>근거</th></tr></thead><tbody>';
      RG.countries.forEach(function(c) {
        var mid = isModel
          ? '<td class="mom"><b>' + (c.score>0?'+':'') + (c.score!=null?c.score.toFixed(2):'—') + '</b></td>' +
            '<td>' + facChips(c.factors) + '</td>'
          : '<td class="mom ' + colorClass(c.ytd) + '">' + fmtPct(c.ytd) + '</td>' +
            '<td class="mom ' + colorClass(c.mtd) + '">' + fmtPct(c.mtd) + '</td>';
        html += '<tr>' +
          '<td class="rgn-name">' + escHtml(c.name) + '</td>' +
          '<td>' + rateBadge(c.pref) + '</td>' + mid +
          '<td class="rgn-text">' + escHtml(c.text || '') + '</td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
    }

    // 종합의견 (시장 전망 & 포트폴리오)
    if (W.conclusion) {
      var C = W.conclusion;
      var concOrder = [['시장방향','1. 증시 방향'],['미국vs한국','2. 미국 vs 한국'],
                       ['섹터모멘텀','3. 섹터 모멘텀'],['포트폴리오','4. 포트폴리오 조정']];
      html += '<div class="wk-concl"><div class="wk-concl-title">🧭 종합의견 — 시장 전망 &amp; 포트폴리오</div>';
      concOrder.forEach(function(o) {
        var it = C[o[0]]; if (!it) return;
        html += '<div class="wk-concl-item">';
        html += '<p class="wk-concl-head">' + o[1] + rateBadge(it.rating) +
                (it.label ? ' <span class="wk-concl-label">— ' + escHtml(it.label) + '</span>' : '') + '</p>';
        html += '<p class="wk-concl-text">' + escHtml(it.text || '') + '</p>';
        html += '</div>';
      });
      html += '</div>';
    }

    // 손익 + 비중
    if (W.pnl || W.weights) {
      html += '<div class="section-label">□ 주식 손익 & 국가/섹터 비중</div>';
      html += '<div class="wk-pnl">';
      if (W.pnl && W.pnl.ytd) {
        var fmtAmt = function(v) { return v == null ? '—' : Number(v).toFixed(1) + ' 억'; };
        html += '<div><h5 class="wk-mini-title">주식 손익 (YTD)</h5>' +
                '<table class="wk-mini-table"><tbody>' +
                '<tr><td>FVPL 평가</td><td class="' + colorClass(W.pnl.ytd.unrealized) + '">' + fmtAmt(W.pnl.ytd.unrealized) + '</td></tr>' +
                '<tr><td>매각/배당</td><td class="' + colorClass(W.pnl.ytd.realized) + '">' + fmtAmt(W.pnl.ytd.realized) + '</td></tr>' +
                '<tr><td><b>계</b></td><td class="' + colorClass(W.pnl.ytd.pnl) + '"><b>' + fmtAmt(W.pnl.ytd.pnl) + '</b></td></tr>' +
                '</tbody></table></div>';
      }
      if (W.weights) {
        var renderWMap = function(m, title) {
          if (!m) return '';
          var keys = Object.keys(m);
          if (!keys.length) return '';
          var rows = keys.map(function(k){ return [k, m[k]]; })
                          .sort(function(a,b){ return b[1]-a[1]; });
          var s = '<div><h5 class="wk-mini-title">' + title + '</h5>' +
                  '<table class="wk-mini-table"><tbody>';
          rows.forEach(function(r) {
            s += '<tr><td>' + escHtml(r[0]) + '</td><td>' + (r[1]*100).toFixed(1) + '%</td></tr>';
          });
          s += '</tbody></table></div>';
          return s;
        };
        html += renderWMap(W.weights.country, '국가 비중');
        html += renderWMap(W.weights.sector,  '섹터 비중');
      }
      html += '</div>';
    }
    html += '<div class="wk-note">※ 자동 생성된 주간회의자료 요약. 전체 자료는 OneDrive ' +
            escHtml(W.xlsx_folder) + ' 폴더의 ' + escHtml(W.xlsx_name) + ' 참조.</div>';
    html += '</div>';
    // 주간 회의용 일일 브리핑(아침 일일금융시장동향 + 아시아시황) 함께 게시
    html += renderWeeklyBriefings();
    return html;
  }

  /* ── 좌측 메뉴 뷰 라우터 ── */
  // 뷰 키: overview / global / asia / weekly / region:us / region:europe / region:china / region:japan / region:korea
  var currentView = 'overview';

  function renderView(view) {
    if (view === 'overview') return renderOverview();
    if (view === 'global')   return renderBriefingOnly('us');    // 장전
    if (view === 'intraday') return renderIntraday();            // 장중
    if (view === 'asia')     return renderBriefingOnly('asia');  // 장마감후
    if (view === 'weekly')   return renderWeekly();
    if (view.indexOf('region:') === 0) return renderRegion(view.slice(7));
    return '<div class="loading">알 수 없는 뷰입니다.</div>';
  }

  window.switchView = function(view) {
    currentView = view;
    document.querySelectorAll('.sb-item').forEach(function(el) {
      el.classList.toggle('active', el.dataset.view === view);
    });
    var c = document.getElementById('view-content');
    if (c) {
      c.innerHTML = renderView(view);
      // 모바일에서 컨텐츠로 스크롤
      if (window.matchMedia('(max-width:900px)').matches) {
        c.scrollIntoView({behavior:'smooth', block:'start'});
      }
    }
  };

  // 호환: renderOverview 안에서 부르는 selectBriefingUs/Asia가 region-content를 갱신
  // → 새 레이아웃에서는 view-content가 같은 역할이므로 alias 가 필요 없음(같은 요소를 selectBriefing이 다시 그림)

  /* ── 앱 마운트 ── */
  var regions = D.regions || [];
  var app = document.getElementById('app');

  // 좌측 메뉴 + 컨텐츠 영역
  var hasGlobal = getBriefings(BRIEFING_FEEDS.us).length > 0;
  var hasAsia   = getBriefings(BRIEFING_FEEDS.asia).length > 0;

  var sbHtml = '<aside class="sidebar">';
  sbHtml += '<div class="sb-section">' +
            '<div class="sb-label">개요</div>' +
            '<div class="sb-item active" data-view="overview" onclick="switchView(\'overview\')">' +
            '<span class="sb-icon">🌐</span><span>전체 개요</span></div>' +
            '</div>';
  sbHtml += '<div class="sb-section">' +
            '<div class="sb-label">일간 시황</div>' +
            '<div class="sb-item" data-view="global" onclick="switchView(\'global\')">' +
            '<span class="sb-icon">🌅</span><span>장전</span>' +
            (hasGlobal ? '' : '<span style="margin-left:auto;font-size:10px;color:var(--muted)">N/A</span>') +
            '</div>' +
            '<div class="sb-item" data-view="intraday" onclick="switchView(\'intraday\')">' +
            '<span class="sb-icon">📊</span><span>장중</span>' +
            '</div>' +
            '<div class="sb-item" data-view="asia" onclick="switchView(\'asia\')">' +
            '<span class="sb-icon">🌆</span><span>장마감후</span>' +
            (hasAsia ? '' : '<span style="margin-left:auto;font-size:10px;color:var(--muted)">N/A</span>') +
            '</div>' +
            '</div>';
  sbHtml += '<div class="sb-section">' +
            '<div class="sb-label">주간 자료</div>' +
            '<div class="sb-item" data-view="weekly" onclick="switchView(\'weekly\')">' +
            '<span class="sb-icon">📋</span><span>주간회의자료</span></div>' +
            '</div>';
  if (regions.length) {
    sbHtml += '<div class="sb-section"><div class="sb-label">지역별 상세</div>';
    regions.forEach(function(r) {
      sbHtml += '<div class="sb-item sub" data-view="region:' + r.key + '" onclick="switchView(\'region:' + r.key + '\')">' +
                '<span class="sb-icon">' + r.flag + '</span><span>' + r.name + '</span></div>';
    });
    sbHtml += '</div>';
  }
  sbHtml += '<div class="sb-foot">데이터 기준 ' + (D.as_of || '') + '</div>';
  sbHtml += '</aside>';

  app.innerHTML = sbHtml + '<div id="view-content"></div>' +
                  '<div id="region-content" style="display:none"></div>';  // 레거시 호환
  document.getElementById('view-content').innerHTML = renderOverview();
})();
</script>
</body>
</html>
