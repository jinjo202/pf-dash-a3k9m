name: Asia Market Briefing

on:
  schedule:
    # 확정본만 GitHub 스케줄(백업). 초안(14:30)은 GitHub 무료 cron이 수시간 지연되어
    # 부적합 → cron-job.org 정시 트리거(repository_dispatch: briefing-asia-draft)만 사용.
    # 확정본: 아시아장 마감(15:30 KST) 직후. 무료 cron 지연 대비 백업 4회.
    # 멱등성 가드(--skip-if-exists)로 중복 생성·발송 방지(데이터 미확정 시 자동 스킵).
    - cron: '40 6 * * 1-5'   # 15:40 KST (주력, 마감 직후)
    - cron: '55 6 * * 1-5'   # 15:55 KST (백업1)
    - cron: '20 7 * * 1-5'   # 16:20 KST (백업2)
    - cron: '0 8 * * 1-5'    # 17:00 KST (백업3)
  workflow_dispatch:
    inputs:
      send_as_of:
        description: "기존 브리핑 이메일만 재발송할 날짜(YYYY-MM-DD). 비우면 평소대로 생성·발송."
        required: false
        default: ""
  repository_dispatch:
    # briefing-asia-trigger=확정본(15:40 정시), briefing-asia-draft=초안(14:30 정시)
    types: [briefing-asia-trigger, briefing-asia-draft]

permissions:
  contents: write

concurrency:
  group: briefing-asia
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install anthropic python-docx
          npm install -g @anthropic-ai/claude-code

      - name: Refresh market data (not committed)
        run: |
          python fetch_daily.py || true
          python fetch_benchmarks.py || true

      # ── 초안(14:30 KST, cron-job.org briefing-asia-draft): 장중 잠정치, 이메일만 ──
      - name: Generate DRAFT briefing (장중 잠정)
        id: gendraft
        if: github.event.action == 'briefing-asia-draft'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python briefing/generate_briefing.py asia --draft

      - name: Send DRAFT email (SMTP)
        if: steps.gendraft.outputs.status == 'draft'
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python briefing/send_email_asia.py briefing/_draft-asia.js ${{ steps.gendraft.outputs.as_of }}

      # ── 확정본(마감 후): 아카이브 기록 + 커밋 + 발송 (초안 dispatch 제외 전부) ──
      - name: Generate briefing (Claude Code, 구독 차감)
        id: gen
        if: github.event.action != 'briefing-asia-draft'
        env:
          # 구독(Max) 차감 — claude -p CLI 경유. API 키 없이 작동.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python briefing/generate_briefing.py asia --skip-if-exists

      - name: Commit & push briefing files
        if: steps.gen.outputs.status == 'generated'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # fetch 로 변경된 데이터 파일은 커밋 대상 아님 — 원복.
          git checkout -- daily-data.js benchmarks.js 2>/dev/null || true
          git add briefings-archive-asia.js briefings
          if git diff --staged --quiet; then
            echo "변경 없음."; exit 0
          fi
          git commit -m "briefing: ${{ steps.gen.outputs.as_of }} 아시아장 마감 시황 브리핑"
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push; then
              echo "push 성공 (attempt $attempt)"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::3회 시도 후 push 실패"; exit 1

      - name: Send email (SMTP)
        if: steps.gen.outputs.status == 'generated'
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python briefing/send_email_asia.py briefings-archive-asia.js ${{ steps.gen.outputs.as_of }}

      - name: Re-send existing briefing email (manual)
        if: ${{ github.event.inputs.send_as_of != '' }}
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python briefing/send_email_asia.py briefings-archive-asia.js ${{ github.event.inputs.send_as_of }}
