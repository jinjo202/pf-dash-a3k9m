<script>
  (function () {
    try {
      var u = new URL(window.location.href);
      if (u.searchParams.get('cb')) return;
      var docMs = new Date(document.lastModified).getTime();
      fetch(window.location.pathname + '?probe=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
        .then(function (r) {
          var srv = r.headers.get('Last-Modified');
          if (!srv) return;
          var srvMs = new Date(srv).getTime();
          if (isFinite(srvMs) && isFinite(docMs) && srvMs > docMs + 2000) {
            u.searchParams.set('cb', Date.now());
            window.location.replace(u.toString());
          }
        }).catch(function () {});
    } catch (e) {}
  })();
</script>

      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}

<style>
  :root {
    --bg:#f6f7f9; --panel:#ffffff; --panel-soft:#fafbfc; --border:#e6e8eb;
    --row-alt:#fafbfc; --row-hover:#eff6ff; --text:#0f172a; --text-soft:#334155;
    --muted:#64748b; --muted-soft:#cbd5e1; --accent:#2563eb; --accent-hover:#1d4ed8;
    --accent-soft:#eff6ff; --pos:#15803d; --neg:#b91c1c; --neu:#64748b;
    --pos-soft:#dcfce7; --neg-soft:#fee2e2; --neu-soft:#f1f5f9;
    --shadow-sm:0 1px 2px 0 rgba(15,23,42,.04);
    --shadow-md:0 4px 12px -2px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
    color-scheme: light;
  }
  [data-theme="dark"] {
    --bg:#0b1020; --panel:#141a2e; --panel-soft:#1a2138; --border:#2a324a;
    --row-alt:#1a2138; --row-hover:#1e2942; --text:#e2e8f0; --text-soft:#cbd5e1;
    --muted:#94a3b8; --muted-soft:#475569; --accent:#60a5fa; --accent-hover:#3b82f6;
    --accent-soft:#1e3a8a55; --pos:#22c55e; --neg:#f87171; --neu:#94a3b8;
    --pos-soft:#14331f; --neg-soft:#3a1414; --neu-soft:#1a2138;
    --shadow-sm:0 1px 2px 0 rgba(0,0,0,.5);
    --shadow-md:0 4px 12px -2px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.4);
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html { transition: background-color 200ms, color 200ms; }
  html, body {
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:"Pretendard Variable",Pretendard,-apple-system,"Segoe UI","Noto Sans KR",sans-serif;
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  /* ── Header ── */
  header {
    background:var(--panel); border-bottom:1px solid var(--border);
    padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:12px; position:sticky; top:0; z-index:20;
  }
  header h1 { font-size:18px; margin:0; font-weight:800; letter-spacing:-.02em; }
  header .sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .header-actions { display:inline-flex; align-items:center; gap:10px; }
  .theme-toggle {
    display:inline-flex; align-items:center; gap:6px; padding:7px 12px;
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;
    box-shadow:var(--shadow-sm); transition:all .15s; user-select:none;
  }
  .theme-toggle:hover { background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
  .nav-link {
    font-size:12px; font-weight:600; color:var(--muted); text-decoration:none;
    padding:7px 10px; border-radius:6px;
  }
  .nav-link:hover { background:var(--accent-soft); color:var(--accent); }

  /* ── Layout ── */
  main { max-width:1280px; margin:0 auto; padding:20px 24px 64px; }
  .section-label {
    font-size:11px; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); margin-bottom:10px;
  }
  .panel {
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    box-shadow:var(--shadow-sm); padding:18px 20px; margin-bottom:20px;
  }
  .panel-title {
    font-size:15px; font-weight:700; letter-spacing:-.01em; margin:0 0 4px;
  }
  .panel-hint { font-size:12px; color:var(--muted); margin:0 0 14px; }

  /* ── Region tabs ── */
  .region-tabs {
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px;
  }
  .rtab {
    padding:7px 14px; border-radius:20px; font-size:13px; font-weight:600;
    cursor:pointer; border:1px solid var(--border); background:var(--panel);
    color:var(--muted); transition:all .15s; user-select:none;
  }
  .rtab:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
  .rtab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ── As-of date badge ── */
  .asof-badge {
    display:inline-block; padding:6px 12px; border-radius:8px; margin-bottom:14px;
    background:var(--accent-soft); color:var(--accent); font-size:12px; font-weight:600;
    border:1px solid var(--border);
  }
  .asof-badge b { font-weight:800; }

  /* ── 시황 코멘트 ── */
  .commentary-box {
    background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent);
    border-radius:10px; padding:14px 16px; margin-bottom:20px; box-shadow:var(--shadow-sm);
  }
  .commentary-title { font-size:13px; font-weight:800; color:var(--accent); margin-bottom:8px; }
  .commentary-line {
    margin:0 0 6px; font-size:13.5px; line-height:1.7; color:var(--text);
  }
  .commentary-line b { font-weight:800; color:var(--text-soft); }
  .commentary-foot { margin-top:12px; font-size:11px; color:var(--muted); }
  .cm-subtitle {
    font-size:12px; font-weight:800; color:var(--accent); margin:14px 0 8px;
    padding-top:12px; border-top:1px dashed var(--border);
  }
  .cm-event-list { margin:0; padding-left:18px; }
  .cm-event-list li { font-size:13px; line-height:1.6; margin-bottom:8px; color:var(--text); }
  .cm-event-list a { color:var(--text); text-decoration:none; }
  .cm-event-list a:hover { color:var(--accent); text-decoration:underline; }
  .cm-event-desc { font-size:12px; line-height:1.55; color:var(--muted); margin-top:2px; }
  .cm-scope { display:inline-block; font-size:10px; font-weight:700; padding:1px 6px; border-radius:9px; vertical-align:middle; }
  .cm-scope-g { background:rgba(79,140,255,.16); color:#5b8cff; }
  .cm-scope-r { background:rgba(120,120,120,.18); color:var(--muted); }
  .cm-mover-detail { font-size:12px; line-height:1.55; color:var(--muted); margin-top:3px; }
  .cm-src { font-size:11px; color:var(--muted); font-weight:600; }
  .cm-mover-list { display:flex; flex-direction:column; gap:10px; }
  .cm-mover {
    background:var(--panel-soft); border:1px solid var(--border); border-radius:8px; padding:10px 12px;
  }
  .cm-mover-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:5px; }
  .cm-mover-name { font-size:13.5px; font-weight:700; }
  .cm-mover-ticker { font-size:11px; color:var(--muted); font-weight:600; }
  .cm-mover-head .gf-chip { margin-left:auto; }
  .cm-mover-reason { font-size:12.5px; line-height:1.6; color:var(--text-soft); }
  .cm-mover-reason a { color:var(--text-soft); text-decoration:none; }
  .cm-mover-reason a:hover { color:var(--accent); text-decoration:underline; }
  .cm-region-list { display:flex; flex-direction:column; gap:8px; }
  .cm-region {
    background:var(--panel-soft); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; cursor:pointer; transition:all .15s;
  }
  .cm-region:hover { border-color:var(--accent); background:var(--accent-soft); }
  .cm-region-name { font-size:13px; font-weight:700; margin-bottom:3px; }
  .cm-region-text { font-size:12.5px; line-height:1.6; color:var(--text-soft); }

  /* ── Index summary bar ── */
  .idx-bar {
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;
  }
  .idx-card {
    flex:1 1 160px; min-width:140px; max-width:220px;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; box-shadow:var(--shadow-sm);
    display:flex; flex-direction:column; gap:3px;
  }
  .idx-card .iname { font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .idx-card .iprice { font-size:17px; font-weight:700; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .idx-card .ispark { margin-top:6px; margin-bottom:6px; }
  .idx-card .ichg-chip {
    align-self:flex-start; display:inline-block; padding:2px 7px; border-radius:7px;
    font-size:12px; font-weight:700; font-variant-numeric:tabular-nums;
  }
  .pos { color:var(--pos); }
  .neg { color:var(--neg); }
  .neu { color:var(--neu); }

  /* ── 등락 칩 (Google Finance 스타일) ── */
  .gf-chip {
    display:inline-block; padding:3px 8px; border-radius:8px;
    font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  .chip-pos { background:var(--pos-soft); color:var(--pos); }
  .chip-neg { background:var(--neg-soft); color:var(--neg); }
  .chip-neu { background:var(--neu-soft); color:var(--neu); }

  /* ── Google Finance 리스트 행 ── */
  .gf-list { display:flex; flex-direction:column; }
  .gf-row {
    display:flex; align-items:center; gap:12px; padding:10px 8px; border-radius:8px;
    border-top:1px solid var(--border);
  }
  .gf-row:first-child { border-top:none; }
  .gf-row:hover { background:var(--row-hover); }
  .gf-rank {
    width:22px; height:22px; flex-shrink:0; border-radius:50%;
    background:var(--neu-soft); color:var(--muted); font-size:10px; font-weight:700;
    text-align:center; line-height:22px;
  }
  .gf-rank.top3 { background:var(--accent-soft); color:var(--accent); }
  .gf-id { flex:1 1 auto; min-width:0; }
  .gf-name { font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gf-ticker { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gf-spark { width:84px; flex-shrink:0; }
  .gf-price { width:104px; text-align:right; font-size:13.5px; font-weight:600; font-variant-numeric:tabular-nums; flex-shrink:0; }
  .gf-chg { width:92px; text-align:right; flex-shrink:0; }

  /* ── 마켓 트렌드 탭 ── */
  .trend-tabs {
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;
    border-bottom:1px solid var(--border); padding-bottom:10px;
  }
  .trend-tab {
    padding:5px 13px; border-radius:16px; border:1px solid var(--border); background:var(--panel);
    color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all .15s;
  }
  .trend-tab:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-soft); }
  .trend-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ── Sector heatmap ── */
  .sector-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap:8px; margin-bottom:20px;
  }
  .sector-cell {
    border-radius:8px; padding:10px 12px;
    display:flex; flex-direction:column; gap:2px;
    transition:transform .12s;
  }
  .sector-cell:hover { transform:translateY(-1px); }
  .sector-cell .sname { font-size:11px; font-weight:700; color:inherit; opacity:.85; }
  .sector-cell .spct { font-size:16px; font-weight:800; font-variant-numeric:tabular-nums; }
  .sector-cell .setf { font-size:10px; opacity:.6; margin-top:1px; }
  .heat-big-pos   { background:var(--pos);  color:#fff; }
  .heat-pos       { background:#16a34a22; color:var(--pos); border:1px solid #16a34a33; }
  .heat-pos-light { background:#16a34a11; color:var(--pos); border:1px solid #16a34a22; }
  .heat-neu       { background:var(--neu-soft); color:var(--neu); border:1px solid var(--border); }
  .heat-neg-light { background:#dc262611; color:var(--neg); border:1px solid #dc262622; }
  .heat-neg       { background:#dc262622; color:var(--neg); border:1px solid #dc262633; }
  .heat-big-neg   { background:var(--neg);  color:#fff; }

  /* ── Featured stocks ── */
  .featured-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px;
  }
  .feat-card {
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; box-shadow:var(--shadow-sm);
  }
  .feat-card .fc-header {
    display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;
  }
  .feat-card .fc-name { font-size:15px; font-weight:800; letter-spacing:-.01em; }
  .feat-card .fc-ticker { font-size:11px; color:var(--muted); margin-top:2px; }
  .feat-card .fc-badge {
    font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px;
    white-space:nowrap;
  }
  .badge-pos { background:var(--pos-soft); color:var(--pos); }
  .badge-neg { background:var(--neg-soft); color:var(--neg); }
  .feat-card .fc-price { font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .feat-card .fc-chg { font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; margin-top:2px; }
  .feat-card .fc-spark { margin:10px 0; }
  .feat-card .news-list { margin-top:10px; display:flex; flex-direction:column; gap:8px; }
  .news-item {
    padding:9px 11px; background:var(--panel-soft); border-radius:8px;
    border-left:3px solid var(--accent);
  }
  .news-item .ntitle {
    font-size:12px; font-weight:600; line-height:1.4; color:var(--text);
  }
  .news-item a.ntitle { text-decoration:none; color:var(--text); }
  .news-item a.ntitle:hover { color:var(--accent); }
  .news-item .nmeta { font-size:11px; color:var(--muted); margin-top:3px; }
  .no-news { font-size:12px; color:var(--muted); font-style:italic; padding:8px 0; }

  /* ── Sparkline SVG ── */
  .sparkline { display:block; width:100%; height:40px; }
  .sparkline-sm { display:block; width:80px; height:26px; flex-shrink:0; }
  .spark-wide { display:block; width:100%; height:34px; }

  /* ── Loading / empty ── */
  .loading { text-align:center; color:var(--muted); padding:60px 0; font-size:15px; }
  .empty-note { color:var(--muted); font-size:12px; font-style:italic; padding:20px 0; }

  /* ── Two-col layout ── */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  @media (max-width:840px) { .two-col { grid-template-columns:1fr; } }

  /* ── Summary overview ── */
  .overview-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:12px;
    margin-bottom:20px;
  }
  .ov-card {
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; box-shadow:var(--shadow-sm); cursor:pointer; transition:all .15s;
  }
  .ov-card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .ov-card .ov-region { font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; margin-bottom:8px; }
  .ov-card .ov-date { margin-left:auto; font-size:10px; font-weight:600; color:var(--muted); background:var(--neu-soft); padding:2px 6px; border-radius:6px; }
  .ov-card .ov-main-idx { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .ov-card .ov-main-chg { font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .ov-card .ov-sub { font-size:11px; color:var(--muted); margin-top:4px; }

  /* ── Responsive ── */
  @media (max-width:600px) {
    main { padding:12px 12px 48px; }
    header { padding:12px 14px; }
    .featured-grid { grid-template-columns:1fr; }
    .idx-bar { gap:6px; }
    .idx-card { flex:1 1 130px; min-width:120px; }
    .gf-spark { display:none; }
    .gf-price { width:84px; }
    .gf-chg { width:78px; }
  }
</style>

<script>
/* ─────────────────────────────────────────────────────────────
   유틸리티
───────────────────────────────────────────────────────────── */
function fmt(v, d) {
  if (v == null) return '—';
  return Number(v).toFixed(d != null ? d : 2);
}
function fmtPct(v) {
  if (v == null) return '—';
  var sign = v > 0 ? '+' : '';
  return sign + fmt(v, 2) + '%';
}
function colorClass(v) {
  if (v == null) return 'neu';
  return v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
}
function heatClass(v) {
  if (v == null) return 'heat-neu';
  if (v >= 2)   return 'heat-big-pos';
  if (v >= 0.5) return 'heat-pos';
  if (v > 0)    return 'heat-pos-light';
  if (v === 0)  return 'heat-neu';
  if (v > -0.5) return 'heat-neg-light';
  if (v > -2)   return 'heat-neg';
  return 'heat-big-neg';
}
function relTime(isoStr) {
  if (!isoStr) return '';
  try {
    var d = new Date(isoStr);
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 3600)  return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  } catch(e) { return ''; }
}

/* ── Sparkline SVG (Google Finance 스타일 area chart 지원) ── */
var _sparkId = 0;
function makeSpark(data, opts) {
  var o = opts || {};
  var w = o.w || 120, h = o.h || 40;
  var cls = o.cls || 'sparkline';
  if (!data || data.length < 2) return '<svg class="' + cls + '" viewBox="0 0 ' + w + ' ' + h + '"></svg>';
  var vals = data.filter(function(v){ return v != null; });
  if (vals.length < 2) return '<svg class="' + cls + '" viewBox="0 0 ' + w + ' ' + h + '"></svg>';
  var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals);
  var rng = mx - mn || 1;
  var pad = h * 0.12;
  var pts = vals.map(function(v, i) {
    var x = (i / (vals.length - 1)) * w;
    var y = pad + (1 - (v - mn) / rng) * (h - pad * 2);
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  var isPos = vals[vals.length-1] >= vals[0];
  var stroke = isPos ? 'var(--pos)' : 'var(--neg)';
  var lastY = pad + (1 - (vals[vals.length-1] - mn) / rng) * (h - pad * 2);
  var svg = '<svg class="' + cls + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">';
  if (o.area) {
    var gid = 'spk' + (_sparkId++);
    svg += '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="' + stroke + '" stop-opacity="0.20"/>' +
      '<stop offset="100%" stop-color="' + stroke + '" stop-opacity="0"/></linearGradient></defs>';
    svg += '<polygon points="0,' + h + ' ' + pts + ' ' + w + ',' + h + '" fill="url(#' + gid + ')" stroke="none"/>';
  }
  svg += '<polyline points="' + pts + '" fill="none" stroke="' + stroke + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<circle cx="' + w.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="2.5" fill="' + stroke + '"/>' +
    '</svg>';
  return svg;
}

───────────────────────────────────────────────────────────── */
(function() {
  var btn = document.getElementById('themeToggle');
  function syncBtn() {
    var t = document.documentElement.getAttribute('data-theme') || 'light';
    btn.querySelector('.icon').textContent = t === 'dark' ? '☀️' : '🌙';
    btn.querySelector('.label').textContent = t === 'dark' ? '라이트' : '다크';
  }
  syncBtn();
  btn.addEventListener('click', function() {
    var cur = document.documentElement.getAttribute('data-theme') || 'light';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('pf_theme', next); } catch(e) {}
    syncBtn();
  });
})();

/* ─────────────────────────────────────────────────────────────
   메인 렌더링
───────────────────────────────────────────────────────────── */
(function() {
  var D = window.DAILY;
  if (!D) {
    document.getElementById('app').innerHTML =
      '<div class="loading">daily-data.js를 불러올 수 없습니다. 로컬에서 fetch_daily.py를 먼저 실행해 주세요.</div>';
    return;
  }

  document.getElementById('subtitle').textContent =
    '최신 거래일 ' + D.as_of + '  •  지역별 기준일은 각 탭 참고  •  생성: ' +
    (D.generated_utc || '').replace('T', ' ').replace('Z', ' UTC');

  // 현재 선택 지역
  var currentRegion = 'overview';

  function getRegion(key) {
    return (D.regions || []).find(function(r){ return r.key === key; });
  }

  /* ── 전체 개요 글로벌 시황 ── */
  function renderOverviewCommentary() {
    var regions = D.regions || [];
    // 매크로 라인 (지역 공통) — 있는 것 중 첫 번째
    var macro = '';
    for (var i = 0; i < regions.length; i++) {
      var c = regions[i].commentary;
      if (c && !Array.isArray(c) && c.macro) { macro = c.macro; break; }
    }
    var hasAny = macro || regions.some(function(r){
      var c = r.commentary; return c && !Array.isArray(c) && c.summary;
    });
    if (!hasAny) return '';

    var html = '<div class="commentary-box">';
    html += '<div class="commentary-title">📝 오늘의 글로벌 시황</div>';
    if (macro) html += '<p class="commentary-line"><b>🌐 매크로</b> · ' + escHtml(macro) + '</p>';

    html += '<div class="cm-subtitle">🗺 지역별 한줄 요약</div>';
    html += '<div class="cm-region-list">';
    regions.forEach(function(r) {
      var c = r.commentary;
      var summary = (c && !Array.isArray(c) && c.summary) ? c.summary : '';
      if (!summary) return;
      html += '<div class="cm-region" onclick="switchRegion(\'' + r.key + '\')">' +
        '<div class="cm-region-name">' + r.flag + ' ' + escHtml(r.name) +
          (r.as_of ? ' <span class="cm-src">' + r.as_of + '</span>' : '') + '</div>' +
        '<div class="cm-region-text">' + escHtml(summary) + '</div>' +
      '</div>';
    });
    html += '</div>';
    html += '<div class="commentary-foot">※ 각 지역 탭에서 매크로·주요 이벤트·특징주 등락 요인을 자세히 확인할 수 있습니다.</div>';
    html += '</div>';
    return html;
  }

  /* ── 전체 개요 카드 ── */
  function renderOverview() {
    var html = '';

    // 글로벌 시황 코멘트
    html += renderOverviewCommentary();

    // 개요 카드 (5개 지역)
    html += '<div class="overview-grid">';
    (D.regions || []).forEach(function(r) {
      var main = r.indices && r.indices[0];
      var chgPct = main ? main.chgPct : null;
      var cc = colorClass(chgPct);
      html += '<div class="ov-card" onclick="switchRegion(\'' + r.key + '\')">' +
        '<div class="ov-region">' + r.flag + ' ' + r.name +
          (r.as_of ? '<span class="ov-date">' + r.as_of + '</span>' : '') +
        '</div>' +
        '<div class="ov-main-idx">' + (main ? main.name : '—') + '</div>' +
        '<div class="ov-main-chg ' + cc + '">' + fmtPct(chgPct) + '</div>' +
        '<div class="ov-sub">' +
          (r.indices || []).slice(1, 3).map(function(idx) {
            return '<span class="' + colorClass(idx.chgPct) + '">' + idx.name + ' ' + fmtPct(idx.chgPct) + '</span>';
          }).join('  ·  ') +
        '</div>' +
        '</div>';
    });
    html += '</div>';

    // 전체 섹터 히트맵 (US 기준 GICS)
    var usR = getRegion('us');
    if (usR && usR.sectors && usR.sectors.length) {
      html += '<div class="panel">';
      html += '<div class="panel-title">🗂 미국 GICS 섹터 (SPDR ETF 기준)' +
        (usR.as_of ? ' <span style="font-size:11px;font-weight:600;color:var(--muted)">· ' + usR.as_of + ' 종가</span>' : '') + '</div>';
      html += '<div class="panel-hint">S&P 500 11개 GICS 섹터 일간 등락. XLK·XLF·XLV 등 SPDR 섹터 ETF 종가 기준.</div>';
      html += renderSectorHeatmap(usR.sectors);
      html += '</div>';
    }

    // 지역별 특징주 요약
    html += '<div class="panel-title" style="margin:4px 0 14px;font-size:15px;font-weight:700;">⚡ 오늘의 특징주</div>';
    html += '<div class="featured-grid">';
    (D.regions || []).forEach(function(r) {
      var feat = r.featured && r.featured[0];
      if (!feat) return;
      html += renderFeatCard(feat, r.name + ' ' + r.flag);
    });
    html += '</div>';

    return html;
  }

  /* ── 기준일 배지 ── */
  function renderAsOfBadge(r) {
    if (!r || !r.as_of) return '';
    var prevTxt = r.prev_date ? ' <span style="opacity:.7">(전일 대비: ' + r.prev_date + ')</span>' : '';
    return '<div class="asof-badge">📅 ' + (r.flag || '') + ' ' + r.name +
      ' 기준일 <b>' + r.as_of + '</b>' + prevTxt + '</div>';
  }

  /* ── 시황 코멘트 (구조화) ── */
  function renderCommentary(r) {
    var c = r && r.commentary;
    if (!c) return '';
    // 구버전(배열) 호환
    if (Array.isArray(c)) {
      if (!c.length) return '';
      return '<div class="commentary-box"><div class="commentary-title">📝 시황 코멘트</div>' +
        c.map(function(l){ return '<p class="commentary-line">' + l + '</p>'; }).join('') +
        '<div class="commentary-foot">※ 당일 데이터 기반 자동 요약</div></div>';
    }

    var html = '<div class="commentary-box">';
    html += '<div class="commentary-title">📝 시황 코멘트</div>';

    if (c.summary) html += '<p class="commentary-line">' + escHtml(c.summary) + '</p>';
    if (c.macro)   html += '<p class="commentary-line"><b>🌐 매크로</b> · ' + escHtml(c.macro) + '</p>';
    if (c.sectors) html += '<p class="commentary-line"><b>🗂 섹터</b> · ' + escHtml(c.sectors) + '</p>';

    // 주요 이벤트 (지수 레벨 뉴스)
    if (c.events && c.events.length) {
      html += '<div class="cm-subtitle">📰 시장을 움직인 주요 이벤트</div>';
      html += '<ul class="cm-event-list">';
      c.events.forEach(function(e) {
        var src = e.source ? ' <span class="cm-src">· ' + escHtml(e.source) + '</span>' : '';
        var badge = (e.scope === 'global')
          ? '<span class="cm-scope cm-scope-g">글로벌</span> '
          : '<span class="cm-scope cm-scope-r">지역</span> ';
        var title = escHtml(e.title);
        var head = e.link ? '<a href="' + e.link + '" target="_blank" rel="noopener">' + title + '</a>' : title;
        var desc = e.desc ? '<div class="cm-event-desc">' + escHtml(e.desc) + '</div>' : '';
        html += '<li>' + badge + head + src + desc + '</li>';
      });
      html += '</ul>';
    }

    // 종목별 등락 사유
    if (c.movers && c.movers.length) {
      html += '<div class="cm-subtitle">🎯 주요 특징주 등락 요인</div>';
      html += '<div class="cm-mover-list">';
      c.movers.forEach(function(m) {
        var chipCls = chipClass(m.chgPct);
        var arrow = arrowFor(m.chgPct);
        var src = m.source ? ' <span class="cm-src">· ' + escHtml(m.source) + '</span>' : '';
        var reason = escHtml(m.reason);
        if (m.link) reason = '<a href="' + m.link + '" target="_blank" rel="noopener">' + reason + '</a>';
        var detail = m.detail ? '<div class="cm-mover-detail">' + escHtml(m.detail) + '</div>' : '';
        html += '<div class="cm-mover">' +
          '<div class="cm-mover-head">' +
            '<span class="cm-mover-name">' + escHtml(m.name) + '</span>' +
            '<span class="cm-mover-ticker">' + m.ticker + '</span>' +
            '<span class="gf-chip ' + chipCls + '">' + arrow + fmtPct(m.chgPct) + '</span>' +
          '</div>' +
          '<div class="cm-mover-reason">' + reason + src + '</div>' +
          detail +
        '</div>';
      });
      html += '</div>';
    }

    html += '<div class="commentary-foot">※ 지수·섹터·종목 등락 수치와 실제 뉴스 헤드라인에 기반한 자동 생성 요약 (투자 판단의 근거가 아님)</div>';
    html += '</div>';
    return html;
  }

  /* ── 섹터 히트맵 ── */
  function renderSectorHeatmap(sectors) {
    var html = '<div class="sector-grid">';
    sectors.forEach(function(s) {
      var cls = heatClass(s.chgPct);
      html += '<div class="sector-cell ' + cls + '">' +
        '<div class="sname">' + s.name + '</div>' +
        '<div class="spct">' + fmtPct(s.chgPct) + '</div>' +
        (s.etf ? '<div class="setf">' + s.etf + '</div>' : '') +
        '</div>';
    });
    html += '</div>';
    return html;
  }

  /* ── 지수 카드 바 (Google Finance 스타일) ── */
  function chipClass(v) {
    if (v == null) return 'chip-neu';
    return v > 0 ? 'chip-pos' : v < 0 ? 'chip-neg' : 'chip-neu';
  }
  function arrowFor(v) {
    if (v == null || v === 0) return '';
    return v > 0 ? '▲ ' : '▼ ';
  }
  function renderIndexBar(indices) {
    var html = '<div class="idx-bar">';
    indices.forEach(function(idx) {
      var priceStr = idx.currency === '' ? fmt(idx.price, 2) : idx.price ? idx.price.toLocaleString('ko-KR', {maximumFractionDigits:2}) : '—';
      html += '<div class="idx-card">' +
        '<div class="iname">' + idx.name + '</div>' +
        '<div class="iprice tnum">' + priceStr + (idx.currency ? ' <span style="font-size:10px;color:var(--muted)">' + idx.currency + '</span>' : '') + '</div>' +
        '<div class="ispark">' + makeSpark(idx.spark, {w:160, h:34, cls:'spark-wide', area:true}) + '</div>' +
        '<div class="ichg-chip ' + chipClass(idx.chgPct) + '">' + arrowFor(idx.chgPct) + fmtPct(idx.chgPct) +
          (idx.chg ? ' (' + (idx.chg>0?'+':'') + fmt(idx.chg,2) + ')' : '') + '</div>' +
        '</div>';
    });
    html += '</div>';
    return html;
  }

  /* ── Google Finance 리스트 행 ── */
  function renderGFRow(s, i) {
    var pos = (s.chgPct || 0) >= 0;
    var priceStr = s.price != null ? s.price.toLocaleString('ko-KR', {maximumFractionDigits:2}) : '—';
    var rankCls = i < 3 ? 'gf-rank top3' : 'gf-rank';
    return '<div class="gf-row">' +
      '<div class="' + rankCls + '">' + (i + 1) + '</div>' +
      '<div class="gf-id">' +
        '<div class="gf-name">' + escHtml(s.name) + '</div>' +
        '<div class="gf-ticker">' + s.ticker + ' · ' + s.sector + '</div>' +
      '</div>' +
      '<div class="gf-spark">' + makeSpark(s.spark || [], {w:84, h:26, cls:'sparkline-sm', area:true}) + '</div>' +
      '<div class="gf-price tnum">' + priceStr + '</div>' +
      '<div class="gf-chg"><span class="gf-chip ' + chipClass(s.chgPct) + '">' + arrowFor(s.chgPct) + fmtPct(s.chgPct) + '</span></div>' +
    '</div>';
  }

  /* ── 마켓 트렌드 리스트 (정렬 모드별) ── */
  function renderTrendList(stocks, mode) {
    var arr = (stocks || []).slice();
    if (mode === 'gain')        arr.sort(function(a,b){ return (b.chgPct||0) - (a.chgPct||0); });
    else if (mode === 'lose')   arr.sort(function(a,b){ return (a.chgPct||0) - (b.chgPct||0); });
    else if (mode === 'active') arr.sort(function(a,b){ return Math.abs(b.chgPct||0) - Math.abs(a.chgPct||0); });
    else                        arr.sort(function(a,b){ return a.rank - b.rank; });
    if (mode === 'gain' || mode === 'lose' || mode === 'active') arr = arr.slice(0, 12);
    if (!arr.length) return '<div class="empty-note">종목 데이터 없음</div>';
    return arr.map(renderGFRow).join('');
  }

  /* ── 마켓 트렌드 패널 (탭 + 리스트) ── */
  function renderTrendPanel(rkey, r) {
    var tabs = [['rank','시총순'],['gain','상승'],['lose','하락'],['active','활발']];
    var html = '<div class="panel">';
    html += '<div class="panel-title">📈 마켓 트렌드</div>';
    html += '<div class="panel-hint">대표 종목 일간 등락 · 탭으로 상승/하락/거래활발 종목 정렬</div>';
    html += '<div class="trend-tabs" id="trendTabs_' + rkey + '">';
    tabs.forEach(function(t, i) {
      html += '<button class="trend-tab' + (i === 0 ? ' active' : '') + '" data-mode="' + t[0] + '" ' +
        'onclick="switchTrend(\'' + rkey + '\',\'' + t[0] + '\')">' + t[1] + '</button>';
    });
    html += '</div>';
    html += '<div class="gf-list" id="trendList_' + rkey + '">' + renderTrendList(r.stocks, 'rank') + '</div>';
    html += '</div>';
    return html;
  }

  /* ── 특징주 카드 ── */
  function renderFeatCard(feat, regionLabel) {
    var cc = colorClass(feat.chgPct);
    var badgeCls = feat.chgPct >= 0 ? 'badge-pos' : 'badge-neg';
    var html = '<div class="feat-card">' +
      '<div class="fc-header">' +
        '<div>' +
          '<div class="fc-name">' + feat.name + '</div>' +
          '<div class="fc-ticker">' + feat.ticker + (regionLabel ? ' · ' + regionLabel : '') + ' · ' + feat.sector + '</div>' +
        '</div>' +
        '<span class="fc-badge ' + badgeCls + '">' + fmtPct(feat.chgPct) + '</span>' +
      '</div>' +
      '<div class="fc-price ' + cc + '">' + (feat.price ? feat.price.toLocaleString('ko-KR', {maximumFractionDigits:2}) : '—') + '</div>' +
      '<div class="fc-chg ' + cc + '">' + (feat.chg != null ? (feat.chg>0?'+':'') + fmt(feat.chg,2) : '—') + ' 전일 대비</div>' +
      '<div class="fc-spark">' + makeSpark(feat.spark, {w:280, h:50, cls:'sparkline'}) + '</div>';

    if (feat.news && feat.news.length) {
      html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;">관련 뉴스</div>';
      html += '<div class="news-list">';
      feat.news.forEach(function(n) {
        var t = relTime(n.time);
        html += '<div class="news-item">';
        if (n.link) {
          html += '<a class="ntitle" href="' + n.link + '" target="_blank" rel="noopener">' + escHtml(n.title) + '</a>';
        } else {
          html += '<div class="ntitle">' + escHtml(n.title) + '</div>';
        }
        html += '<div class="nmeta">' + escHtml(n.publisher || '') + (t ? ' · ' + t : '') + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="no-news">이 종목의 최신 뉴스를 불러오지 못했습니다.</div>';
    }
    html += '</div>';
    return html;
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 지역별 뷰 ── */
  function renderRegion(rkey) {
    var r = getRegion(rkey);
    if (!r) return '<div class="empty-note">데이터 없음</div>';
    var html = '';

    // 기준일 배지
    html += renderAsOfBadge(r);

    // 시황 코멘트
    html += renderCommentary(r);

    // 지수 요약
    html += '<div class="section-label">주요 지수</div>';
    html += renderIndexBar(r.indices || []);

    // 마켓 트렌드 (탭 리스트) + GICS 섹터 — two-col on wide screens
    html += '<div class="two-col">';
    html += renderTrendPanel(rkey, r);

    if (r.sectors && r.sectors.length) {
      html += '<div class="panel" style="margin:0">';
      html += '<div class="panel-title">🗂 GICS 섹터 움직임</div>';
      if (rkey === 'us') {
        html += '<div class="panel-hint">SPDR 섹터 ETF 종가 기준 일간 등락</div>';
      } else {
        html += '<div class="panel-hint">유니버스 구성 종목의 GICS 섹터 평균 등락</div>';
      }
      html += renderSectorHeatmap(r.sectors);
      html += '</div>';
    }
    html += '</div>'; // .two-col

    // 오늘의 특징주 & 관련 뉴스
    html += '<div class="section-label" style="margin-bottom:10px">⚡ 오늘의 특징주 & 관련 뉴스</div>';
    if (r.featured && r.featured.length) {
      html += '<div class="featured-grid">';
      r.featured.forEach(function(feat) {
        html += renderFeatCard(feat, null);
      });
      html += '</div>';
    } else {
      html += '<div class="empty-note">데이터 없음</div>';
    }

    return html;
  }

  /* ── 탭 전환 ── */
  window.switchRegion = function(key) {
    currentRegion = key;
    // 탭 active 갱신
    document.querySelectorAll('.rtab').forEach(function(el) {
      el.classList.toggle('active', el.dataset.region === key);
    });
    document.getElementById('region-content').innerHTML =
      key === 'overview' ? renderOverview() : renderRegion(key);
  };

  window.switchTrend = function(rkey, mode) {
    var r = getRegion(rkey);
    if (!r || !r.stocks) return;
    document.getElementById('trendList_' + rkey).innerHTML = renderTrendList(r.stocks, mode);
    document.querySelectorAll('#trendTabs_' + rkey + ' .trend-tab').forEach(function(b) {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
  };

  /* ── 앱 마운트 ── */
  var regions = D.regions || [];
  var app = document.getElementById('app');

  // 탭 바
  var tabHtml = '<div class="region-tabs">';
  tabHtml += '<button class="rtab active" data-region="overview" onclick="switchRegion(\'overview\')">🌐 전체 개요</button>';
  regions.forEach(function(r) {
    tabHtml += '<button class="rtab" data-region="' + r.key + '" onclick="switchRegion(\'' + r.key + '\')">' +
      r.flag + ' ' + r.name + '</button>';
  });
  tabHtml += '</div>';
  tabHtml += '<div id="region-content"></div>';

  app.innerHTML = tabHtml;
  document.getElementById('region-content').innerHTML = renderOverview();
})();
</script>
